<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Vactra Flow Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

    <div class="relative w-full h-[80vh]">
        <video id="preview" class="w-full h-full object-cover" autoplay playsinline></video>
        
        <div id="ui-layer" class="absolute inset-0 p-5 flex flex-col justify-between">
            <button onclick="openMusicLibrary()" class="bg-gray-800 p-2 rounded w-40">🎵 Add Music</button>
            <div id="status" class="text-red-500 font-bold"></div>
        </div>
    </div>

    <div class="p-6 flex justify-center gap-8">
        <button id="rec-btn" class="w-16 h-16 bg-red-600 rounded-full border-4"></button>
        <button onclick="accessGallery()" class="bg-blue-600 px-6 py-2 rounded">📁 Gallery</button>
        <button onclick="downloadRecording()" class="bg-green-600 px-6 py-2 rounded">Download</button>
    </div>

    <script>
        let mediaRecorder;
        let chunks = [];

        // Camera Start
        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
            document.getElementById('preview').srcObject = s;
            mediaRecorder = new MediaRecorder(s);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
        });

        // Record Button Logic
        document.getElementById('rec-btn').onclick = () => {
            mediaRecorder.start();
            document.getElementById('status').innerText = "Recording...";
        };

        // Download Logic
        function downloadRecording() {
            const blob = new Blob(chunks, {type: 'video/mp4'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "vactra-video.mp4";
            a.click();
        }

        // Music & Gallery Placeholders
        function openMusicLibrary() { alert("Music Library: Choose from 🎵 Trending Songs"); }
        function accessGallery() { alert("Opening Phone Gallery..."); }
    </script>
</body>
</html>
