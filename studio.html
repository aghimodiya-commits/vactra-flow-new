<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Vactra Pro Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white h-screen overflow-hidden">

    <div class="relative w-full h-[75vh]">
        <video id="preview" class="w-full h-full object-cover" autoplay playsinline></video>
        <div id="ai-canvas" class="absolute inset-0 flex items-center justify-center"></div>
    </div>

    <div class="grid grid-cols-4 gap-2 p-4">
        <button onclick="setFilter('sepia(1)')" class="bg-amber-700 p-2 rounded">Vintage</button>
        <button onclick="generateAI()" class="bg-purple-700 p-2 rounded font-bold animate-pulse">✨ AI Gen</button>
        <button onclick="addEmoji('🔥')" class="text-3xl">🔥</button>
        <button onclick="document.getElementById('music-input').click()" class="bg-green-700 p-2 rounded">🎵 Music</button>
    </div>

    <div class="flex justify-center gap-6 p-4">
        <button id="rec-btn" class="w-16 h-16 bg-red-600 rounded-full border-4 border-white"></button>
        <button onclick="downloadVideo()" class="bg-blue-600 px-6 py-2 rounded-full font-bold">Download</button>
    </div>

    <input type="file" id="music-input" class="hidden" accept="audio/*">

    <script>
        const video = document.getElementById('preview');
        let chunks = [];
        let mediaRecorder;

        // Camera Access
        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
            video.srcObject = s;
            mediaRecorder = new MediaRecorder(s);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
        });

        // AI Generation Simulator
        function generateAI() {
            alert("AI Animation generate ho raha hai...");
            document.getElementById('ai-canvas').innerHTML = '<div class="text-2xl font-bold bg-white/20 p-4">AI Animation Running...</div>';
        }

        // Recording
        document.getElementById('rec-btn').onclick = () => {
            mediaRecorder.start();
            alert("Recording started!");
        };

        // Download
        function downloadVideo() {
            mediaRecorder.stop();
            setTimeout(() => {
                const blob = new Blob(chunks, {type: 'video/mp4'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "vactra-pro.mp4";
                a.click();
            }, 1000);
        }

        function setFilter(f) { video.style.filter = f; }
        function addEmoji(e) { /* Logic for emoji overlay */ }
    </script>
</body>
</html>
