<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; font-family: sans-serif; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
        .side-icons { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; text-align: center; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-4 flex justify-between items-center z-50 bg-gradient-to-b from-black/50 to-transparent">
        <h1 class="text-xl font-bold tracking-tighter">VACTRA <span class="text-red-600">FLOW</span></h1>
        <div class="flex gap-4 text-lg">
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <div class="feed">
        <div class="card">
            <video loop playsinline muted autoplay>
                <source src="https://player.vimeo.com/external/370331493.sd.mp4?s=34015694200c0182470ecf6406e30a516e8b4e7a&profile_id=139&oauth2_token_id=57447761" type="video/mp4">
            </video>
            <div class="overlay">
                <p class="font-bold">@Asheesh_Kumar</p>
                <p class="text-sm">Bhopal Content Scene! 🚀 #VactraFlow</p>
            </div>
            <div class="side-icons">
                <div><i class="fas fa-heart text-2xl"></i><p class="text-xs">15K</p></div>
                <div><i class="fas fa-comment-dots text-2xl"></i><p class="text-xs">800</p></div>
                <div><i class="fas fa-share text-2xl"></i><p class="text-xs">Share</p></div>
            </div>
        </div>

        <div class="card">
            <video loop playsinline muted>
                <source src="https://player.vimeo.com/external/434045526.sd.mp4?s=c4033282f6e91f692e1069b2d3082c5f11075677&profile_id=139&oauth2_token_id=57447761" type="video/mp4">
            </video>
            <div class="overlay">
                <p class="font-bold">@Vactra_Official</p>
                <p class="text-sm">Nature Vibes 🌿 #Fresh</p>
            </div>
            <div class="side-icons">
                <div><i class="fas fa-heart text-2xl"></i><p class="text-xs">12K</p></div>
                <div><i class="fas fa-comment-dots text-2xl"></i><p class="text-xs">450</p></div>
                <div><i class="fas fa-share text-2xl"></i><p class="text-xs">Share</p></div>
            </div>
        </div>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play().catch(e => console.log("Auto-play blocked"));
                } else {
                    video.pause();
                }
            });
        }, { threshold: 0.7 });

        document.querySelectorAll('.card').forEach(card => observer.observe(card));
    </script>

</body>
</html>
