<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Permanent Save</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 12px; bottom: 150px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; }
        .bottom-info { position: absolute; bottom: 110px; left: 15px; z-index: 1000; }
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        #edit-screen { background: #0f0f0f; z-index: 6000; overflow-y: auto; }
        input, textarea { background: #222; border: 1px solid #333; border-radius: 8px; padding: 12px; color: white; width: 100%; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed"></div>
    </div>

    <div id="edit-screen" class="screen">
        <div class="p-4 flex items-center justify-between border-b border-zinc-800">
            <i class="fas fa-times text-xl cursor-pointer" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Add Details</span>
            <button onclick="publishVideo()" class="bg-red-600 px-6 py-1.5 rounded-full font-bold text-sm">Publish</button>
        </div>
        <div class="p-5 text-center">
            <div id="preview-area" class="w-full aspect-video bg-zinc-900 rounded-lg mb-6 flex items-center justify-center overflow-hidden border border-zinc-700"></div>
            <input type="text" id="vTitle" placeholder="Video Title...">
            <textarea id="vDesc" rows="2" placeholder="Description..."></textarea>
        </div>
    </div>

    <nav>
        <div onclick="showScreen('home-screen')"><i class="fas fa-home text-xl"></i></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-3xl font-bold">+</div>
        <div onclick="alert('Profile Page Coming Soon!')"><i class="fas fa-user-circle text-xl"></i></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let tempVideoURL = "";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- LOAD SAVED VIDEOS ON START ---
        window.onload = function() {
            const savedVideos = JSON.parse(localStorage.getItem('vactra_db')) || [];
            savedVideos.forEach(v => addVideoToFeed(v.url, v.title, v.desc));
        };

        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                tempVideoURL = URL.createObjectURL(file);
                document.getElementById('preview-area').innerHTML = `<video class="w-full h-full object-contain" src="${tempVideoURL}" muted autoplay loop></video>`;
                showScreen('edit-screen');
            }
        };

        function publishVideo() {
            const title = document.getElementById('vTitle').value || "New Video";
            const desc = document.getElementById('vDesc').value || "";
            
            // 1. Screen par dikhao
            addVideoToFeed(tempVideoURL, title, desc);

            // 2. LocalStorage mein save karo (Permanent)
            const videoObj = { url: tempVideoURL, title: title, desc: desc };
            let db = JSON.parse(localStorage.getItem('vactra_db')) || [];
            db.unshift(videoObj);
            localStorage.setItem('vactra_db', JSON.stringify(db));

            // Reset
            document.getElementById('vTitle').value = "";
            document.getElementById('vDesc').value = "";
            showScreen('home-screen');
            alert("Bhai, Video live aur save ho gayi! 🔥");
        }

        function addVideoToFeed(url, title, desc) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video loop playsinline autoplay src="${url}"></video>
                <div class="bottom-info">
                    <p class="font-bold text-md">@Asheesh_Kumar</p>
                    <p class="text-sm font-semibold">${title}</p>
                    <p class="text-xs opacity-70">${desc}</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="this.classList.toggle('text-red-500')"><i class="fas fa-heart text-2xl"></i><p class="text-[10px]">1.2M</p></div>
                    <div class="icon-box" onclick="alert('Comment box opening...')"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px]">45K</p></div>
                    <div class="icon-box" onclick="navigator.share ? navigator.share({title: '${title}', url: window.location.href}) : alert('Link Copied!')"><i class="fas fa-share text-2xl"></i><p class="text-[10px]">Share</p></div>
                </div>`;
            document.getElementById('mainFeed').prepend(card);
        }
    </script>
</body>
</html>
