<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - No Echo Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; }
        .bottom-info { position: absolute; bottom: 120px; left: 15px; z-index: 1000; max-width: 80%; }
        
        #comment-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh;
            background: #1c1c1c; border-radius: 20px 20px 0 0; z-index: 7000;
            transition: bottom 0.3s ease-out; display: flex; flex-direction: column;
        }
        .show-comments { bottom: 0 !important; }

        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #aaa; cursor: pointer; }
        .active-nav { color: white; }

        #edit-screen { background: #000; z-index: 6000; }
        .edit-tools { position: absolute; bottom: 120px; width: 100%; display: flex; justify-content: space-around; padding: 10px; background: rgba(0,0,0,0.5); }
        .tool-btn { display: flex; flex-direction: column; align-items: center; font-size: 11px; gap: 5px; color: white; }
        
        .details-area { background: #0f0f0f; padding: 15px; border-radius: 15px 15px 0 0; position: absolute; bottom: 0; width: 100%; z-index: 10; }
        .input-group { background: #272727; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
        input, textarea { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed"></div>
    </div>

    <div id="comment-panel">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
            <span class="font-bold text-lg">Comments</span>
            <i class="fas fa-times text-xl cursor-pointer" onclick="toggleComments()"></i>
        </div>
        <div id="comment-list" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-3 border-t border-zinc-800 bg-zinc-900 flex items-center gap-3">
            <input type="text" id="comment-input" placeholder="Add a comment..." class="flex-1 bg-zinc-800 rounded-full px-4 py-2 text-sm outline-none">
            <button onclick="postComment()" class="text-blue-500 font-bold px-2">Post</button>
        </div>
    </div>

    <div id="edit-screen" class="screen">
        <div class="p-4 flex items-center justify-between sticky top-0 bg-black/50 z-20">
            <i class="fas fa-arrow-left text-xl cursor-pointer" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Edit Video</span>
            <button onclick="publishVideo()" class="bg-white text-black px-5 py-1.5 rounded-full font-bold text-sm">Next</button>
        </div>
        <div id="preview-box" class="w-full h-[60vh] bg-zinc-900 flex items-center justify-center overflow-hidden"></div>
        <div class="edit-tools">
            <div class="tool-btn"><i class="fas fa-music text-xl"></i><span>Sound</span></div>
            <div class="tool-btn"><i class="fas fa-font text-xl"></i><span>Text</span></div>
            <div class="tool-btn"><i class="fas fa-magic text-xl"></i><span>Filters</span></div>
        </div>
        <div class="details-area">
            <div class="input-group"><input type="text" id="vTitle" placeholder="Caption your Short..."></div>
            <div class="input-group"><input type="text" id="vTags" placeholder="#Tags"></div>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <div class="p-8 text-center mt-10">
            <div class="w-20 h-20 bg-zinc-800 rounded-full mx-auto border-2 border-red-600 flex items-center justify-center text-2xl font-bold">AK</div>
            <h2 class="mt-4 text-xl font-bold">Asheesh Kumar</h2>
            <button class="mt-6 bg-zinc-900 px-6 py-2 rounded-lg text-sm" onclick="showScreen('home-screen')">Back to Feed</button>
        </div>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl mb-1"></i><span>Home</span></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-4xl font-light cursor-pointer">+</div>
        <div class="nav-item" onclick="showScreen('profile-screen')"><i class="fas fa-user-circle text-xl mb-1"></i><span>You</span></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let currentUrl = "";

        // Intersection Observer to stop double sound
        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) {
                    video.play();
                } else {
                    video.pause();
                    video.currentTime = 0; // Reset video
                }
            });
        }, { threshold: 0.8 });

        window.onload = function() {
            const saved = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
            saved.forEach(v => renderVideo(v.url, v.title, v.tags));
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // Mute all videos when leaving home screen
            if(id !== 'home-screen') {
                document.querySelectorAll('video').forEach(v => v.pause());
            }
        }

        function toggleComments(force = null) {
            const p = document.getElementById('comment-panel');
            if(force === false) p.classList.remove('show-comments');
            else p.classList.toggle('show-comments');
        }

        function postComment() {
            const input = document.getElementById('comment-input');
            if (input.value.trim() !== "") {
                const div = document.createElement('div');
                div.className = "flex gap-3";
                div.innerHTML = `<div class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center text-[10px] font-bold text-white">AK</div>
                                <div><p class="text-xs font-bold text-gray-400">@Asheesh_Kumar</p><p class="text-sm text-white">${input.value}</p></div>`;
                document.getElementById('comment-list').prepend(div);
                input.value = "";
            }
        }

        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                currentUrl = URL.createObjectURL(file);
                document.getElementById('preview-box').innerHTML = `<video src="${currentUrl}" class="h-full" muted autoplay loop></video>`;
                showScreen('edit-screen');
            }
        };

        function publishVideo() {
            const t = document.getElementById('vTitle').value || "New Short";
            const tags = document.getElementById('vTags').value || "";
            renderVideo(currentUrl, t, tags);
            
            const db = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
            db.unshift({url: currentUrl, title: t, tags: tags});
            localStorage.setItem('vactra_pro_db', JSON.stringify(db));
            
            showScreen('home-screen');
        }

        function renderVideo(url, title, tags) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video loop playsinline src="${url}"></video>
                <div class="bottom-info">
                    <p class="font-bold">@Asheesh_Kumar</p>
                    <p class="text-sm mt-1">${title}</p>
                    <p class="text-xs text-blue-400 mt-1">${tags}</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="this.classList.toggle('text-red-500')"><i class="fas fa-heart text-2xl"></i><p class="text-[10px]">1.2M</p></div>
                    <div class="icon-box" onclick="toggleComments()"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px]">45K</p></div>
                    <div class="icon-box" onclick="navigator.share({title: '${title}'})"><i class="fas fa-share text-2xl"></i><p class="text-[10px]">Share</p></div>
                </div>`;
            
            const videoElem = card.querySelector('video');
            videoObserver.observe(videoElem); // Start watching this video
            document.getElementById('mainFeed').prepend(card);
        }
    </script>
</body>
</html>
