<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Profile Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .bottom-info { position: absolute; bottom: 120px; left: 15px; z-index: 1000; }
        
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #aaa; cursor: pointer; }
        .active-nav { color: white; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent">
            <h1 class="text-xl font-black italic uppercase">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed" onscroll="handleScroll()"></div>
    </div>

    <div id="profile-screen" class="screen bg-zinc-950">
        <div class="p-4 border-b border-zinc-900 flex items-center">
            <i class="fas fa-arrow-left mr-4 cursor-pointer" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">My Channel</span>
        </div>
        <div class="p-10 text-center">
            <div class="w-24 h-24 bg-zinc-800 rounded-full mx-auto border-4 border-red-600 flex items-center justify-center text-3xl font-bold">AK</div>
            <h2 class="mt-4 text-2xl font-bold">Asheesh Kumar</h2>
            <p class="text-gray-500">Pharmacy Student | Bhopal</p>
            <div class="flex justify-around mt-8 bg-zinc-900 p-4 rounded-xl">
                <div><p class="font-bold text-white">45K</p><p class="text-[10px] text-gray-500">Subs</p></div>
                <div><p class="font-bold text-white">1.2M</p><p class="text-[10px] text-gray-500">Likes</p></div>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl"></i><span>Home</span></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-4xl font-light cursor-pointer text-white">+</div>
        <div class="nav-item" onclick="showScreen('profile-screen')"><i class="fas fa-user-circle text-xl"></i><span>You</span></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        // Screen badalne ka logic
        function showScreen(id) {
            // Saari screens ko hide karo
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            // Selected screen ko show karo
            document.getElementById(id).classList.add('active');
            
            // Video ko pause kar do agar profile khule toh
            if(id !== 'home-screen') {
                document.querySelectorAll('video').forEach(v => v.pause());
            } else {
                handleScroll();
            }
        }

        function handleScroll() {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) { v.play().catch(e=>{}); } 
                else { v.pause(); }
            });
        }

        // Baki upload aur render logic wahi hai jo aapne video mein dikhaya
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                renderVideo(url, "New Short");
                showScreen('home-screen');
            }
        };

        function renderVideo(url, title) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video loop playsinline src="${url}"></video>
                <div class="bottom-info">
                    <p class="font-bold">@Asheesh_Kumar</p>
                    <p class="text-sm">${title}</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box"><i class="fas fa-heart text-2xl"></i><p class="text-[10px]">1.2M</p></div>
                    <div class="icon-box"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px]">45K</p></div>
                </div>`;
            document.getElementById('mainFeed').prepend(card);
            handleScroll();
        }
    </script>
</body>
</html>
