<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Complete</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; font-family: sans-serif; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* UI Overlays */
        .side-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 50; }
        .bottom-ui { position: absolute; bottom: 100px; left: 15px; z-index: 50; pointer-events: none; }
        
        /* Like Button Color */
        .liked { color: #ef4444 !important; }

        /* Profile Page */
        #profilePage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: none; overflow-y: auto;
        }
        .profile-header { background: linear-gradient(to bottom, #1e3a8a, #000); padding: 40px 20px; text-align: center; }
        .profile-pic { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #3b82f6; margin: 0 auto; display: flex; align-items: center; justify-content: center; background: #222; }
        .stats { display: flex; justify-content: space-around; padding: 20px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-6 flex justify-between items-center z-[100] bg-gradient-to-b from-black/70 to-transparent">
        <h1 class="text-2xl font-black italic">VACTRA <span class="text-blue-500">FLOW</span></h1>
        <div class="flex gap-5 text-xl"><i class="fas fa-search"></i><i class="fas fa-camera"></i></div>
    </header>

    <main class="feed" id="mainFeed">
        <div class="card">
            <video loop playsinline autoplay muted src="https://player.vimeo.com/external/370331493.sd.mp4?s=34015694200c0182470ecf6406e30a516e8b4e7a&profile_id=139&oauth2_token_id=57447761"></video>
            
            <div class="bottom-ui">
                <p class="font-bold text-lg">@Asheesh_Kumar</p>
                <p class="text-sm">Bhopal ka apna platform! 🍎🚀</p>
            </div>

            <div class="side-bar">
                <div class="flex flex-col items-center" onclick="toggleLike(this.children[0])">
                    <i class="fas fa-heart text-3xl cursor-pointer"></i>
                    <span class="text-xs mt-1">1.2M</span>
                </div>
                <div class="flex flex-col items-center">
                    <i class="fas fa-comment-dots text-3xl"></i>
                    <span class="text-xs mt-1">45K</span>
                </div>
                <div class="flex flex-col items-center" onclick="shareNow()">
                    <i class="fas fa-share text-3xl cursor-pointer"></i>
                    <span class="text-xs mt-1">Share</span>
                </div>
            </div>
        </div>
    </main>

    <div id="profilePage">
        <div class="p-4 flex items-center gap-4"><i class="fas fa-arrow-left text-xl cursor-pointer" onclick="closeProfile()"></i><span class="font-bold">My Profile</span></div>
        <div class="profile-header">
            <div class="profile-pic"><i class="fas fa-user text-4xl"></i></div>
            <h2 class="mt-4 text-xl font-bold">Asheesh Kumar</h2>
            <p class="text-gray-400 text-sm">Pharmacy Student | Content Creator</p>
        </div>
        <div class="stats">
            <div class="text-center"><p class="font-bold">45.2K</p><p class="text-xs text-gray-400">Followers</p></div>
            <div class="text-center"><p class="font-bold">1.2M</p><p class="text-xs text-gray-400">Likes</p></div>
        </div>
    </div>

    <input type="file" id="videoUpload" accept="video/*" style="display: none;">

    <nav class="fixed bottom-0 w-full bg-black border-t border-white/10 flex justify-around items-center py-4 z-[2000]">
        <i class="fas fa-home text-2xl text-blue-500 cursor-pointer" onclick="closeProfile()"></i>
        <i class="fas fa-bolt text-2xl text-gray-400"></i>
        <div onclick="document.getElementById('videoUpload').click()" class="bg-white text-black px-5 py-1 rounded-xl font-bold text-3xl cursor-pointer">+</div>
        <i class="fas fa-envelope text-2xl text-gray-400"></i>
        <i class="fas fa-user-circle text-2xl text-gray-400 cursor-pointer" onclick="openProfile()"></i>
    </nav>

    <script>
        // Like & Share Logic
        function toggleLike(el) { el.classList.toggle('liked'); }
        function shareNow() {
            if (navigator.share) {
                navigator.share({ title: 'Vactra Flow', url: window.location.href });
            } else { alert("Link Copied!"); }
        }

        // Profile Logic
        function openProfile() {
            document.querySelectorAll('video').forEach(v => v.pause());
            document.getElementById('profilePage').style.display = 'block';
        }
        function closeProfile() {
            document.getElementById('profilePage').style.display = 'none';
            const firstVideo = document.querySelector('video');
            if(firstVideo) firstVideo.play();
        }

        // Upload Logic
        document.getElementById('videoUpload').onchange = function(event) {
            const file = event.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <video loop playsinline autoplay src="${url}"></video>
                    <div class="bottom-ui"><p class="font-bold">@Asheesh_Kumar</p></div>
                    <div class="side-bar">
                        <div class="flex flex-col items-center" onclick="toggleLike(this.children[0])"><i class="fas fa-heart text-3xl"></i><span class="text-xs mt-1">0</span></div>
                        <div class="flex flex-col items-center" onclick="shareNow()"><i class="fas fa-share text-3xl"></i><span class="text-xs mt-1">Share</span></div>
                    </div>
                `;
                document.getElementById('mainFeed').prepend(card);
                card.scrollIntoView({ behavior: 'smooth' });
                closeProfile();
            }
        };
    </script>
</body>
</html>
