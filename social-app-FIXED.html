<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; }
        .bottom-info { position: absolute; bottom: 120px; left: 15px; z-index: 1000; max-width: 80%; }
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #aaa; cursor: pointer; }
        .active-nav { color: white; }
        #video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; overflow: hidden; position: relative; }
        #comment-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh; background: #1c1c1c; border-radius: 20px 20px 0 0; z-index: 7000; transition: bottom 0.3s ease-out; display: flex; flex-direction: column; }
        .show-comments { bottom: 0 !important; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="feed" id="mainFeed"></div>
    </div>

    <div id="shorts-screen" class="screen bg-black overflow-y-auto">
        <div class="p-4 border-b border-zinc-900 sticky top-0 bg-black z-10 flex items-center">
            <i class="fas fa-arrow-left mr-4" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Your Shorts</span>
        </div>
        <div id="video-grid"></div>
    </div>

    <div id="comment-panel">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
            <span class="font-bold text-lg">Comments</span>
            <i class="fas fa-times cursor-pointer" onclick="toggleComments()"></i>
        </div>
        <div id="comment-list" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-4 border-t border-zinc-800">
            <input type="text" id="commentInput" placeholder="Add a comment..." onkeypress="if(event.key === 'Enter') sendComment()" class="w-full bg-zinc-700 p-2 rounded-lg text-white outline-none">
        </div>
    </div>

    <div id="edit-screen" class="screen bg-black">
        <div class="p-4 flex items-center justify-between">
            <i class="fas fa-arrow-left" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Edit Short</span>
            <button id="publishBtn" onclick="publishVideo()" class="bg-white text-black px-4 py-1.5 rounded-full font-bold text-sm">Next</button>
        </div>
        <div id="preview-box" class="w-full h-[60vh] bg-zinc-900 flex items-center justify-center"></div>
        <div class="p-4">
            <input type="text" id="vTitle" placeholder="Create a title..." class="bg-zinc-800 p-3 rounded w-full mb-3">
            <input type="text" id="vTags" placeholder="#Tags" class="bg-zinc-800 p-3 rounded w-full">
        </div>
    </div>

    <div id="profile-screen" class="screen bg-zinc-950">
        <div class="p-4 border-b border-zinc-900 flex items-center">
            <i class="fas fa-arrow-left mr-4" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Account</span>
        </div>
        <div id="auth-content" class="p-6"></div>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl mb-1"></i><span>Home</span></div>
        <div class="nav-item" onclick="showScreen('shorts-screen')"><i class="fas fa-play-circle text-xl mb-1"></i><span>Shorts</span></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-4xl font-light cursor-pointer text-white">+</div>
        <div class="nav-item" onclick="handleProfileClick()"><i class="fas fa-user-circle text-xl mb-1"></i><span>You</span></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let userData = JSON.parse(localStorage.getItem('vactra_user')) || null;
        let db;

        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.play().catch(()=>{}); else entry.target.pause(); });
        }, { threshold: 0.6 });

        const request = indexedDB.open("VactraFinalDB", 1);
        request.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("shorts", { keyPath: "id", autoIncrement: true }); };
        request.onsuccess = e => { db = e.target.result; loadFromDB(); };

        function loadFromDB() {
            document.getElementById('mainFeed').innerHTML = "";
            document.getElementById('video-grid').innerHTML = "";
            const store = db.transaction("shorts", "readonly").objectStore("shorts");
            store.getAll().onsuccess = e => { 
                e.target.result.forEach(v => { renderVideo(v.id, v.url, v.title); addToGrid(v.id, v.url); }); 
            };
        }

        function publishVideo() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function() {
                const transaction = db.transaction("shorts", "readwrite");
                transaction.objectStore("shorts").add({ url: reader.result, title: document.getElementById('vTitle').value });
                transaction.oncomplete = () => { loadFromDB(); showScreen('home-screen'); };
            };
        }

        function renderVideo(id, url, title) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<video loop playsinline src="${url}"></video><div class="bottom-info"><p class="font-bold">${title}</p></div><div class="sidebar"><div class="icon-box" onclick="toggleComments()"><i class="fas fa-comment-dots text-2xl"></i></div><div class="icon-box" onclick="shareVideo('${title}')"><i class="fas fa-share text-2xl"></i></div><div class="icon-box" onclick="deleteVideo(${id})"><i class="fas fa-trash text-2xl text-red-500"></i></div></div>`;
            const v = card.querySelector('video');
            videoObserver.observe(v);
            document.getElementById('mainFeed').prepend(card);
        }

        function deleteVideo(id) { if(confirm("Delete video?")) { const tx = db.transaction("shorts", "readwrite"); tx.objectStore("shorts").delete(id); tx.oncomplete = () => loadFromDB(); } }
        function shareVideo(t) { if(navigator.share) navigator.share({title: t}); }
        function sendComment() { const input = document.getElementById('commentInput'); if(input.value) { const div = document.createElement('div'); div.className = "bg-zinc-800 p-2 rounded text-sm"; div.innerText = input.value; document.getElementById('comment-list').appendChild(div); input.value = ""; } }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function toggleComments() { document.getElementById('comment-panel').classList.toggle('show-comments'); }
        function addToGrid(id, url) { const div = document.createElement('div'); div.className = 'grid-item'; div.innerHTML = `<video src="${url}" class="w-full h-full object-cover"></video>`; document.getElementById('video-grid').prepend(div); }
        document.getElementById('fileInput').onchange = e => { if(e.target.files[0]) { document.getElementById('preview-box').innerHTML = `<video src="${URL.createObjectURL(e.target.files[0])}" class="w-full h-full object-cover" autoplay loop muted></video>`; showScreen('edit-screen'); } };
        function handleProfileClick() { const content = document.getElementById('auth-content'); if(!userData) content.innerHTML = `<button onclick="mockLogin()" class="bg-white text-black p-3 rounded w-full">Sign in</button>`; else content.innerHTML = `<h2>${userData.name}</h2><button onclick="localStorage.removeItem('vactra_user'); location.reload();" class="text-red-500">Sign Out</button>`; showScreen('profile-screen'); }
        function mockLogin() { const n = prompt("Name:"); if(n) { userData = {name:n}; localStorage.setItem('vactra_user', JSON.stringify(userData)); handleProfileClick(); } }
    </script>
</body>
</html>
