<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Upload Active</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; font-family: sans-serif; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .ui-overlay { position: absolute; bottom: 0; width: 100%; padding: 40px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); pointer-events: none; }
        /* Plus Icon Animation */
        .plus-btn:active { transform: scale(0.9); transition: 0.1s; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-6 flex justify-between items-center z-50 bg-gradient-to-b from-black/60 to-transparent">
        <h1 class="text-2xl font-black italic tracking-tighter">VACTRA <span class="text-blue-500">FLOW</span></h1>
        <div class="flex gap-5 text-xl"><i class="fas fa-search"></i><i class="fas fa-camera"></i></div>
    </header>

    <main class="feed" id="mainFeed">
        <div class="card" id="firstCard">
            <video loop playsinline autoplay muted id="bgVideo">
                <source src="https://player.vimeo.com/external/370331493.sd.mp4?s=34015694200c0182470ecf6406e30a516e8b4e7a&profile_id=139&oauth2_token_id=57447761" type="video/mp4">
            </video>
            <div class="ui-overlay">
                <p class="font-bold text-lg" id="userName">@Asheesh_Kumar</p>
                <p class="text-sm opacity-90" id="videoDesc">Click (+) to upload your video! 🚀</p>
            </div>
        </div>
    </main>

    <input type="file" id="videoUpload" accept="video/*" style="display: none;">

    <nav class="fixed bottom-0 w-full bg-black/95 border-t border-white/10 flex justify-around items-center py-4 z-50">
        <i class="fas fa-home text-2xl text-blue-500"></i>
        <i class="fas fa-bolt text-2xl text-gray-500"></i>
        
        <div onclick="document.getElementById('videoUpload').click()" class="plus-btn bg-white text-black px-5 py-1 rounded-xl font-bold text-3xl shadow-lg cursor-pointer">
            +
        </div>
        
        <i class="fas fa-envelope text-2xl text-gray-500"></i>
        <i class="fas fa-user-circle text-2xl text-gray-500"></i>
    </nav>

    <script>
        const videoInput = document.getElementById('videoUpload');
        const mainFeed = document.getElementById('mainFeed');

        // Function: Jab video select ho jaye
        videoInput.onchange = function(event) {
            const file = event.target.files[0];
            if (file) {
                const videoURL = URL.createObjectURL(file);
                
                // Naya video card banana
                const newCard = document.createElement('div');
                newCard.className = 'card';
                newCard.innerHTML = `
                    <video loop playsinline autoplay src="${videoURL}"></video>
                    <div class="ui-overlay">
                        <p class="font-bold text-lg">@Asheesh_Kumar</p>
                        <p class="text-sm opacity-90">Aapki New Uploaded Video! 🔥</p>
                    </div>
                `;
                
                // Naye video ko sabse upar jodne ke liye
                mainFeed.prepend(newCard);
                
                // Direct scroll to new video
                newCard.scrollIntoView({ behavior: 'smooth' });
            }
        };

        // Swipe play/pause logic
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (video) {
                    entry.isIntersecting ? video.play().catch(() => {}) : video.pause();
                }
            });
        }, { threshold: 0.6 });

        // Naye cards ko bhi monitor karne ke liye
        const updateObserver = () => {
            document.querySelectorAll('.card').forEach(card => observer.observe(card));
        };
        updateObserver();
        
        // Refresh observer when new video added
        const observerConfig = { childList: true };
        const feedObserver = new MutationObserver(updateObserver);
        feedObserver.observe(mainFeed, observerConfig);
    </script>

</body>
</html>
