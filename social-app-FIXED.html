<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Smooth Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; overflow: hidden; font-family: sans-serif; }
        .video-container {
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }
        .video-container::-webkit-scrollbar { display: none; }
        .video-card {
            scroll-snap-align: start;
            height: 100vh;
            width: 100%;
            position: relative;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .v-logo {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-4 flex justify-between items-center bg-gradient-to-b from-black/70 to-transparent z-50">
        <div class="flex items-center gap-1">
            <span class="v-logo">V</span>
            <span class="text-lg font-bold">Flow</span>
        </div>
        <div class="flex gap-4 text-lg">
            <i class="fas fa-search"></i>
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <main class="video-container" id="videoContainer">
        
        <div class="video-card">
            <video loop muted playsinline class="player">
                <source src="https://v1.nitrocdn.com/dQkrEExoHshFzWpLNoNidLpUqBwJkEAt/assets/static/optimized/rev-5916892/wp-content/uploads/2022/01/hero-video.mp4" type="video/mp4">
            </video>
            <div class="absolute bottom-20 left-4">
                <p class="font-bold text-lg">@Asheesh_Kumar</p>
                <p class="text-sm opacity-80">Bhopal's Tech System! 🚀 #Vactra</p>
            </div>
            <div class="absolute bottom-24 right-4 flex flex-col gap-6 text-center">
                <i class="fas fa-heart text-2xl" onclick="this.classList.toggle('text-red-500')"></i>
                <i class="fas fa-comment-dots text-2xl"></i>
                <i class="fas fa-share text-2xl"></i>
            </div>
        </div>

        <div class="video-card">
            <video loop muted playsinline class="player">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-connection-background-30232-large.mp4" type="video/mp4">
            </video>
            <div class="absolute bottom-20 left-4">
                <p class="font-bold text-lg">@Vactra_Tech</p>
                <p class="text-sm opacity-80">Future of AI Content 🧬</p>
            </div>
            <div class="absolute bottom-24 right-4 flex flex-col gap-6 text-center">
                <i class="fas fa-heart text-2xl" onclick="this.classList.toggle('text-red-500')"></i>
                <i class="fas fa-comment-dots text-2xl"></i>
                <i class="fas fa-share text-2xl"></i>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-black/90 flex justify-around items-center py-5 border-t border-white/10 z-50">
        <i class="fas fa-home text-blue-500 text-xl"></i>
        <i class="fas fa-compass text-gray-500 text-xl"></i>
        <div class="bg-white text-black px-4 py-1 rounded-md font-bold text-xl">+</div>
        <i class="fas fa-comment text-gray-500 text-xl"></i>
        <i class="fas fa-user text-gray-500 text-xl"></i>
    </nav>

    <script>
        // Automatic Play/Pause on Scroll
        const videos = document.querySelectorAll('.player');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.play();
                } else {
                    entry.target.pause();
                }
            });
        }, { threshold: 0.7 });

        videos.forEach(v => observer.observe(v));

        // Click to play first video (Browser Policy Fix)
        window.addEventListener('click', () => {
            videos[0].play();
        }, { once: true });
    </script>
</body>
</html>
