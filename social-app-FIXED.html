<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        
        /* Shorts/Home Feed */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Icons & Sidebar */
        .sidebar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 1000; }
        .icon-box { text-align: center; cursor: pointer; }
        .bottom-info { position: absolute; bottom: 100px; left: 15px; z-index: 1000; }

        /* Profile Screen */
        #profile-screen { background: #050505; overflow-y: auto; padding-bottom: 80px; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="feed" id="mainFeed">
            <div class="card">
                <video loop playsinline autoplay muted src="https://player.vimeo.com/external/370331493.sd.mp4?s=34015694200c0182470ecf6406e30a516e8b4e7a&profile_id=139&oauth2_token_id=57447761"></video>
                <div class="bottom-info">
                    <p class="font-bold text-lg">@Asheesh_Kumar</p>
                    <p class="text-sm">Bhopal ka apna flow! 🍎🚀</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box"><i class="fas fa-heart text-3xl"></i><p class="text-xs">1.2M</p></div>
                    <div class="icon-box"><i class="fas fa-comment-dots text-3xl"></i><p class="text-xs">45K</p></div>
                    <div class="icon-box"><i class="fas fa-share text-3xl"></i><p class="text-xs">Share</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="profile-screen" class="screen px-6 pt-12">
        <div class="flex flex-col items-center">
            <div class="w-24 h-24 bg-blue-900 rounded-full border-2 border-blue-500 mb-4 flex items-center justify-center text-3xl font-bold">AK</div>
            <h2 class="text-2xl font-bold text-white">Asheesh Kumar</h2>
            <p class="text-gray-400 text-sm">Pharmacy Student | Content Creator</p>
            <div class="flex gap-8 mt-6 text-center">
                <div><p class="font-bold">128</p><p class="text-xs text-gray-500">Following</p></div>
                <div><p class="font-bold">45.2K</p><p class="text-xs text-gray-500">Followers</p></div>
                <div><p class="font-bold">1.2M</p><p class="text-xs text-gray-500">Likes</p></div>
            </div>
            <button class="mt-6 bg-white text-black px-12 py-2 rounded-md font-bold w-full">Edit Profile</button>
        </div>
        <div class="grid grid-cols-3 gap-1 mt-8">
            <div class="aspect-[3/4] bg-gray-900"></div>
            <div class="aspect-[3/4] bg-gray-900"></div>
            <div class="aspect-[3/4] bg-gray-900"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black border-t border-white/10 flex justify-around items-center py-4 z-[9999]">
        <i onclick="showScreen('home-screen')" class="fas fa-home text-2xl cursor-pointer"></i>
        <div onclick="triggerUpload()" class="bg-white text-black px-4 py-1 rounded-lg font-bold text-2xl cursor-pointer">+</div>
        <i onclick="showScreen('profile-screen')" class="fas fa-user-circle text-2xl cursor-pointer text-gray-500"></i>
    </nav>

    <input type="file" id="fileUp" accept="video/*" class="hidden">

    <script>
        // 1. Navigation Logic
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Icon color change logic
            const homeIcon = document.querySelector('.fa-home');
            const userIcon = document.querySelector('.fa-user-circle');
            if(id === 'home-screen') {
                homeIcon.classList.add('text-white');
                userIcon.classList.add('text-gray-500');
            } else {
                userIcon.classList.add('text-white');
                homeIcon.classList.add('text-gray-500');
            }
        }

        // 2. Upload Logic
        function triggerUpload() {
            document.getElementById('fileUp').click();
        }

        document.getElementById('fileUp').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const newCard = document.createElement('div');
                newCard.className = 'card';
                newCard.innerHTML = `
                    <video loop playsinline autoplay src="${url}"></video>
                    <div class="bottom-info"><p class="font-bold text-lg">@Asheesh_Kumar</p></div>
                    <div class="sidebar">
                        <div class="icon-box"><i class="fas fa-heart text-3xl"></i><p class="text-xs">0</p></div>
                        <div class="icon-box"><i class="fas fa-comment-dots text-3xl"></i><p class="text-xs">0</p></div>
                        <div class="icon-box"><i class="fas fa-share text-3xl"></i><p class="text-xs">Share</p></div>
                    </div>
                `;
                document.getElementById('mainFeed').prepend(newCard);
                showScreen('home-screen'); // Upload ke baad home par le jaye
                newCard.scrollIntoView({ behavior: 'smooth' });
            }
        };
    </script>
</body>
</html>
