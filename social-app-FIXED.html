<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Professional Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        
        /* Feed */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Sidebar & Info */
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; }
        .bottom-info { position: absolute; bottom: 120px; left: 15px; z-index: 1000; max-width: 80%; }
        
        /* --- COMMENT PANEL LOGIC --- */
        #comment-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh;
            background: #1c1c1c; border-radius: 20px 20px 0 0; z-index: 7000;
            transition: bottom 0.4s ease-out;
        }
        .show-comments { bottom: 0 !important; }

        /* Navigation */
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #aaa; cursor: pointer; }
        .active-nav { color: white; }

        /* Screens Styling */
        #edit-screen, #profile-screen { background: #0f0f0f; z-index: 6000; overflow-y: auto; }
        .input-group { background: #272727; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
        input, textarea { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed"></div>
    </div>

    <div id="comment-panel">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
            <span class="font-bold text-lg">Comments</span>
            <i class="fas fa-times text-xl cursor-pointer" onclick="toggleComments()"></i>
        </div>
        <div class="p-6 overflow-y-auto h-full pb-20">
            <div class="flex gap-3 mb-4">
                <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-bold">K</div>
                <div><p class="text-xs font-bold text-gray-400">@Kuldeep</p><p class="text-sm">Bhai Bhopal mein kab mil rahe ho? App mast hai! 🔥</p></div>
            </div>
            <div class="mt-10 text-center text-gray-500 text-sm">Add your comment...</div>
        </div>
    </div>

    <div id="edit-screen" class="screen">
        <div class="p-4 flex items-center justify-between border-b border-zinc-800">
            <i class="fas fa-arrow-left text-xl cursor-pointer" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Add details</span>
            <button onclick="publishVideo()" class="bg-blue-600 px-6 py-1.5 rounded-full font-bold text-sm">Upload</button>
        </div>
        <div class="p-4">
            <div id="preview-box" class="w-full aspect-video bg-zinc-900 rounded-xl mb-6 flex items-center justify-center border border-zinc-700"></div>
            <div class="input-group"><input type="text" id="vTitle" placeholder="Video Title..."></div>
            <div class="input-group"><textarea id="vDesc" rows="2" placeholder="Description..."></textarea></div>
            <div class="input-group"><input type="text" id="vTags" placeholder="#Tags (e.g. #pharmacy #vactra)"></div>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <div class="p-4 flex items-center border-b border-zinc-800"><i class="fas fa-arrow-left text-xl mr-4" onclick="showScreen('home-screen')"></i><span class="font-bold text-xl">Profile</span></div>
        <div class="p-8 text-center">
            <div class="w-24 h-24 bg-zinc-800 rounded-full mx-auto border-4 border-red-600 flex items-center justify-center text-3xl font-bold">AK</div>
            <h2 class="mt-4 text-2xl font-bold">Asheesh Kumar</h2>
            <p class="text-gray-400">Pharmacy Student | Content Creator</p>
            <div class="flex justify-around mt-8 bg-zinc-900 p-4 rounded-xl">
                <div><p class="font-bold">45.2K</p><p class="text-[10px] text-gray-500">Followers</p></div>
                <div><p class="font-bold">1.2M</p><p class="text-[10px] text-gray-500">Likes</p></div>
            </div>
            <button class="w-full mt-6 bg-white text-black font-bold py-2 rounded-lg">Edit Profile</button>
        </div>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl mb-1"></i><span>Home</span></div>
        <div class="nav-item" onclick="showScreen('home-screen')"><i class="fas fa-play-circle text-xl mb-1"></i><span>Shorts</span></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-4xl font-light cursor-pointer">+</div>
        <div class="nav-item"><i class="fas fa-layer-group text-xl mb-1"></i><span>Subs</span></div>
        <div class="nav-item" onclick="showScreen('profile-screen')"><i class="fas fa-user-circle text-xl mb-1"></i><span>You</span></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let currentUrl = "";

        // --- LOCAL STORAGE: PERMANENT SAVE ---
        window.onload = function() {
            const saved = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
            saved.forEach(v => renderVideo(v.url, v.title, v.desc, v.tags));
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'home-screen') toggleComments(false); // Band karo comments agar doosri screen par jayein
        }

        function toggleComments(forceClose = null) {
            const panel = document.getElementById('comment-panel');
            if(forceClose === false) panel.classList.remove('show-comments');
            else panel.classList.toggle('show-comments');
        }

        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                currentUrl = URL.createObjectURL(file);
                document.getElementById('preview-box').innerHTML = `<video src="${currentUrl}" class="h-full" muted autoplay loop></video>`;
                showScreen('edit-screen');
            }
        };

        function publishVideo() {
            const t = document.getElementById('vTitle').value || "New Video";
            const d = document.getElementById('vDesc').value || "";
            const tags = document.getElementById('vTags').value || "";

            renderVideo(currentUrl, t, d, tags);

            // Database mein save karo
            const db = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
            db.unshift({url: currentUrl, title: t, desc: d, tags: tags});
            localStorage.setItem('vactra_pro_db', JSON.stringify(db));

            showScreen('home-screen');
            alert("Bhai, Video Permanently Save ho gayi! 🍎🚀");
        }

        function renderVideo(url, title, desc, tags) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video loop playsinline autoplay src="${url}"></video>
                <div class="bottom-info">
                    <p class="font-bold">@Asheesh_Kumar</p>
                    <p class="text-sm mt-1">${title}</p>
                    <p class="text-xs text-blue-400 mt-1">${tags}</p>
                    <p class="text-[10px] opacity-70 mt-1">${desc}</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="this.classList.toggle('text-red-500')"><i class="fas fa-heart text-2xl"></i><p class="text-[10px]">1.2M</p></div>
                    <div class="icon-box" onclick="toggleComments()"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px]">45K</p></div>
                    <div class="icon-box" onclick="navigator.share({title: '${title}'})"><i class="fas fa-share text-2xl"></i><p class="text-[10px]">Share</p></div>
                </div>`;
            document.getElementById('mainFeed').prepend(card);
        }
    </script>
</body>
</html>
