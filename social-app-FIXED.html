<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">
    <div class="text-center p-8 bg-gray-900 rounded-lg shadow-xl border border-blue-500">
        <h1 class="text-3xl font-bold mb-6 text-blue-400">Vactra Flow</h1>
        <p class="mb-8 text-gray-400">Apne Google account se login karein</p>
        
        <button onclick="loginWithGoogle()" class="bg-white text-black px-6 py-3 rounded-full font-bold flex items-center gap-3 hover:bg-gray-200 transition-all mx-auto">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
            Login with Google
        </button>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCx_ZUADYlOtBDOyJgB...", 
        authDomain: "vactra-flow-ca379.firebaseapp.com",
        projectId: "vactra-flow-ca379",
        storageBucket: "vactra-flow-ca379.appspot.com",
        messagingSenderId: "954998039321",
        appId: "1:954998039321:web:b926ed..."
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      window.loginWithGoogle = () => {
        signInWithPopup(auth, provider).then((result) => {
          alert("Namaste " + result.user.displayName + "!");
          // Yahan aap login ke baad user ko kahan bhejna chahte hain, wo link daal sakte hain
        }).catch((error) => {
          alert("Login error: " + error.message);
        });
      };
    </script>
</body>
</html>
