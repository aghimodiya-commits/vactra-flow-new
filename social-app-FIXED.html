<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        
        /* Feed */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Grid for Profile Videos */
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; overflow: hidden; position: relative; }
        .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar & Nav */
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #aaa; cursor: pointer; }
        .active-nav { color: white; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent text-white">
            <h1 class="text-xl font-black italic uppercase">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed" onscroll="handleScroll()"></div>
    </div>

    <div id="profile-screen" class="screen bg-black overflow-y-auto pb-20">
        <div class="p-4 border-b border-zinc-900 flex items-center sticky top-0 bg-black z-10">
            <i class="fas fa-arrow-left mr-4" onclick="showScreen('home-screen')"></i>
            <span id="display-name" class="font-bold uppercase tracking-tight">Channel</span>
        </div>
        
        <div id="auth-content" class="p-6 text-center">
            </div>

        <div class="border-t border-zinc-900">
            <div class="flex justify-around p-3 text-sm font-bold text-gray-400">
                <span class="text-white border-b-2 border-white pb-1">VIDEOS</span>
                <span>SHORTS</span>
                <span>LIKED</span>
            </div>
            <div id="user-video-grid" class="video-grid"></div>
        </div>
    </div>

    <div id="edit-screen" class="screen bg-black">
        <div class="p-4 flex items-center justify-between">
            <i class="fas fa-times text-xl" onclick="showScreen('home-screen')"></i>
            <button onclick="publishVideo()" class="bg-blue-600 text-white px-4 py-1.5 rounded-full font-bold">UPLOAD</button>
        </div>
        <div id="preview-box" class="w-full h-[60vh] bg-zinc-900"></div>
        <div class="p-4">
            <input type="text" id="vTitle" placeholder="Caption..." class="w-full bg-zinc-900 p-3 rounded-lg outline-none mb-3">
        </div>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl"></i><span>Home</span></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-4xl font-light">+</div>
        <div class="nav-item" onclick="handleProfileClick()"><i class="fas fa-user-circle text-xl"></i><span>You</span></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let currentUrl = "";
        let userData = JSON.parse(localStorage.getItem('vactra_user')) || null;

        window.onload = function() {
            const saved = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
            saved.forEach(v => {
                renderVideo(v.url, v.title);
                addVideoToProfile(v.url); // Profile mein bhi dikhao
            });
            updateProfileUI();
        };

        function handleProfileClick() {
            updateProfileUI();
            showScreen('profile-screen');
        }

        function updateProfileUI() {
            const content = document.getElementById('auth-content');
            if (!userData) {
                content.innerHTML = `<button onclick="mockGmailLogin()" class="bg-white text-black p-3 rounded-lg font-bold">Sign in with Gmail</button>`;
            } else {
                document.getElementById('display-name').innerText = userData.name;
                content.innerHTML = `
                    <div class="w-20 h-20 bg-red-600 rounded-full mx-auto flex items-center justify-center text-2xl font-bold mb-3">${userData.name.charAt(0)}</div>
                    <h2 class="text-xl font-bold">${userData.name}</h2>
                    <div class="flex justify-center gap-6 mt-4 text-gray-400 text-xs">
                        <span><b>45K</b> Subs</span> <span><b>1.2M</b> Likes</span>
                    </div>
                `;
            }
        }

        function mockGmailLogin() {
            const name = prompt("Name:");
            const email = prompt("Email:");
            if (name) {
                userData = { name, email };
                localStorage.setItem('vactra_user', JSON.stringify(userData));
                updateProfileUI();
            }
        }

        function handleScroll() {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) v.play();
                else v.pause();
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                currentUrl = URL.createObjectURL(file);
                document.getElementById('preview-box').innerHTML = `<video src="${currentUrl}" class="w-full h-full object-cover" autoplay muted loop></video>`;
                showScreen('edit-screen');
            }
        };

        function publishVideo() {
            const t = document.getElementById('vTitle').value || "Short";
            renderVideo(currentUrl, t);
            addVideoToProfile(currentUrl); // Yahan fix kiya hai!
            const db = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
            db.unshift({url: currentUrl, title: t});
            localStorage.setItem('vactra_pro_db', JSON.stringify(db));
            showScreen('home-screen');
            alert("Success! 🚀");
        }

        function renderVideo(url, title) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<video loop src="${url}"></video><div class="bottom-info"><p class="font-bold">@${userData?userData.name:'User'}</p><p class="text-sm">${title}</p></div>`;
            document.getElementById('mainFeed').prepend(card);
        }

        // --- NEW FUNCTION: Profile mein video add karne ke liye ---
        function addVideoToProfile(url) {
            const grid = document.getElementById('user-video-grid');
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.innerHTML = `<video src="${url}" muted></video>`;
            grid.prepend(item);
        }
    </script>
</body>
</html>
