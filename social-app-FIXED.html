<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; overflow-y: auto; padding-bottom: 70px; }
        .active { display: block; }
        
        /* Shorts View */
        .shorts-feed { scroll-snap-type: y mandatory; overflow-y: scroll; height: 100vh; scrollbar-width: none; }
        .short-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        .short-card video { width: 100%; height: 100%; object-fit: cover; }

        /* Home View */
        .video-item { width: 100%; margin-bottom: 20px; }
        .video-item video { width: 100%; aspect-ratio: 16/9; background: #111; }

        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 5000; }
        .nav-item { color: #aaa; font-size: 10px; text-align: center; cursor: pointer; }
        .active-nav { color: white; }
        
        .sidebar { position: absolute; right: 12px; bottom: 150px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="p-4 flex justify-between items-center sticky top-0 bg-black z-10">
            <h1 class="text-xl font-black text-red-600">VACTRA <span class="text-white">FLOW</span></h1>
        </div>
        <div id="home-feed" class="p-2"></div>
    </div>

    <div id="shorts-screen" class="screen">
        <div id="shorts-feed" class="shorts-feed" onscroll="checkVideoPlay()"></div>
    </div>

    <div id="profile-screen" class="screen bg-zinc-950 p-6">
        <div id="user-info" class="text-center mb-8"></div>
        <div class="grid grid-cols-3 gap-1" id="my-video-grid"></div>
    </div>

    <div id="upload-screen" class="screen bg-black">
        <div class="p-4 flex justify-between border-b border-zinc-800">
            <i class="fas fa-arrow-left" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Create</span>
            <button id="upBtn" onclick="saveToDB()" class="text-blue-500 font-bold">Post</button>
        </div>
        <div id="preview" class="w-full h-64 bg-zinc-900"></div>
        <div class="p-4 space-y-4">
            <input type="text" id="vTitle" placeholder="Title..." class="w-full bg-zinc-800 p-3 rounded">
            <select id="vType" class="w-full bg-zinc-800 p-3 rounded">
                <option value="long">Long Video (Home)</option>
                <option value="short">Short Video (Shorts)</option>
            </select>
        </div>
    </div>

    <nav>
        <div class="nav-item" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl"></i><p>Home</p></div>
        <div class="nav-item" onclick="showScreen('shorts-screen')"><i class="fas fa-play-circle text-xl"></i><p>Shorts</p></div>
        <div onclick="document.getElementById('fInp').click()" class="text-3xl font-light text-white">+</div>
        <div class="nav-item" onclick="showScreen('profile-screen')"><i class="fas fa-user-circle text-xl"></i><p>You</p></div>
    </nav>

    <input type="file" id="fInp" accept="video/*" class="hidden">

    <script>
        let db;
        let selectedFile = null;
        let userData = JSON.parse(localStorage.getItem('vactra_user')) || {name: "Asheesh", email: "ash@vactra.com"};

        // IndexedDB Connection (YouTube Style Storage)
        const request = indexedDB.open("VactraDatabase", 2);
        request.onupgradeneeded = e => {
            db = e.target.result;
            if(!db.objectStoreNames.contains("content")) db.createObjectStore("content", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = e => { db = e.target.result; loadAllContent(); };

        function saveToDB() {
            const title = document.getElementById('vTitle').value;
            const type = document.getElementById('vType').value;
            const btn = document.getElementById('upBtn');
            if(!selectedFile) return;

            btn.innerText = "Saving...";
            const reader = new FileReader();
            reader.readAsDataURL(selectedFile);
            reader.onload = () => {
                const tx = db.transaction("content", "readwrite");
                tx.objectStore("content").add({ url: reader.result, title, type, user: userData.name });
                tx.oncomplete = () => { location.reload(); };
            };
        }

        function loadAllContent() {
            const store = db.transaction("content", "readonly").objectStore("content");
            store.getAll().onsuccess = e => {
                e.target.result.forEach(item => {
                    if(item.type === 'short') renderShort(item);
                    else renderHome(item);
                    addThumbnail(item);
                });
                checkVideoPlay();
            };
            updateProfileUI();
        }

        function renderHome(v) {
            const div = document.createElement('div');
            div.className = 'video-item';
            div.innerHTML = `<video src="${v.url}" controls></video><div class="p-2"><p class="font-bold">${v.title}</p><p class="text-xs text-gray-400">@${v.user}</p></div>`;
            document.getElementById('home-feed').prepend(div);
        }

        function renderShort(v) {
            const div = document.createElement('div');
            div.className = 'short-card';
            div.innerHTML = `
                <video loop src="${v.url}"></video>
                <div class="sidebar">
                    <i class="fas fa-heart text-2xl"></i>
                    <i class="fas fa-comment-dots text-2xl"></i>
                    <i class="fas fa-share text-2xl"></i>
                </div>
                <div class="absolute bottom-24 left-4">
                    <p class="font-bold">@${v.user}</p>
                    <p class="text-sm">${v.title}</p>
                </div>`;
            document.getElementById('shorts-feed').prepend(div);
        }

        function addThumbnail(v) {
            const div = document.createElement('div');
            div.className = 'aspect-[9/16] bg-zinc-800 overflow-hidden';
            div.innerHTML = `<video src="${v.url}" class="w-full h-full object-cover" muted></video>`;
            document.getElementById('my-video-grid').prepend(div);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'shorts-screen') checkVideoPlay();
            else document.querySelectorAll('video').forEach(v => v.pause());
        }

        document.getElementById('fInp').onchange = e => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                document.getElementById('preview').innerHTML = `<video src="${URL.createObjectURL(selectedFile)}" class="w-full h-full object-contain" muted autoplay loop></video>`;
                showScreen('upload-screen');
            }
        };

        function checkVideoPlay() {
            document.querySelectorAll('.short-card video').forEach(v => {
                const rect = v.getBoundingClientRect();
                if(rect.top >= 0 && rect.bottom <= window.innerHeight) v.play().catch(()=>{});
                else v.pause();
            });
        }

        function updateProfileUI() {
            document.getElementById('user-info').innerHTML = `
                <div class="w-20 h-20 bg-red-600 rounded-full mx-auto flex items-center justify-center text-3xl font-bold mb-2">${userData.name[0]}</div>
                <h2 class="text-xl font-bold">${userData.name}</h2>
                <p class="text-gray-400 text-sm">Channel • Manage videos</p>`;
        }
    </script>
</body>
</html>
