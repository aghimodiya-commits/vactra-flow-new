<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Shorts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Shorts ki tarah scroll karne ke liye */
        .video-container {
            height: calc(100vh - 120px);
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
        }
        .video-card {
            scroll-snap-align: start;
            height: 100%;
        }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">

    <header class="p-4 flex justify-between items-center bg-black sticky top-0 z-50">
        <div class="flex items-center gap-1">
            <i class="fab fa-youtube text-red-600 text-3xl"></i>
            <h1 class="text-xl font-bold tracking-tighter">Vactra <span class="font-normal text-gray-300 italic text-sm">Flow</span></h1>
        </div>
        <div class="flex gap-5 text-xl">
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <main class="video-container px-2">
        <div class="video-card relative mb-4 rounded-3xl overflow-hidden bg-gray-900 flex items-center justify-center border border-gray-800">
             <div class="text-center">
                <i class="fas fa-play text-4xl text-blue-500 mb-2"></i>
                <p class="text-gray-400">Pehli Video Load Ho Rahi Hai...</p>
             </div>
             <div class="absolute bottom-4 left-4">
                 <p class="font-bold text-lg">@Asheesh_Kumar</p>
                 <p class="text-sm">Vactra Flow ka pehla look! #Shorts #Vactra</p>
             </div>
             <div class="absolute bottom-20 right-4 flex flex-col gap-6 text-2xl">
                 <i class="fas fa-thumbs-up"></i>
                 <i class="fas fa-comment"></i>
                 <i class="fas fa-share"></i>
             </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around items-center py-3 z-50">
        <div class="flex flex-col items-center gap-1">
            <i class="fas fa-home text-lg text-white"></i>
            <span class="text-[10px]">Home</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-50">
            <i class="fas fa-bolt text-lg"></i>
            <span class="text-[10px]">Shorts</span>
        </div>
        <div class="flex flex-col items-center">
            <i class="fas fa-plus-circle text-4xl"></i>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-50">
            <i class="fas fa-layer-group text-lg"></i>
            <span class="text-[10px]">Library</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-50">
            <i class="fas fa-user-circle text-lg"></i>
            <span class="text-[10px]">You</span>
        </div>
    </nav>

</body>
</html>
