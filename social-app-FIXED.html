<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        
        /* Feed */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Sidebar & Info */
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; }
        .bottom-info { position: absolute; bottom: 120px; left: 15px; z-index: 1000; max-width: 80%; }
        
        /* Comment Panel */
        #comment-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh;
            background: #1c1c1c; border-radius: 20px 20px 0 0; z-index: 7000;
            transition: bottom 0.3s ease-out; display: flex; flex-direction: column;
        }
        .show-comments { bottom: 0 !important; }

        /* Navigation */
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #aaa; cursor: pointer; }
        .active-nav { color: white; }

        /* --- YOUTUBE EDIT SCREEN STYLING --- */
        #edit-screen { background: #000; z-index: 6000; }
        .edit-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(0,0,0,0.5); position: absolute; top: 0; width: 100%; z-index: 10; }
        .edit-tools-sidebar { position: absolute; right: 15px; top: 80px; display: flex; flex-direction: column; gap: 25px; z-index: 10; }
        .bottom-edit-bar { position: absolute; bottom: 220px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 10; }
        .edit-btn { display: flex; flex-direction: column; align-items: center; font-size: 11px; text-shadow: 1px 1px 2px black; }
        
        .upload-details-card { background: #1c1c1c; padding: 15px; border-radius: 20px 20px 0 0; position: absolute; bottom: 0; width: 100%; z-index: 20; }
        .input-box { background: #2f2f2f; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        input, textarea { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed" onscroll="handleScroll()"></div>
    </div>

    <div id="comment-panel">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
            <span class="font-bold text-lg">Comments</span>
            <i class="fas fa-times text-xl cursor-pointer" onclick="toggleComments()"></i>
        </div>
        <div id="comment-list" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-3 border-t border-zinc-800 bg-zinc-900 flex items-center gap-3">
            <input type="text" id="comment-input" placeholder="Add a comment..." class="flex-1 bg-zinc-800 rounded-full px-4 py-2 text-sm outline-none">
            <button onclick="postComment()" class="text-blue-500 font-bold px-2">Post</button>
        </div>
    </div>

    <div id="edit-screen" class="screen">
        <div class="edit-header">
            <i class="fas fa-chevron-left text-xl" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Edit</span>
            <button onclick="publishVideo()" class="bg-white text-black px-4 py-1 rounded-full font-bold text-sm">UPLOAD</button>
        </div>

        <div id="preview-box" class="w-full h-full bg-zinc-900"></div>

        <div class="edit-tools-sidebar">
            <div class="edit-btn"><i class="fas fa-magic text-2xl"></i><span>Filters</span></div>
            <div class="edit-btn"><i class="fas fa-stopwatch text-2xl"></i><span>Speed</span></div>
            <div class="edit-btn"><i class="fas fa-sync text-2xl"></i><span>Flip</span></div>
        </div>

        <div class="bottom-edit-bar">
            <div class="edit-btn"><i class="fas fa-music text-2xl"></i><span>Add Sound</span></div>
            <div class="edit-btn"><i class="fas fa-font text-2xl"></i><span>Text</span></div>
            <div class="edit-btn"><i class="fas fa-sliders-h text-2xl"></i><span>Adjust</span></div>
        </div>

        <div class="upload-details-card">
            <div class="input-box"><input type="text" id="vTitle" placeholder="Caption your short..."></div>
            <div class="input-box"><input type="text" id="vTags" placeholder="#Tags (e.g. #Bhopal #Pharmacy)"></div>
            <p class="text-[10px] text-gray-500 px-2 mt-1">This video will be public on Vactra Flow.</p>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <div class="p-4 border-b border-zinc-800 flex items-center"><i class="fas fa-arrow-left mr-4" onclick="showScreen('home-screen')"></i><span class="font-bold">You</span></div>
        <div class="p-10 text-center">
            <div class="w-24 h-24 bg-zinc-800 rounded-full mx-auto border-4 border-red-600 flex items-center justify-center text-3xl font-bold">AK</div>
            <h2 class="mt-4 text-2xl font-bold">Asheesh Kumar</h2>
            <p class="text-gray-400">Pharmacy Student | Bhopal</p>
            <div class="flex justify-around mt-8 bg-zinc-900 p-4 rounded-xl">
                <div><p class="font-bold">45K</p><p class="text-[10px] text-gray-500">Followers</p></div>
                <div><p class="font-bold">1.2M</p><p class="text-[10px] text-gray-500">Likes</p></div>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl mb-1"></i><span>Home</span></div>
        <div class="nav-item"><i class="fas fa-play-circle text-xl mb-1"></i><span>Shorts</span></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-4xl font-light cursor-pointer">+</div>
        <div class="nav-item"><i class="fas fa-layer-group text-xl mb-1"></i><span>Subs</span></div>
        <div class="nav-item" onclick="showScreen('profile-screen')"><i class="fas fa-user-circle text-xl mb-1"></i><span>You</span></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let currentUrl = "";

        window.onload = function() {
            const saved = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
            saved.forEach(v => renderVideo(v.url, v.title, v.tags));
            handleScroll();
        };

        function handleScroll() {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) { v.play(); } 
                else { v.pause(); }
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'home-screen') document.querySelectorAll('video').forEach(v => v.pause());
            else handleScroll();
        }

        function toggleComments(force = null) {
            const p = document.getElementById('comment-panel');
            if(force === false) p.classList.remove('show-comments');
            else p.classList.toggle('show-comments');
        }

        function postComment() {
            const input = document.getElementById('comment-input');
            if (input.value.trim() !== "") {
                const div = document.createElement('div');
                div.className = "flex gap-3";
                div.innerHTML = `<div class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center text-[10px] font-bold">AK</div>
                                <div><p class="text-xs font-bold text-gray-400">@Asheesh_Kumar</p><p class="text-sm">${input.value}</p></div>`;
                document.getElementById('comment-list').prepend(div);
                input.value = "";
            }
        }

        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                currentUrl = URL.createObjectURL(file);
                document.getElementById('preview-box').innerHTML = `<video src="${currentUrl}" class="w-full h-full object-cover" muted autoplay loop></video>`;
                showScreen('edit-screen');
            }
        };

        function publishVideo() {
            const t = document.getElementById('vTitle').value || "New Short";
            const tags = document.getElementById('vTags').value || "";
            renderVideo(currentUrl, t, tags);
            const db = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
            db.unshift({url: currentUrl, title: t, tags: tags});
            localStorage.setItem('vactra_pro_db', JSON.stringify(db));
            showScreen('home-screen');
            alert("Bhai, Short Upload ho gaya! 🍎🚀");
        }

        function renderVideo(url, title, tags) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video loop playsinline src="${url}"></video>
                <div class="bottom-info">
                    <p class="font-bold">@Asheesh_Kumar</p>
                    <p class="text-sm mt-1">${title}</p>
                    <p class="text-xs text-blue-400 mt-1">${tags}</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="this.classList.toggle('text-red-500')"><i class="fas fa-heart text-2xl"></i><p class="text-[10px]">1.2M</p></div>
                    <div class="icon-box" onclick="toggleComments()"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px]">45K</p></div>
                    <div class="icon-box" onclick="navigator.share({title: '${title}'})"><i class="fas fa-share text-2xl"></i><p class="text-[10px]">Share</p></div>
                </div>`;
            document.getElementById('mainFeed').prepend(card);
        }
    </script>
</body>
</html>
