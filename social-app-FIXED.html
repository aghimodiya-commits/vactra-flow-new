<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFlow - @Asheesh_Kumar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; margin: 0; color: white; overflow: hidden; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .ui { position: absolute; bottom: 0; width: 100%; padding: 40px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-6 flex justify-between items-center z-50">
        <h1 class="text-2xl font-black italic">V<span class="text-blue-500">FLOW</span></h1>
        <i class="fas fa-search text-xl"></i>
    </header>

    <main class="feed">
        <div class="card">
            <video loop playsinline autoplay muted src="shayari.mp4"></video>
            <div class="ui">
                <p class="font-bold text-lg">@Asheesh_Kumar</p>
                <p class="text-sm">"Har tamanna poori nahi hoti..." ✍️🍂</p>
            </div>
        </div>

        <div class="card">
            <video loop playsinline muted src="nature.mp4"></video>
            <div class="ui">
                <p class="font-bold">@VFlow_Nature</p>
                <p class="text-sm">Nature's tranquility. 🌲✨</p>
            </div>
        </div>

        <div class="card">
            <video loop playsinline muted src="motivational.mp4"></video>
            <div class="ui">
                <p class="font-bold">@Life_Lessons</p>
                <p class="text-sm">Papa ki seekh. 📖💡</p>
            </div>
        </div>

        <div class="card">
            <video loop playsinline muted src="smile.mp4"></video>
            <div class="ui">
                <p class="font-bold text-lg">@Asheesh_Kumar</p>
                <p class="text-sm">Aapki ek muskurahat... 😊❤️</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-black/90 border-t border-white/10 flex justify-around items-center py-4 z-50">
        <i class="fas fa-home text-xl text-blue-500"></i>
        <i class="fas fa-bolt text-xl text-gray-500"></i>
        <div class="bg-white text-black px-4 py-1 rounded-lg font-bold text-2xl">+</div>
        <i class="fas fa-envelope text-xl text-gray-500"></i>
        <i class="fas fa-user-circle text-xl text-gray-500"></i>
    </nav>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                const v = e.target.querySelector('video');
                e.isIntersecting ? v.play().catch(err => console.log(err)) : v.pause();
            });
        }, { threshold: 0.8 });
        document.querySelectorAll('.card').forEach(c => observer.observe(c));
    </script>
</body>
</html>
