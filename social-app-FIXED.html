<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Complete</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #comment-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 60vh; background: #1c1c1c; z-index: 9999; transition: bottom 0.3s ease; border-radius: 20px 20px 0 0; }
        .show-comments { bottom: 0 !important; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="feed" id="mainFeed"></div>
    </div>

    <div id="shorts-screen" class="screen bg-black overflow-y-auto p-2">
        <i class="fas fa-arrow-left p-4" onclick="showScreen('home-screen')"></i>
        <div id="video-grid" class="grid grid-cols-3 gap-1"></div>
    </div>

    <div id="comment-panel">
        <div class="p-4 flex justify-between items-center border-b border-zinc-800">
            <span class="font-bold">Comments</span>
            <i class="fas fa-times cursor-pointer" onclick="toggleComments()"></i>
        </div>
        <div id="comment-list" class="p-4"></div>
    </div>

    <div id="edit-screen" class="screen bg-black p-4">
        <div class="flex justify-between items-center mb-4">
            <i class="fas fa-arrow-left" onclick="showScreen('home-screen')"></i>
            <button id="publishBtn" onclick="publishVideo()" class="bg-white text-black px-4 py-1 rounded-full font-bold">Post</button>
        </div>
        <div id="preview-box" class="h-64 bg-zinc-900 mb-4"></div>
        <input type="text" id="vTitle" placeholder="Title..." class="w-full bg-zinc-800 p-2 mb-2 rounded">
    </div>

    <nav class="fixed bottom-0 w-full bg-black border-t border-zinc-800 flex justify-around p-4 z-[5000]">
        <i class="fas fa-home text-xl" onclick="showScreen('home-screen')"></i>
        <i class="fas fa-play-circle text-xl" onclick="showScreen('shorts-screen')"></i>
        <i class="fas fa-plus text-xl" onclick="document.getElementById('fileInput').click()"></i>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let selectedFile = null;
        const dbPromise = indexedDB.open("VactraFinalDB", 1);
        dbPromise.onupgradeneeded = e => e.target.result.createObjectStore("shorts", { keyPath: "id", autoIncrement: true });
        
        dbPromise.onsuccess = e => {
            const db = e.target.result;
            db.transaction("shorts", "readonly").objectStore("shorts").getAll().onsuccess = res => {
                res.target.result.forEach(v => { renderVideo(v.url, v.title); addToGrid(v.url); });
            };
        };

        function renderVideo(url, title) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<video loop playsinline src="${url}"></video>
            <div class="absolute bottom-20 left-4"><p class="font-bold">${title}</p></div>
            <div class="absolute right-4 bottom-40 flex flex-col gap-6">
                <i class="fas fa-heart text-2xl" onclick="this.style.color='red'"></i>
                <i class="fas fa-comment-dots text-2xl" onclick="toggleComments()"></i>
            </div>`;
            document.getElementById('mainFeed').prepend(card);
        }

        function addToGrid(url) {
            const div = document.createElement('div');
            div.className = 'aspect-[9/16] bg-zinc-800';
            div.innerHTML = `<video src="${url}" class="w-full h-full object-cover"></video>`;
            document.getElementById('video-grid').prepend(div);
        }

        function toggleComments() { document.getElementById('comment-panel').classList.toggle('show-comments'); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        
        document.getElementById('fileInput').onchange = e => {
            selectedFile = e.target.files[0];
            document.getElementById('preview-box').innerHTML = `<video src="${URL.createObjectURL(selectedFile)}" class="w-full h-full object-cover" autoplay muted loop></video>`;
            showScreen('edit-screen');
        };

        function publishVideo() {
            const reader = new FileReader();
            reader.readAsDataURL(selectedFile);
            reader.onload = e => {
                const db = dbPromise.result;
                db.transaction("shorts", "readwrite").objectStore("shorts").add({ url: e.target.result, title: document.getElementById('vTitle').value });
                location.reload();
            };
        }
    </script>
</body>
</html>
