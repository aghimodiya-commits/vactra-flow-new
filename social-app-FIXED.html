<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-black text-white font-sans overflow-hidden">

    <header class="p-3 flex justify-between items-center bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-red-600 via-purple-600 to-blue-500 flex items-center justify-center border border-white/20">
                <span class="font-bold text-lg">V</span>
            </div>
            
            <div class="flex flex-col">
                <h1 class="text-lg font-bold tracking-tight">Vactra <span class="text-red-500">Flow</span></h1>
                <span class="text-[9px] text-gray-400">YouTube Style Creator Hub</span>
            </div>
        </div>
        <div class="flex gap-4 text-lg text-gray-300">
            <i class="fas fa-search"></i>
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <main class="h-[calc(100vh-130px)] overflow-y-scroll snap-y snap-mandatory p-2">
        
        <div class="h-full w-full snap-start relative mb-4 rounded-2xl bg-gradient-to-b from-gray-800 to-gray-950 flex flex-col items-center justify-center border border-gray-800">
            <div class="absolute inset-0 flex items-center justify-center opacity-20">
                 <i class="fas fa-play-circle text-8xl"></i>
            </div>
            
            <div class="absolute bottom-6 left-4 right-16">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-xs">AK</div>
                    <p class="font-bold text-sm">@Asheesh_Kumar</p>
                    <button class="bg-red-600 px-3 py-1 rounded-full text-[10px] font-bold">SUBSCRIBE</button>
                </div>
                <p class="text-xs text-gray-200 line-clamp-2">Vactra Flow App ka naya interface! #Shorts #Technology #Bhopal</p>
            </div>

            <div class="absolute bottom-10 right-3 flex flex-col gap-5 text-center">
                <div class="flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-gray-800/50 flex items-center justify-center"><i class="fas fa-thumbs-up"></i></div>
                    <span class="text-[10px] mt-1">1.2K</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-gray-800/50 flex items-center justify-center"><i class="fas fa-comment-dots"></i></div>
                    <span class="text-[10px] mt-1">45</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-gray-800/50 flex items-center justify-center"><i class="fas fa-share"></i></div>
                    <span class="text-[10px] mt-1">Share</span>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-gray-900 border-t border-gray-800 flex justify-around items-center py-4 z-50">
        <div class="text-center text-white"><i class="fas fa-home text-lg"></i><p class="text-[9px]">Home</p></div>
        <div class="text-center text-gray-500"><i class="fas fa-bolt text-lg"></i><p class="text-[9px]">Shorts</p></div>
        <div class="text-center text-white scale-125"><i class="fas fa-plus-circle text-2xl"></i></div>
        <div class="text-center text-gray-500"><i class="fas fa-layer-group text-lg"></i><p class="text-[9px]">Library</p></div>
        <div class="text-center text-gray-500"><i class="fas fa-user-circle text-lg"></i><p class="text-[9px]">You</p></div>
    </nav>

</body>
</html>
