<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Cosmic Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://i.imgur.com/8QG3jF9.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/8QG3jF9.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; overflow-y: auto; padding-bottom: 70px; }
        .active { display: block; }
        
        .cosmic-gradient {
            background: linear-gradient(135deg, #FF1493 0%, #FFD700 30%, #FF8C00 50%, #4B0082 70%, #00BFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Splash Screen styling with background blur */
        #splash-screen { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
            background: radial-gradient(circle, #0e021a, #000); 
        }
        
        .splash-logo-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
        }

        /* Added fallback backup if image takes time to load */
        .splash-logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 20, 147, 0.6));
        }

        .shorts-feed { scroll-snap-type: y mandatory; overflow-y: scroll; height: 100vh; scrollbar-width: none; }
        .short-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; }
        .short-card video { width: 100%; height: 100%; object-fit: cover; }
        
        nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #111; display: flex; justify-content: space-around; align-items: center; z-index: 5000; }
        .nav-item { color: #aaa; font-size: 10px; text-align: center; cursor: pointer; }
        .active-nav { color: white; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <div id="splash-screen" class="screen active">
        <div class="splash-logo-container">
            <img src="https://i.imgur.com/8QG3jF9.png" alt="Vactra Flow Logo" onerror="this.src='https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=120&auto=format&fit=crop';">
        </div>
        <h1 class="text-3xl font-black cosmic-gradient tracking-wider">VACTRA FLOW</h1>
        <p class="text-xs text-zinc-500 mt-2 tracking-widest uppercase">Tap Screen to Play Music</p>
    </div>

    <div id="home-screen" class="screen">
        <div class="p-4 flex items-center justify-between sticky top-0 bg-black z-10 border-b border-zinc-900">
            <div class="flex items-center gap-2">
                <img src="https://i.imgur.com/8QG3jF9.png" class="w-8 h-8 object-contain">
                <h1 class="text-2xl font-black cosmic-gradient">VACTRA FLOW</h1>
            </div>
            <button onclick="toggleMusic()" class="text-zinc-400 hover:text-white p-2">
                <i id="music-icon" class="fas fa-music"></i>
            </button>
        </div>
        <div id="home-feed" class="p-2 space-y-4">
            <div class="text-center text-zinc-600 mt-20 text-sm">No long videos yet. Click + to upload!</div>
        </div>
    </div>

    <div id="shorts-screen" class="screen">
        <div id="shorts-feed" class="shorts-feed" onscroll="checkVideoPlay()"></div>
    </div>

    <div id="profile-screen" class="screen bg-zinc-950 p-6 text-center">
        <div id="user-avatar" class="w-20 h-20 rounded-full mx-auto mb-4 border-2 border-pink-600 flex items-center justify-center text-3xl font-bold bg-zinc-900 cosmic-gradient">A</div>
        <h2 id="user-name" class="text-xl font-bold">Asheesh Kumar</h2>
        <p class="text-xs text-zinc-500 mt-1">Creator & Developer</p>
        <div class="grid grid-cols-3 gap-1 mt-6" id="my-video-grid"></div>
    </div>

    <div id="upload-screen" class="screen bg-black">
        <div class="p-4 flex justify-between border-b border-zinc-900">
            <i class="fas fa-times text-xl" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">New Post</span>
            <button id="upBtn" onclick="saveToDB()" class="text-pink-500 font-bold">Post</button>
        </div>
        <div id="preview" class="w-full h-64 bg-zinc-900 flex items-center justify-center text-zinc-600 text-sm">Video Preview Area</div>
        <div class="p-4 space-y-4">
            <input type="text" id="vTitle" placeholder="Video Title..." class="w-full bg-zinc-900 p-3 rounded text-white border border-zinc-800 outline-none">
            <select id="vType" class="w-full bg-zinc-900 p-3 rounded text-white border border-zinc-800 outline-none">
                <option value="long">Long Video (Home Feed)</option>
                <option value="short">Short Video (Shorts Feed)</option>
            </select>
        </div>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl"></i><p class="mt-0.5">Home</p></div>
        <div class="nav-item" onclick="showScreen('shorts-screen')"><i class="fas fa-play-circle text-xl"></i><p class="mt-0.5">Shorts</p></div>
        <div onclick="document.getElementById('fInp').click()" class="w-10 h-10 bg-gradient-to-r from-pink-600 to-purple-600 rounded-full flex items-center justify-center text-2xl font-light cursor-pointer shadow-lg shadow-pink-900/40">+</div>
        <div class="nav-item" onclick="showScreen('profile-screen')"><i class="fas fa-user-circle text-xl"></i><p class="mt-0.5">You</p></div>
    </nav>

    <input type="file" id="fInp" accept="video/*" class="hidden">

    <script>
        // Auto-play music logic on user first tap
        const music = document.getElementById('bg-music');
        document.body.addEventListener('click', () => {
            if (music.paused) {
                music.play().catch(e => console.log("Music play auto-blocked"));
            }
        }, { once: true });

        function toggleMusic() {
            const icon = document.getElementById('music-icon');
            if (music.paused) {
                music.play();
                icon.className = "fas fa-music text-pink-500 animate-spin";
            } else {
                music.pause();
                icon.className = "fas fa-music text-zinc-400";
            }
        }

        // Splash Screen dismiss handling
        setTimeout(() => {
            document.getElementById('splash-screen').classList.remove('active');
            showScreen('home-screen');
        }, 3000);

        let db;
        let selectedFile = null;

        const request = indexedDB.open("VactraDatabasePro", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("content", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = e => { db = e.target.result; loadAll(); };

        function saveToDB() {
            const title = document.getElementById('vTitle').value;
            const type = document.getElementById('vType').value;
            if(!selectedFile) return;

            document.getElementById('upBtn').innerText = "Uploading...";
            const reader = new FileReader();
            reader.readAsDataURL(selectedFile);
            reader.onload = () => {
                const tx = db.transaction("content", "readwrite");
                tx.objectStore("content").add({ url: reader.result, title, type });
                tx.oncomplete = () => location.reload();
            };
        }

        function loadAll() {
            const store = db.transaction("content", "readonly").objectStore("content");
            store.getAll().onsuccess = e => {
                let items = e.target.result;
                if(items.length > 0) {
                    document.getElementById('home-feed').innerHTML = '';
                }
                items.forEach(item => {
                    if(item.type === 'short') renderShort(item);
                    else renderHome(item);
                    renderGrid(item);
                });
            };
        }

        function renderHome(v) {
            const d = document.createElement('div');
            d.className = "bg-zinc-950 rounded-xl overflow-hidden border border-zinc-900";
            d.innerHTML = `<video src="${v.url}" controls class="w-full aspect-video object-cover"></video><p class="p-3 font-semibold text-sm">${v.title}</p>`;
            document.getElementById('home-feed').prepend(d);
        }

        function renderShort(v) {
            const d = document.createElement('div');
            d.className = 'short-card';
            d.innerHTML = `<video loop src="${v.url}" class="w-full h-full object-cover"></video><div class="absolute bottom-24 left-4 font-bold text-lg text-shadow z-20">${v.title}</div><div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/20 pointer-events-none"></div>`;
            document.getElementById('shorts-feed').prepend(d);
        }

        function renderGrid(v) {
            const d = document.createElement('div');
            d.className = 'aspect-[9/16] bg-zinc-900 border border-black overflow-hidden';
            d.innerHTML = `<video src="${v.url}" class="w-full h-full object-cover" muted></video>`;
            document.getElementById('my-video-grid').prepend(d);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('video').forEach(v => v.pause());
            checkNav(id);
        }

        function checkNav(screenId) {
            document.querySelectorAll('nav .nav-item').forEach(n => n.classList.remove('active-nav'));
            if(screenId === 'home-screen') document.querySelector('nav .fa-home').parentElement.classList.add('active-nav');
            if(screenId === 'shorts-screen') {
                document.querySelector('nav .fa-play-circle').parentElement.classList.add('active-nav');
                checkVideoPlay();
            }
            if(screenId === 'profile-screen') document.querySelector('nav .fa-user-circle').parentElement.classList.add('active-nav');
        }

        document.getElementById('fInp').onchange = e => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                document.getElementById('preview').innerHTML = `<video src="${URL.createObjectURL(selectedFile)}" class="w-full h-full object-contain" muted autoplay></video>`;
                showScreen('upload-screen');
            }
        };

        function checkVideoPlay() {
            if(!document.getElementById('shorts-screen').classList.contains('active')) return;
            document.querySelectorAll('.short-card video').forEach(v => {
                const r = v.getBoundingClientRect();
                if(r.top >= 0 && r.bottom <= window.innerHeight) v.play().catch(()=>{});
                else v.pause();
            });
        }
    </script>
</body>
</html>
