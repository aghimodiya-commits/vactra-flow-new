<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Fixed Icons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; font-family: sans-serif; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Fixed Sidebar for Icons */
        .sidebar { 
            position: absolute; right: 15px; bottom: 120px; 
            display: flex; flex-direction: column; gap: 20px; 
            align-items: center; z-index: 1000; /* Isse icons upar rahenge */
        }
        .icon-box { text-align: center; cursor: pointer; transition: 0.2s; }
        .icon-box:active { transform: scale(0.8); }
        .liked { color: #ff0050 !important; } /* TikTok style pink/red color */

        .bottom-info { position: absolute; bottom: 100px; left: 15px; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body>

    <main class="feed" id="mainFeed">
        <div class="card">
            <video loop playsinline autoplay muted src="https://player.vimeo.com/external/370331493.sd.mp4?s=34015694200c0182470ecf6406e30a516e8b4e7a&profile_id=139&oauth2_token_id=57447761"></video>
            
            <div class="bottom-info">
                <p class="font-bold text-lg">@Asheesh_Kumar</p>
                <p class="text-sm opacity-90">Bhopal ka apna flow! 🍎🚀</p>
            </div>

            <div class="sidebar">
                <div class="icon-box" onclick="toggleLike(this.children[0])">
                    <i class="fas fa-heart text-3xl"></i>
                    <p class="text-xs font-bold mt-1">1.2M</p>
                </div>
                <div class="icon-box" onclick="alert('Comment section opening...')">
                    <i class="fas fa-comment-dots text-3xl"></i>
                    <p class="text-xs font-bold mt-1">45K</p>
                </div>
                <div class="icon-box" onclick="shareNow()">
                    <i class="fas fa-share text-3xl"></i>
                    <p class="text-xs font-bold mt-1">Share</p>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-black/90 border-t border-white/10 flex justify-around items-center py-4 z-[2000]">
        <i class="fas fa-home text-2xl text-blue-500"></i>
        <div onclick="document.getElementById('fileUp').click()" class="bg-white text-black px-5 py-1 rounded-xl font-bold text-3xl cursor-pointer">+</div>
        <i class="fas fa-user-circle text-2xl text-gray-500"></i>
    </nav>

    <input type="file" id="fileUp" accept="video/*" class="hidden">

    <script>
        function toggleLike(el) {
            el.classList.toggle('liked');
        }

        function shareNow() {
            if (navigator.share) {
                navigator.share({ title: 'Vactra Flow', url: window.location.href });
            } else {
                alert("Link Copied!");
            }
        }

        // Upload Video & Auto-Add Icons
        document.getElementById('fileUp').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const newCard = document.createElement('div');
                newCard.className = 'card';
                newCard.innerHTML = `
                    <video loop playsinline autoplay src="${url}"></video>
                    <div class="bottom-info"><p class="font-bold text-lg">@Asheesh_Kumar</p></div>
                    <div class="sidebar">
                        <div class="icon-box" onclick="toggleLike(this.children[0])"><i class="fas fa-heart text-3xl"></i><p class="text-xs font-bold mt-1">0</p></div>
                        <div class="icon-box"><i class="fas fa-comment-dots text-3xl"></i><p class="text-xs font-bold mt-1">0</p></div>
                        <div class="icon-box" onclick="shareNow()"><i class="fas fa-share text-3xl"></i><p class="text-xs font-bold mt-1">Share</p></div>
                    </div>
                `;
                document.getElementById('mainFeed').prepend(newCard);
                newCard.scrollIntoView({ behavior: 'smooth' });
            }
        };
    </script>
</body>
</html>
