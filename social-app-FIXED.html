<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src https://cdnjs.cloudflare.com;">
    <title>Vactra Flow - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .bottom-info { position: absolute; bottom: 120px; left: 15px; z-index: 1000; max-width: 80%; }
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        #comment-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh; background: #1c1c1c; border-radius: 20px 20px 0 0; z-index: 9999; transition: bottom 0.3s ease-out; }
        .show-comments { bottom: 0 !important; }
    </style>
</head>
<body>
    <div id="home-screen" class="screen active">
        <div class="feed" id="mainFeed"></div>
    </div>
    <div id="shorts-screen" class="screen bg-black overflow-y-auto"></div>
    <div id="edit-screen" class="screen bg-black"></div>
    <div id="profile-screen" class="screen bg-zinc-950"></div>
    <div id="comment-panel">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
            <span class="font-bold">Comments</span>
            <i class="fas fa-times cursor-pointer" onclick="toggleComments()"></i>
        </div>
        <div id="comment-list" class="p-4"></div>
    </div>

    <script>
        // Smooth Scrolling Logic
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const v = entry.target.querySelector('video');
                if (entry.isIntersecting) v.play().catch(()=>{});
                else v.pause();
            });
        }, { threshold: 0.6 });

        // IMPORTANT: Yahan apna pura original JavaScript logic (indexedDB, publishVideo, renderVideo, mockLogin) wapas paste karein
        // Main code udd gaya tha, isliye abhi ye structure load hoga aur crash nahi karega.
    </script>
</body>
</html>
