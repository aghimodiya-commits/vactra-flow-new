<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: fixed; top: 0; left: 0; }
        .active { display: block; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; }
    </style>
</head>
<body>
    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent">
            <h1 class="text-xl font-black italic">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed"></div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed'));
        }
    </script>
</body>
</html>
