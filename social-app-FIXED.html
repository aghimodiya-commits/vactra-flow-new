<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Shorts & Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        .screen { height: 100vh; width: 100vw; display: none; position: relative; }
        .active { display: block; }
        
        /* Shorts Feed Styling */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar Icons */
        .sidebar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .icon-box { text-align: center; }

        /* Profile Page Styling */
        #profile-screen { background: linear-gradient(to bottom, #1a1a2e, #000); overflow-y: auto; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="feed" id="mainFeed">
            <div class="card">
                <video loop playsinline autoplay muted src="https://player.vimeo.com/external/370331493.sd.mp4?s=34015694200c0182470ecf6406e30a516e8b4e7a&profile_id=139&oauth2_token_id=57447761"></video>
                <div class="absolute bottom-24 left-4 p-2">
                    <p class="font-bold text-lg">@Asheesh_Kumar</p>
                    <p class="text-sm">Bhopal ka apna flow! 🍎🚀</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box"><i class="fas fa-heart text-3xl"></i><p class="text-xs">1.2M</p></div>
                    <div class="icon-box"><i class="fas fa-comment-dots text-3xl"></i><p class="text-xs">45K</p></div>
                    <div class="icon-box"><i class="fas fa-share text-3xl"></i><p class="text-xs">Share</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="profile-screen" class="screen px-6 pt-10">
        <div class="flex flex-col items-center">
            <div class="w-24 h-24 bg-gray-700 rounded-full border-2 border-blue-500 mb-4 flex items-center justify-center">
                <i class="fas fa-user text-4xl text-gray-400"></i>
            </div>
            <h2 class="text-2xl font-bold">Asheesh Kumar</h2>
            <p class="text-blue-400 text-sm">Pharmacy Student | Content Creator</p>
            
            <button class="mt-4 bg-blue-600 px-10 py-2 rounded-full font-bold">Follow</button>

            <div class="flex gap-10 mt-8 text-center">
                <div><p class="font-bold">128</p><p class="text-xs text-gray-400">Following</p></div>
                <div><p class="font-bold">45.2K</p><p class="text-xs text-gray-400">Followers</p></div>
                <div><p class="font-bold">1.2M</p><p class="text-xs text-gray-400">Likes</p></div>
            </div>
        </div>
        
        <div class="grid grid-cols-3 gap-1 mt-10">
            <div class="aspect-[3/4] bg-gray-800 rounded-sm"></div>
            <div class="aspect-[3/4] bg-gray-800 rounded-sm"></div>
            <div class="aspect-[3/4] bg-gray-800 rounded-sm"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black/90 border-t border-white/10 flex justify-around items-center py-4 z-[2000]">
        <i onclick="showScreen('home-screen')" class="fas fa-home text-2xl cursor-pointer text-white hover:text-blue-500"></i>
        <div onclick="document.getElementById('fileUp').click()" class="bg-white text-black px-4 py-0.5 rounded-lg font-bold text-2xl cursor-pointer">+</div>
        <i onclick="showScreen('profile-screen')" class="fas fa-user-circle text-2xl cursor-pointer text-gray-500 hover:text-blue-500"></i>
    </nav>

    <input type="file" id="fileUp" accept="video/*" class="hidden">

    <script>
        // Screen Switching Logic
        function showScreen(screenId) {
            // Saari screens hide karo
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            // Selected screen show karo
            document.getElementById(screenId).classList.add('active');
        }

        // Auto-scroll to top when home is clicked
        document.querySelector('.fa-home').addEventListener('click', () => {
            document.getElementById('mainFeed').scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
