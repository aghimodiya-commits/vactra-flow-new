<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Final Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        .screen { height: 100vh; width: 100vw; display: none; position: relative; }
        .active { display: block; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar & Icons */
        .sidebar { position: absolute; right: 10px; bottom: 140px; display: flex; flex-direction: column; gap: 20px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; }
        .liked { color: #ff0050 !important; }

        /* --- COMMENT SECTION PANEL --- */
        #commentPanel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh;
            background: #121212; border-radius: 20px 20px 0 0; z-index: 6000;
            transition: bottom 0.3s ease; display: flex; flex-direction: column;
        }
        .comment-active { bottom: 0 !important; }
        .comment-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .comment-item { display: flex; gap: 10px; margin-bottom: 15px; align-items: start; }
        
        .bottom-info { position: absolute; bottom: 100px; left: 15px; z-index: 1000; pointer-events: none; }
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-4 flex justify-between items-center z-[5000] bg-gradient-to-b from-black/90 to-transparent">
        <h1 class="text-xl font-black italic text-white">VACTRA <span class="text-red-600">FLOW</span></h1>
        <div class="flex gap-5 text-lg"><i class="fas fa-search"></i><i class="fas fa-camera"></i></div>
    </header>

    <div id="home-screen" class="screen active">
        <div class="feed" id="mainFeed">
            <div class="card">
                <video loop playsinline autoplay muted src="https://player.vimeo.com/external/370331493.sd.mp4?s=34015694200c0182470ecf6406e30a516e8b4e7a&profile_id=139&oauth2_token_id=57447761"></video>
                <div class="bottom-info">
                    <p class="font-bold text-md">@Asheesh_Kumar</p>
                    <p class="text-sm opacity-90">Vactra Flow is Live! 🚀</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="this.children[0].classList.toggle('liked')"><i class="fas fa-thumbs-up text-2xl"></i><p class="text-[10px] mt-1">1.2M</p></div>
                    <div class="icon-box" onclick="openComments()"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px] mt-1">45K</p></div>
                    <div class="icon-box" onclick="shareNow()"><i class="fas fa-share text-2xl"></i><p class="text-[10px] mt-1">Share</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="profile-screen" class="screen pt-20 bg-black">
        <div class="flex flex-col items-center">
            <div class="w-24 h-24 bg-zinc-800 rounded-full border-2 border-red-600 flex items-center justify-center text-3xl font-bold">AK</div>
            <h2 class="mt-4 text-xl font-bold">Asheesh Kumar</h2>
            <div class="flex gap-8 mt-6">
                <div class="text-center"><p class="font-bold">45.2K</p><p class="text-xs text-gray-500">Followers</p></div>
                <div class="text-center"><p class="font-bold">1.2M</p><p class="text-xs text-gray-500">Likes</p></div>
            </div>
            <button class="mt-6 bg-zinc-800 px-10 py-2 rounded-md text-sm">Edit Profile</button>
        </div>
    </div>

    <div id="commentPanel">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
            <span class="font-bold">Comments</span>
            <i class="fas fa-times text-xl cursor-pointer" onclick="closeComments()"></i>
        </div>
        <div class="comment-list" id="commentBox">
            <div class="comment-item">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-[10px]">K</div>
                <div><p class="text-[11px] font-bold text-gray-400">@Kuldeep</p><p class="text-sm">Bhai mast app banaya hai! 🔥</p></div>
            </div>
        </div>
        <div class="p-4 bg-black flex gap-3 items-center">
            <input type="text" id="userInput" placeholder="Add a comment..." class="flex-grow bg-zinc-900 rounded-full px-4 py-2 text-sm outline-none">
            <button onclick="addComment()" class="text-blue-500 font-bold">Post</button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full flex justify-around items-center py-3">
        <div class="nav-item" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl"></i><span>Home</span></div>
        <div class="nav-item" onclick="showScreen('home-screen')"><i class="fas fa-play-circle text-xl text-gray-400"></i><span>Shorts</span></div>
        <div onclick="triggerUpload()" class="text-3xl cursor-pointer">+</div>
        <div class="nav-item"><i class="fas fa-layer-group text-xl text-gray-400"></i><span>Subs</span></div>
        <div class="nav-item" onclick="showScreen('profile-screen')"><i class="fas fa-user-circle text-xl text-gray-400"></i><span>You</span></div>
    </nav>

    <input type="file" id="fileUp" accept="video/*" class="hidden">

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            closeComments(); // Screen change hone par comment band ho jaye
        }

        // --- COMMENT LOGIC ---
        function openComments() { document.getElementById('commentPanel').classList.add('comment-active'); }
        function closeComments() { document.getElementById('commentPanel').classList.remove('comment-active'); }

        function addComment() {
            const input = document.getElementById('userInput');
            if(input.value.trim() !== "") {
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `<div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-[10px]">A</div>
                                 <div><p class="text-[11px] font-bold text-gray-400">@Asheesh_Kumar</p><p class="text-sm">${input.value}</p></div>`;
                document.getElementById('commentBox').prepend(div);
                input.value = "";
            }
        }

        function triggerUpload() { document.getElementById('fileUp').click(); }

        function shareNow() {
            if (navigator.share) navigator.share({title: 'Vactra Flow', url: window.location.href});
            else alert("Link Copied!");
        }

        // --- UPLOAD LOGIC ---
        document.getElementById('fileUp').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const newCard = document.createElement('div');
                newCard.className = 'card';
                newCard.innerHTML = `
                    <video loop playsinline autoplay src="${url}"></video>
                    <div class="bottom-info"><p class="font-bold text-md">@Asheesh_Kumar</p></div>
                    <div class="sidebar">
                        <div class="icon-box" onclick="this.children[0].classList.toggle('liked')"><i class="fas fa-thumbs-up text-2xl"></i><p class="text-[10px] mt-1">0</p></div>
                        <div class="icon-box" onclick="openComments()"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px] mt-1">0</p></div>
                        <div class="icon-box" onclick="shareNow()"><i class="fas fa-share text-2xl"></i><p class="text-[10px] mt-1">Share</p></div>
                    </div>`;
                document.getElementById('mainFeed').prepend(newCard);
                showScreen('home-screen');
                newCard.scrollIntoView({ behavior: 'smooth' });
            }
        };
    </script>
</body>
</html>
