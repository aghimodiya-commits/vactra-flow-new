<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* YouTube UI Elements */
        .sidebar { position: absolute; right: 12px; bottom: 150px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; text-shadow: 0 1px 5px rgba(0,0,0,0.5); }
        .bottom-info { position: absolute; bottom: 110px; left: 15px; z-index: 1000; max-width: 70%; }
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        
        /* Edit Screen */
        #edit-screen { background: #0f0f0f; z-index: 6000; overflow-y: auto; }
        input, textarea { background: #222; border: 1px solid #333; border-radius: 8px; padding: 12px; color: white; width: 100%; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
            <h1 class="text-xl font-black italic tracking-tighter">VACTRA <span class="text-red-600">FLOW</span></h1>
            <div class="flex gap-4 text-lg"><i class="fas fa-search"></i><i class="fas fa-ellipsis-v"></i></div>
        </header>
        <div class="feed" id="mainFeed">
            <div class="card">
                <video loop playsinline autoplay muted src="https://player.vimeo.com/external/370331493.sd.mp4?s=34015694200c0182470ecf6406e30a516e8b4e7a&profile_id=139&oauth2_token_id=57447761"></video>
                <div class="bottom-info">
                    <p class="font-bold">@Asheesh_Kumar</p>
                    <p class="text-sm">Pharmacy Life & Tech! 🍎🚀</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="this.classList.toggle('text-red-600')"><i class="fas fa-heart text-2xl"></i><p class="text-xs mt-1">1.2M</p></div>
                    <div class="icon-box"><i class="fas fa-comment-dots text-2xl"></i><p class="text-xs mt-1">45K</p></div>
                    <div class="icon-box"><i class="fas fa-share text-2xl"></i><p class="text-xs mt-1">Share</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-screen" class="screen">
        <div class="p-4 flex items-center justify-between border-b border-zinc-800">
            <i class="fas fa-times text-xl cursor-pointer" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Details</span>
            <button onclick="publishVideo()" class="bg-red-600 px-6 py-1.5 rounded-full font-bold text-sm">Publish</button>
        </div>
        <div class="p-5">
            <div id="preview-area" class="w-full aspect-video bg-zinc-900 rounded-lg mb-6 flex items-center justify-center overflow-hidden border border-zinc-700"></div>
            <input type="text" id="vTitle" placeholder="Video Title...">
            <textarea id="vDesc" rows="3" placeholder="Description..."></textarea>
            <input type="text" id="vTags" placeholder="Tags (e.g. #tech, #pharmacy)">
        </div>
    </div>

    <div id="profile-screen" class="screen bg-black pt-20 px-6 text-center">
        <div class="w-24 h-24 bg-zinc-800 rounded-full border-2 border-red-600 mx-auto flex items-center justify-center text-3xl font-bold">AK</div>
        <h2 class="mt-4 text-2xl font-bold">Asheesh Kumar</h2>
        <p class="text-gray-400">Pharmacy Student | Bhopal</p>
        <div class="flex justify-center gap-10 mt-8">
            <div><p class="font-bold">45.2K</p><p class="text-xs text-gray-500">Followers</p></div>
            <div><p class="font-bold">1.2M</p><p class="text-xs text-gray-500">Likes</p></div>
        </div>
    </div>

    <nav>
        <div onclick="showScreen('home-screen')"><i class="fas fa-home text-xl"></i></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-3xl font-bold">+</div>
        <div onclick="showScreen('profile-screen')"><i class="fas fa-user-circle text-xl"></i></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let tempVideoURL = "";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 1. File Select Logic
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                tempVideoURL = URL.createObjectURL(file);
                document.getElementById('preview-area').innerHTML = `<video class="w-full h-full object-contain" src="${tempVideoURL}" muted autoplay loop></video>`;
                showScreen('edit-screen');
            }
        };

        // 2. Publish Logic (Fixed Sidebar and Storage)
        function publishVideo() {
            const title = document.getElementById('vTitle').value || "Vactra Flow Video";
            const desc = document.getElementById('vDesc').value || "";
            
            const newCard = document.createElement('div');
            newCard.className = 'card';
            newCard.innerHTML = `
                <video loop playsinline autoplay src="${tempVideoURL}"></video>
                <div class="bottom-info">
                    <p class="font-bold">@Asheesh_Kumar</p>
                    <p class="text-sm mt-1">${title}</p>
                    <p class="text-xs opacity-70">${desc}</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="this.classList.toggle('text-red-600')"><i class="fas fa-heart text-2xl"></i><p class="text-xs">0</p></div>
                    <div class="icon-box"><i class="fas fa-comment-dots text-2xl"></i><p class="text-xs">0</p></div>
                    <div class="icon-box"><i class="fas fa-share text-2xl"></i><p class="text-xs">Share</p></div>
                </div>
            `;
            
            document.getElementById('mainFeed').prepend(newCard);
            
            // Input Reset
            document.getElementById('vTitle').value = "";
            document.getElementById('vDesc').value = "";
            
            showScreen('home-screen');
            newCard.scrollIntoView({ behavior: 'smooth' });
            alert("Bhai, Video live ho gayi! 🔥");
        }
    </script>
</body>
</html>
