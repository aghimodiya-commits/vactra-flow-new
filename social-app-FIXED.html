<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - My Video</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; font-family: sans-serif; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .yt-overlay { background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 40%); }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-6 flex justify-between items-center z-50">
        <h1 class="text-2xl font-black italic">VACTRA <span class="text-blue-500">FLOW</span></h1>
        <div class="flex gap-6 text-xl"><i class="fas fa-search"></i><i class="fas fa-camera"></i></div>
    </header>

    <main class="feed">
        <div class="card">
            <video loop playsinline autoplay muted controlsList="nodownload">
                <source src="myvideo.mp4" type="video/mp4">
                Tera browser video support nahi kar raha bhai!
            </video>
            
            <div class="yt-overlay absolute inset-0 pointer-events-none"></div>

            <div class="absolute bottom-24 left-4 z-10">
                <p class="font-bold text-lg">@Asheesh_Kumar</p>
                <p class="text-sm opacity-90 italic">"Har tamanna poori nahi hoti..." ✍️🍂</p>
            </div>

            <div class="absolute bottom-28 right-4 flex flex-col gap-8 text-center z-20">
                <div class="flex flex-col"><i class="fas fa-heart text-3xl text-red-500"></i><span class="text-xs mt-1">1.2M</span></div>
                <div class="flex flex-col"><i class="fas fa-comment-dots text-3xl"></i><span class="text-xs mt-1">45K</span></div>
                <div class="flex flex-col"><i class="fas fa-share text-3xl"></i><span class="text-xs mt-1">Share</span></div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-black/90 border-t border-white/10 flex justify-around items-center py-4 z-50">
        <i class="fas fa-home text-2xl text-blue-500"></i>
        <i class="fas fa-play-circle text-2xl text-gray-500"></i>
        <div class="bg-white text-black px-5 py-1 rounded-xl font-bold text-3xl shadow-lg">+</div>
        <i class="fas fa-envelope text-2xl text-gray-500"></i>
        <i class="fas fa-user-circle text-2xl text-gray-500"></i>
    </nav>

</body>
</html>
