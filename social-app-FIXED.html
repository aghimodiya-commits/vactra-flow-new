<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Full System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; font-family: sans-serif; }
        .feed {
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }
        .feed::-webkit-scrollbar { display: none; }
        .card {
            scroll-snap-align: start;
            height: 100vh;
            width: 100%;
            position: relative;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="fixed top-0 w-full p-4 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent z-50">
        <h1 class="text-2xl font-bold text-blue-500">V<span class="text-white">Flow</span></h1>
        <i class="fas fa-search text-xl"></i>
    </div>

    <main class="feed" id="videoFeed">
        
        <div class="card">
            <video loop muted playsinline class="player">
                <source src="https://v1.nitrocdn.com/dQkrEExoHshFzWpLNoNidLpUqBwJkEAt/assets/static/optimized/rev-5916892/wp-content/uploads/2022/01/hero-video.mp4" type="video/mp4">
            </video>
            <div class="absolute bottom-24 left-4">
                <p class="font-bold text-lg">@Asheesh_Kumar</p>
                <p class="text-sm">Bhopal Content System! 🍎🔥</p>
            </div>
        </div>

        <div class="card">
            <video loop muted playsinline class="player">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-connection-background-30232-large.mp4" type="video/mp4">
            </video>
            <div class="absolute bottom-24 left-4 text-white">
                <p class="font-bold text-lg">@Vactra_Tech</p>
                <p class="text-sm">Pharmacy meets AI 🧬</p>
            </div>
        </div>

    </main>

    <div id="startOverlay" onclick="startApp()" class="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] cursor-pointer">
        <div class="text-center">
            <i class="fas fa-play-circle text-6xl mb-3"></i>
            <p class="font-bold">Tap to Start System</p>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black/90 flex justify-around items-center py-5 border-t border-white/10 z-50">
        <i class="fas fa-home text-blue-500 text-xl"></i>
        <i class="fas fa-plus-square text-white text-3xl"></i>
        <i class="fas fa-user text-gray-500 text-xl"></i>
    </nav>

    <script>
        const videos = document.querySelectorAll('.player');
        const overlay = document.getElementById('startOverlay');

        // App start karne ka function
        function startApp() {
            overlay.style.display = 'none';
            videos[0].play();
            videos[0].muted = false; // Pehli video ka sound on ho jayega
        }

        // Swipe hone par video play/pause karne ka logic
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const v = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    v.play().catch(e => console.log("Play error", e));
                } else {
                    v.pause();
                }
            });
        }, { threshold: 0.8 });

        document.querySelectorAll('.card').forEach(card => observer.observe(card));
    </script>
</body>
</html>
