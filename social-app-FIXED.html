<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Creator Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .video-container {
            height: calc(100vh - 120px);
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
        }
        .video-card {
            scroll-snap-align: start;
            height: 100%;
        }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">

    <header class="p-3 flex justify-between items-center bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full flex items-center justify-center overflow-hidden border-2 border-blue-500 shadow-lg">
                <img src="https://image.spreadshirtmedia.net/image-server/v1/mp/products/T812A2MPA3143PT17X46Y38D1016462744W20412H16701/views/1,width=800,height=800,appearanceId=2,backgroundColor=F2F2F2/colorful-apple-logo-digital-art-mens-premium-t-shirt.jpg" alt="VFlow" class="object-cover w-full h-full transform scale-150">
            </div>
            
            <div class="flex flex-col">
                <h1 class="text-xl font-bold tracking-tighter text-white">Vactra <span class="text-blue-500">Flow</span></h1>
                <span class="text-[10px] text-gray-400 -mt-1">By Asheesh Kumar</span>
            </div>
        </div>
        <div class="flex gap-5 text-xl text-gray-300">
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <main class="video-container px-2">
        <div class="video-card relative mb-4 rounded-3xl overflow-hidden bg-gray-900 flex items-center justify-center border border-gray-800">
             <div class="text-center">
                <i class="fas fa-play text-4xl text-blue-500 mb-2"></i>
                <p class="text-gray-400">Video system joda ja raha hai...</p>
             </div>
             <div class="absolute bottom-4 left-4">
                 <p class="font-bold text-lg">@Asheesh_Kumar</p>
                 <p class="text-sm">Vactra Flow Custom Logo Test!</p>
             </div>
             <div class="absolute bottom-20 right-4 flex flex-col gap-6 text-2xl text-gray-400">
                 <i class="fas fa-thumbs-up hover:text-white cursor-pointer"></i>
                 <i class="fas fa-comment hover:text-white cursor-pointer"></i>
                 <i class="fas fa-share hover:text-white cursor-pointer"></i>
             </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-gray-900 border-t border-gray-800 flex justify-around items-center py-3 z-50">
        <div class="flex flex-col items-center gap-1 text-blue-500">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[10px]">Home</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-bolt text-lg"></i>
            <span class="text-[10px]">Shorts</span>
        </div>
        <div class="flex flex-col items-center text-white">
            <i class="fas fa-plus-circle text-4xl"></i>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-layer-group text-lg"></i>
            <span class="text-[10px]">Library</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-user-circle text-lg"></i>
            <span class="text-[10px]">You</span>
        </div>
    </nav>

</body>
</html>
