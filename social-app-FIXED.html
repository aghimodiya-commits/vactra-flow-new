<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Real YouTube Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; }
        iframe { width: 100%; height: 100%; pointer-events: none; } /* User touch disable for swipe */
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-4 flex justify-between items-center bg-gradient-to-b from-black to-transparent z-50">
        <h1 class="text-2xl font-bold text-blue-500">VFlow</h1>
        <i class="fas fa-search text-xl"></i>
    </header>

    <main class="feed" id="mainFeed">
        <div class="card">
            <iframe src="https://www.youtube.com/embed/n_ocu60Y31w?autoplay=1&mute=1&loop=1&playlist=n_ocu60Y31w&controls=0"></iframe>
            <div class="absolute bottom-24 left-4">
                <p class="font-bold">@Trending_Shorts</p>
                <p class="text-sm">Real YouTube Video Running! 🚀</p>
            </div>
            <div class="absolute bottom-28 right-4 flex flex-col gap-6">
                <i class="fas fa-heart text-2xl"></i>
                <i class="fas fa-comment-dots text-2xl"></i>
            </div>
        </div>

        <div class="card">
            <iframe src="https://www.youtube.com/embed/377uInE5v3Y?autoplay=1&mute=1&loop=1&playlist=377uInE5v3Y&controls=0"></iframe>
            <div class="absolute bottom-24 left-4">
                <p class="font-bold">@Vactra_Official</p>
                <p class="text-sm">Infinite Fun Starts Here!</p>
            </div>
            <div class="absolute bottom-28 right-4 flex flex-col gap-6">
                <i class="fas fa-heart text-2xl"></i>
                <i class="fas fa-comment-dots text-2xl"></i>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-black border-t border-white/10 flex justify-around items-center py-4 z-50">
        <i class="fas fa-home text-blue-500 text-xl"></i>
        <div class="bg-white text-black px-4 py-1 rounded-lg font-bold text-2xl">+</div>
        <i class="fas fa-user-circle text-gray-500 text-xl"></i>
    </nav>

</body>
</html>
