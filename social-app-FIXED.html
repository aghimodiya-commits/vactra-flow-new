<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-black text-white font-sans">

    <nav class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900 sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-blue-500">Vactra Flow</h1>
        <div class="flex gap-4">
            <i class="fas fa-bell text-xl"></i>
            <i class="fas fa-user-circle text-xl"></i>
        </div>
    </nav>

    <div class="p-6 max-w-4xl mx-auto">
        <h2 class="text-3xl font-bold mb-2">Namaste, Asheesh Bhai!</h2>
        <p class="text-gray-400 mb-8">Vactra Flow mein aapka swagat hai. Aaj hum kya create karenge?</p>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 hover:border-blue-500 transition-all cursor-pointer">
                <i class="fas fa-video text-3xl text-red-500 mb-3"></i>
                <h3 class="font-bold">Shorts Creator</h3>
                <p class="text-xs text-gray-500">Video editing tools</p>
            </div>

            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 hover:border-blue-500 transition-all cursor-pointer">
                <i class="fas fa-pen-nib text-3xl text-yellow-500 mb-3"></i>
                <h3 class="font-bold">Lyrics Writer</h3>
                <p class="text-xs text-gray-500">AI poetry assistant</p>
            </div>

            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 hover:border-blue-500 transition-all cursor-pointer">
                <i class="fas fa-microphone text-3xl text-green-500 mb-3"></i>
                <h3 class="font-bold">Voiceover</h3>
                <p class="text-xs text-gray-500">Generate AI voices</p>
            </div>

            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 hover:border-blue-500 transition-all cursor-pointer">
                <i class="fas fa-leaf text-3xl text-emerald-400 mb-3"></i>
                <h3 class="font-bold">Medicinal Plants</h3>
                <p class="text-xs text-gray-500">Herb database</p>
            </div>
        </div>

        <div class="mt-12 text-center">
            <a href="social-app-FIXED.html" class="text-gray-500 underline text-sm">Logout karein</a>
        </div>
    </div>

</body>
</html>
