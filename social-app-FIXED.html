<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Shorts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Shorts-style scrolling logic */
        .video-container {
            height: calc(100vh - 130px);
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
        }
        .video-card {
            scroll-snap-align: start;
            height: 100%;
        }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">

    <header class="p-3 flex justify-between items-center bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center border border-white/20 shadow-lg" 
                 style="background: linear-gradient(135deg, #fecdd3, #e9d5ff, #86efac);">
                 
                 <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.05 20.28c-.98.95-2.05 1.72-3.21 1.72-1.12 0-1.74-.74-3.04-.74-1.3 0-1.92.74-3.04.74-1.16 0-2.23-.77-3.21-1.72-1.95-1.93-2.61-5.11-2.61-7.07 0-3.32 2.1-5.05 4.14-5.05 1.02 0 1.9.61 2.87.61.97 0 1.85-.61 2.87-.61 1.96 0 4.14 1.71 4.14 5.05 0 1.96-.66 5.14-2.61 7.07zm-4.25-16.1c0-2.31 1.71-3.6 3.01-3.6-.14 2.27-1.85 3.6-3.01 3.6z" fill="#000" fill-opacity="0.8"/>
                 </svg>
            </div>
            
            <div class="flex flex-col">
                <h1 class="text-xl font-bold tracking-tighter text-white">Vactra <span class="text-blue-400">Flow</span></h1>
                <span class="text-[10px] text-gray-400 -mt-1">By Asheesh Kumar</span>
            </div>
        </div>
        <div class="flex gap-5 text-xl text-gray-300">
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <main class="video-container px-2">
        <div class="video-card relative mb-4 rounded-3xl overflow-hidden snap-start h-full bg-gray-900 flex items-center justify-center border border-gray-800">
             <div class="text-center opacity-30">
                <i class="fas fa-play text-8xl text-blue-500 mb-2"></i>
                <p class="text-gray-400">Video system joda ja raha hai...</p>
             </div>
             <div class="absolute bottom-4 left-4 right-16">
                 <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-xs">AK</div>
                    <p class="font-bold text-sm">@Asheesh_Kumar</p>
                    <button class="bg-red-600 px-3 py-1 rounded-full text-[10px] font-bold SUBSCRIBE_BTN">SUBSCRIBE</button>
                </div>
                <p class="text-xs text-gray-200 line-clamp-2">Vactra Flow Custom Apple Logo Test!</p>
             </div>
             <div class="absolute bottom-20 right-4 flex flex-col gap-6 text-2xl text-gray-400">
                 <div class="flex flex-col items-center">
                    <i class="fas fa-thumbs-up hover:text-white cursor-pointer"></i>
                    <span class="text-[10px] mt-1">1.2K</span>
                 </div>
                 <i class="fas fa-comment hover:text-white cursor-pointer"></i>
                 <i class="fas fa-share hover:text-white cursor-pointer"></i>
             </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-gray-900 border-t border-gray-800 flex justify-around items-center py-3 z-50">
        <div class="flex flex-col items-center gap-1 text-blue-500">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[10px]">Home</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-bolt text-lg"></i>
            <span class="text-[10px]">Shorts</span>
        </div>
        <div class="flex flex-col items-center text-white scale-125">
            <i class="fas fa-plus-circle text-2xl"></i>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-layer-group text-lg"></i>
            <span class="text-[10px]">Library</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-user-circle text-lg"></i>
            <span class="text-[10px]">You</span>
        </div>
    </nav>

</body>
</html>
