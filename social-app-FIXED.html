<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vactra Flow | Secure Platform</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        .no-lag { transform: translateZ(0); will-change: transform; }
        .video-card:active { transform: scale(0.98); transition: 0.1s; }
    </style>
</head>
<body class="no-lag">
    <nav class="fixed top-0 w-full bg-[#0f0f0f]/95 backdrop-blur-md z-[100] border-b border-gray-800 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center font-bold text-white">V</div>
            <span class="text-xl font-bold tracking-tight">Vactra Flow</span>
        </div>
        <button onclick="openAuth()" class="bg-blue-600 px-4 py-1.5 rounded-full text-sm font-semibold active:scale-90 transition-all">Sign In</button>
    </nav>

    <main class="pt-20 pb-24 px-4 max-w-4xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="video-card cursor-pointer" onclick="alert('Vactra Protection: Content loading securely...')">
                <div class="aspect-video bg-gray-900 rounded-2xl overflow-hidden mb-3 border border-gray-800">
                    <img src="https://picsum.photos/seed/v1/800/450" class="w-full h-full object-cover" alt="thumbnail">
                </div>
                <div class="flex gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-red-500 to-purple-600"></div>
                    <div>
                        <h3 class="font-bold text-sm line-clamp-2">Welcome to Vactra Flow - High Security Version</h3>
                        <p class="text-gray-400 text-xs mt-1">Vactra Official • 1M views</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="authBox" class="fixed inset-0 bg-black/90 z-[200] hidden items-center justify-center p-6">
        <div class="bg-[#1e1e1e] w-full max-w-sm rounded-3xl p-8 border border-white/10">
            <h2 class="text-2xl font-bold text-center mb-6">🔒 Secure Login</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full bg-black border border-gray-700 p-4 rounded-xl outline-none focus:border-blue-500 text-white">
                <input type="password" id="pass" placeholder="Password" class="w-full bg-black border border-gray-700 p-4 rounded-xl outline-none focus:border-blue-500 text-white">
                <button onclick="handleLogin()" class="w-full bg-white text-black py-4 rounded-xl font-bold active:scale-95 transition-transform">Continue</button>
            </div>
            <button onclick="closeAuth()" class="w-full mt-4 text-gray-500 text-xs">Cancel</button>
        </div>
    </div>

    <script>
        function openAuth() { document.getElementById('authBox').style.display = 'flex'; }
        function closeAuth() { document.getElementById('authBox').style.display = 'none'; }
        function handleLogin() {
            const e = document.getElementById('email').value;
            if(e.includes('@')) {
                alert("Session Secured for: " + e);
                closeAuth();
            } else {
                alert("Security Error: Invalid Email!");
            }
        }
    </script>
</body>
</html>
