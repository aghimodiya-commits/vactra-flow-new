<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Pro Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; }
        .bottom-info { position: absolute; bottom: 120px; left: 15px; z-index: 1000; max-width: 80%; }
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #aaa; cursor: pointer; }
        .active-nav { color: white; }
        .input-group { background: #272727; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        #comment-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh; background: #1c1c1c; border-radius: 20px 20px 0 0; z-index: 7000; transition: bottom 0.3s ease-out; display: flex; flex-direction: column; }
        .show-comments { bottom: 0 !important; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed" onscroll="handleScroll()"></div>
    </div>

    <div id="comment-panel">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center text-white">
            <span class="font-bold">Comments</span>
            <i class="fas fa-times cursor-pointer" onclick="toggleComments()"></i>
        </div>
        <div id="comment-list" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
    </div>

    <div id="edit-screen" class="screen bg-black">
        <div class="p-4 flex items-center justify-between">
            <i class="fas fa-arrow-left text-xl" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Edit Short</span>
            <button id="publishBtn" onclick="publishVideo()" class="bg-white text-black px-4 py-1.5 rounded-full font-bold text-sm">Next</button>
        </div>
        <div id="preview-box" class="w-full h-[60vh] bg-zinc-900 flex items-center justify-center"></div>
        <div class="p-4">
            <div class="input-group"><input type="text" id="vTitle" placeholder="Create a title..."></div>
            <div class="input-group"><input type="text" id="vTags" placeholder="#Tags"></div>
        </div>
    </div>

    <div id="profile-screen" class="screen bg-zinc-950 p-6">
        <div id="auth-content"></div>
        <button onclick="showScreen('home-screen')" class="mt-4 text-gray-400">Back</button>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl mb-1"></i><span>Home</span></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-4xl font-light cursor-pointer text-white">+</div>
        <div class="nav-item" onclick="handleProfileClick()"><i class="fas fa-user-circle text-xl mb-1"></i><span>You</span></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let selectedFile = null;
        let userData = JSON.parse(localStorage.getItem('vactra_user')) || null;
        let db;

        const request = indexedDB.open("VactraFinalDB", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("shorts", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = e => { db = e.target.result; loadVideos(); };

        function loadVideos() {
            const store = db.transaction("shorts", "readonly").objectStore("shorts");
            store.getAll().onsuccess = e => {
                e.target.result.forEach(v => renderVideo(v.url, v.title, v.tags));
                handleScroll();
            };
        }

        function publishVideo() {
            const t = document.getElementById('vTitle').value || "New Short";
            const tags = document.getElementById('vTags').value || "";
            const btn = document.getElementById('publishBtn');
            if (!selectedFile) return;

            btn.innerText = "Processing...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(selectedFile);
            reader.onload = function() {
                const base64 = reader.result;
                const transaction = db.transaction("shorts", "readwrite");
                transaction.objectStore("shorts").add({ url: base64, title: t, tags: tags });
                transaction.oncomplete = () => {
                    renderVideo(base64, t, tags);
                    btn.innerText = "Next"; btn.disabled = false;
                    showScreen('home-screen');
                    alert("Aapka Short upload ho gaya! 🚀");
                };
            };
        }

        function renderVideo(url, title, tags) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video loop playsinline src="${url}"></video>
                <div class="bottom-info">
                    <p class="font-bold">@${userData ? userData.name.replace(/\s/g, '_') : 'Creator'}</p>
                    <p class="text-sm mt-1">${title}</p>
                    <p class="text-xs text-blue-400 mt-1">${tags}</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="this.querySelector('i').classList.toggle('text-red-500')">
                        <i class="fas fa-heart text-2xl"></i><p class="text-[10px]">Like</p>
                    </div>
                    <div class="icon-box" onclick="toggleComments()">
                        <i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px]">Chat</p>
                    </div>
                    <div class="icon-box" onclick="navigator.share({title: '${title}'})">
                        <i class="fas fa-share text-2xl"></i><p class="text-[10px]">Share</p>
                    </div>
                </div>`;
            document.getElementById('mainFeed').prepend(card);
        }

        // Standard helpers
        function handleScroll() {
            document.querySelectorAll('video').forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) v.play().catch(()=>{});
                else v.pause();
            });
        }
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function toggleComments() { document.getElementById('comment-panel').classList.toggle('show-comments'); }
        function handleProfileClick() { updateProfileUI(); showScreen('profile-screen'); }
        
        function updateProfileUI() {
            const content = document.getElementById('auth-content');
            if (!userData) {
                content.innerHTML = `<button onclick="mockLogin()" class="bg-red-600 p-3 rounded font-bold w-full">Sign in with Gmail</button>`;
            } else {
                content.innerHTML = `<div class="text-center"><div class="w-20 h-20 bg-zinc-800 rounded-full mx-auto flex items-center justify-center text-2xl mb-4 border-2 border-red-600">${userData.name[0]}</div><h2 class="text-xl font-bold">${userData.name}</h2><p class="text-gray-400 text-sm">${userData.email}</p></div>`;
            }
        }

        function mockLogin() {
            const n = prompt("Pura Naam:"); const e = prompt("Gmail:");
            if(n && e) { userData = {name:n, email:e}; localStorage.setItem('vactra_user', JSON.stringify(userData)); updateProfileUI(); }
        }

        document.getElementById('fileInput').onchange = e => {
            if(!userData) { alert("Pehle login karein!"); return; }
            selectedFile = e.target.files[0];
            if (selectedFile) {
                document.getElementById('preview-box').innerHTML = `<video src="${URL.createObjectURL(selectedFile)}" class="w-full h-full object-cover" muted autoplay loop></video>`;
                showScreen('edit-screen');
            }
        };
    </script>
</body>
</html>
