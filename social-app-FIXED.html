<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Pro Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* YouTube Style Edit Page */
        #edit-screen { background: #0f0f0f; z-index: 7000; overflow-y: auto; padding-bottom: 50px; }
        input, textarea { background: #272727; border: none; border-radius: 8px; padding: 12px; color: white; width: 100%; outline: none; margin-bottom: 15px; }
        
        .sidebar { position: absolute; right: 10px; bottom: 140px; display: flex; flex-direction: column; gap: 20px; z-index: 1000; align-items: center; }
        .bottom-info { position: absolute; bottom: 100px; left: 15px; z-index: 1000; }
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent">
            <h1 class="text-xl font-black italic tracking-tighter">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed">
            </div>
    </div>

    <div id="edit-screen" class="screen">
        <div class="p-4 flex items-center justify-between border-b border-zinc-800 bg-black sticky top-0 z-10">
            <i class="fas fa-arrow-left text-xl cursor-pointer" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Add details</span>
            <button onclick="publishVideo()" class="bg-blue-600 px-5 py-1.5 rounded-full font-bold text-sm">Upload</button>
        </div>
        
        <div class="p-4">
            <div id="preview-container" class="w-full aspect-video bg-zinc-900 rounded-lg overflow-hidden mb-6 border border-zinc-800">
                </div>
            
            <label class="text-xs text-gray-400 ml-1">Title</label>
            <input type="text" id="vTitle" placeholder="Create a title (type @ to mention a channel)">
            
            <label class="text-xs text-gray-400 ml-1">Add description</label>
            <textarea id="vDesc" rows="3" placeholder="Tell viewers about your video"></textarea>
            
            <label class="text-xs text-gray-400 ml-1">Tags (Comma separated)</label>
            <input type="text" id="vTags" placeholder="e.g. #pharmacy, #bhopal, #vactra">
        </div>
    </div>

    <div id="profile-screen" class="screen bg-black pt-16 px-6">
        <div class="flex flex-col items-center">
            <div class="w-20 h-20 bg-zinc-800 rounded-full border-2 border-red-600 flex items-center justify-center text-2xl font-bold">AK</div>
            <h2 class="mt-4 text-xl font-bold">Asheesh Kumar</h2>
        </div>
    </div>

    <nav class="flex justify-around items-center py-3">
        <div class="text-center" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl"></i></div>
        <div onclick="triggerUpload()" class="text-3xl">+</div>
        <div class="text-center" onclick="showScreen('profile-screen')"><i class="fas fa-user-circle text-xl"></i></div>
    </nav>

    <input type="file" id="fileUp" accept="video/*" class="hidden">

    <script>
        let currentVideoURL = "";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function triggerUpload() { document.getElementById('fileUp').click(); }

        // Step 1: Video Select hote hi Edit Page par bhejo
        document.getElementById('fileUp').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                currentVideoURL = URL.createObjectURL(file);
                // Preview dikhao edit screen par
                document.getElementById('preview-container').innerHTML = `<video class="w-full h-full object-contain" src="${currentVideoURL}" controls></video>`;
                showScreen('edit-screen');
            }
        };

        // Step 2: Upload button dabane par Feed mein add karo
        function publishVideo() {
            const title = document.getElementById('vTitle').value || "Untiled Video";
            const desc = document.getElementById('vDesc').value || "";
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video loop playsinline autoplay src="${currentVideoURL}"></video>
                <div class="bottom-info">
                    <p class="font-bold text-md">@Asheesh_Kumar</p>
                    <p class="text-sm font-bold text-white mt-1">${title}</p>
                    <p class="text-xs opacity-75">${desc}</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="this.children[0].classList.toggle('text-red-600')"><i class="fas fa-thumbs-up text-2xl"></i><p class="text-[10px]">0</p></div>
                    <div class="icon-box"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px]">0</p></div>
                    <div class="icon-box"><i class="fas fa-share text-2xl"></i><p class="text-[10px]">Share</p></div>
                </div>
            `;
            
            document.getElementById('mainFeed').prepend(card);
            
            // Clear inputs and go home
            document.getElementById('vTitle').value = "";
            document.getElementById('vDesc').value = "";
            showScreen('home-screen');
            card.scrollIntoView({ behavior: 'smooth' });
            
            // Save to LocalStorage (Basic simulation)
            alert("Video Published to Vactra Flow!");
        }
    </script>
</body>
</html>
