<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Original</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay-gradient { background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 40%); }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-5 flex justify-between items-center z-50">
        <h1 class="text-2xl font-black italic">VACTRA <span class="text-blue-500">FLOW</span></h1>
        <div class="flex gap-5 text-xl"><i class="fas fa-search"></i><i class="fas fa-video"></i></div>
    </header>

    <main class="feed">
        <div class="card">
            <video loop playsinline autoplay muted>
                <source src="https://res.cloudinary.com/demo/video/upload/sp_auto/mountain_bike.mp4" type="video/mp4">
            </video>
            <div class="overlay-gradient absolute inset-0"></div>
            <div class="absolute bottom-24 left-4 z-10">
                <p class="font-bold">@Asheesh_Kumar</p>
                <p class="text-sm opacity-80">Bhopal Content Scene! 🚀 #VactraFlow</p>
            </div>
            <div class="absolute bottom-28 right-4 flex flex-col gap-6 text-center z-20">
                <i class="fas fa-heart text-3xl" onclick="this.style.color='red'"></i>
                <i class="fas fa-comment-dots text-3xl"></i>
                <i class="fas fa-share text-3xl"></i>
            </div>
        </div>

        <div class="card">
            <video loop playsinline muted>
                <source src="https://res.cloudinary.com/demo/video/upload/v1619001391/video_sample.mp4" type="video/mp4">
            </video>
            <div class="overlay-gradient absolute inset-0"></div>
            <div class="absolute bottom-24 left-4 z-10">
                <p class="font-bold">@Vactra_Official</p>
                <p class="text-sm opacity-80">Testing New Features 🔥</p>
            </div>
            <div class="absolute bottom-28 right-4 flex flex-col gap-6 text-center z-20">
                <i class="fas fa-heart text-3xl" onclick="this.style.color='red'"></i>
                <i class="fas fa-comment-dots text-3xl"></i>
                <i class="fas fa-share text-3xl"></i>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-black/90 border-t border-white/10 flex justify-around items-center py-4 z-50">
        <i class="fas fa-home text-xl text-blue-500"></i>
        <i class="fas fa-bolt text-xl text-gray-400"></i>
        <div class="bg-white text-black px-4 py-1 rounded-lg font-bold text-2xl">+</div>
        <i class="fas fa-envelope text-xl text-gray-400"></i>
        <i class="fas fa-user-circle text-xl text-gray-400"></i>
    </nav>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play().catch(() => {});
                } else {
                    video.pause();
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.card').forEach(card => observer.observe(card));
    </script>
</body>
</html>
