<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; padding: 0; color: white; overflow: hidden; }
        .video-container {
            height: calc(100vh - 130px);
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }
        .video-container::-webkit-scrollbar { display: none; }
        .video-card {
            scroll-snap-align: start;
            height: 100%;
            width: 100%;
            position: relative;
            background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .premium-glow { text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>

    <header class="flex justify-between items-center p-4 bg-black/90 backdrop-blur-lg sticky top-0 z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <i class="fab fa-apple text-3xl text-white"></i> 
            <span class="text-xl font-bold tracking-tight">Vactra <span class="text-blue-500">Flow</span></span>
        </div>
        <div class="flex gap-5 text-xl opacity-80">
            <i class="fas fa-search"></i>
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <main class="video-container">
        
        <div class="video-card" onclick="toggleMute(this)">
            <video loop autoplay muted playsinline preload="auto">
                <source src="https://v1.nitrocdn.com/dQkrEExoHshFzWpLNoNidLpUqBwJkEAt/assets/static/optimized/rev-5916892/wp-content/uploads/2022/01/hero-video.mp4" type="video/mp4">
            </video>
            
            <div class="absolute bottom-10 left-4 right-16 z-10 pointer-events-none">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-11 h-11 rounded-full bg-blue-600 flex items-center justify-center font-black border-2 border-white/20">A</div>
                    <p class="font-bold text-lg premium-glow">@Asheesh_Kumar</p>
                    <button class="bg-white text-black px-4 py-1 rounded-full text-xs font-black ml-2 shadow-lg pointer-events-auto">JOIN</button>
                </div>
                <p class="text-sm opacity-90 drop-shadow-md line-clamp-2">Pharmacy to Video Creation! Bhopal system loading... 🍎🔥 #VactraFlow</p>
            </div>

            <div class="absolute bottom-12 right-3 flex flex-col gap-6 text-center z-20">
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-xl flex items-center justify-center border border-white/20"><i class="fas fa-heart text-2xl text-red-500"></i></div>
                    <span class="text-[10px] mt-1 font-bold">4.5K</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-xl flex items-center justify-center border border-white/20"><i class="fas fa-comment-dots text-2xl"></i></div>
                    <span class="text-[10px] mt-1 font-bold">320</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-xl flex items-center justify-center border border-white/20"><i class="fas fa-share text-2xl"></i></div>
                    <span class="text-[10px] mt-1 font-bold">Share</span>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-black border-t border-white/5 flex justify-around items-center py-4 z-50">
        <div class="text-blue-500 flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-[9px] mt-1">Home</span></div>
        <div class="text-gray-500 flex flex-col items-center"><i class="fas fa-film text-xl"></i><span class="text-[9px] mt-1">Shorts</span></div>
        <div class="text-white scale-125"><i class="fas fa-plus-square text-3xl"></i></div>
        <div class="text-gray-500 flex flex-col items-center"><i class="fas fa-bell text-xl"></i><span class="text-[9px] mt-1">Activity</span></div>
        <div class="text-gray-500 flex flex-col items-center"><i class="fas fa-user-circle text-xl"></i><span class="text-[9px] mt-1">Profile</span></div>
    </nav>

    <script>
        function toggleMute(card) {
            const video = card.querySelector('video');
            video.muted = !video.muted;
        }
    </script>

</body>
</html>
