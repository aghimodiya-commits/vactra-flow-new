<script>
    let currentUrl = "";
    let userData = JSON.parse(localStorage.getItem('vactra_user')) || null;
    let videosDB = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];

    window.onload = function() {
        videosDB.forEach(v => renderVideo(v.url, v.title, v.tags));
        handleScroll();
        updateProfileUI();
    };

    function updateProfileUI() {
        const content = document.getElementById('auth-content');
        if (!userData) {
            content.innerHTML = `
                <div class="text-center mt-20">
                    <i class="fab fa-google text-6xl mb-6 text-red-500"></i>
                    <h2 class="text-2xl font-bold mb-2">Bhai, Apna Channel Banao!</h2>
                    <p class="text-gray-400 mb-8 text-sm px-10">Google se login karein aur Vactra Flow par apni videos post karna shuru karein.</p>
                    <button onclick="mockGmailLogin()" class="w-full bg-white text-black font-bold py-3 rounded-lg flex items-center justify-center gap-3">
                        <i class="fab fa-google"></i> Sign in with Gmail
                    </button>
                </div>`;
        } else {
            content.innerHTML = `
                <div class="text-center">
                    <div class="w-24 h-24 bg-zinc-800 rounded-full mx-auto border-4 border-red-600 flex items-center justify-center text-3xl font-bold mb-4">
                        ${userData.name.charAt(0)}
                    </div>
                    <h2 class="text-2xl font-bold">${userData.name}</h2>
                    <p class="text-gray-400 text-sm">${userData.email}</p>
                    
                    <div class="flex justify-around mt-8 bg-zinc-900 p-4 rounded-xl">
                        <div><p class="font-bold">${videosDB.length}</p><p class="text-[10px] text-gray-500">Uploads</p></div>
                    </div>

                    <button onclick="logout()" class="mt-10 text-red-500 font-bold text-sm">Sign Out from Channel</button>
                </div>`;
        }
    }

    // Baaki ke functions (mockGmailLogin, logout, handleScroll, showScreen) wese hi rahenge

    document.getElementById('fileInput').onchange = function(e) {
        if(!userData) { alert("Pehle Gmail se login karke apna channel banao, bhai!"); return; }
        const file = e.target.files[0];
        if (file) {
            currentUrl = URL.createObjectURL(file);
            document.getElementById('preview-box').innerHTML = `<video src="${currentUrl}" class="w-full h-full object-cover" muted autoplay loop></video>`;
            showScreen('edit-screen');
        }
    };

    function publishVideo() {
        const t = document.getElementById('vTitle').value || "New Short";
        const tags = document.getElementById('vTags').value || "";
        
        // Render video on the home feed
        renderVideo(currentUrl, t, tags);
        
        // Update the local database
        videosDB.unshift({url: currentUrl, title: t, tags: tags});
        localStorage.setItem('vactra_pro_db', JSON.stringify(videosDB));
        
        showScreen('home-screen');
        alert("Bhai, Aapka Short Channel par upload ho gaya! 🍎🚀");
    }

    function renderVideo(url, title, tags) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <video loop playsinline src="${url}"></video>
            <div class="bottom-info">
                <p class="font-bold">@${userData ? userData.name.replace(/\s/g, '_') : 'Guest'}</p>
                <p class="text-sm mt-1">${title}</p>
                <p class="text-xs text-blue-400 mt-1">${tags}</p>
            </div>
            <div class="sidebar">
                <div class="icon-box" onclick="this.classList.toggle('text-red-500')"><i class="fas fa-heart text-2xl"></i><p class="text-[10px]">1.2M</p></div>
                <div class="icon-box" onclick="toggleComments()"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px]">45K</p></div>
                <div class="icon-box" onclick="navigator.share({title: '${title}'})"><i class="fas fa-share text-2xl"></i><p class="text-[10px]">Share</p></div>
            </div>`;
        document.getElementById('mainFeed').prepend(card);
    }
</script>
