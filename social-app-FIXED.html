<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Full System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; font-family: sans-serif; }
        .feed {
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }
        .feed::-webkit-scrollbar { display: none; }
        .card {
            scroll-snap-align: start;
            height: 100vh;
            width: 100%;
            position: relative;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .v-logo {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem; font-weight: 900;
        }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-4 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent z-50">
        <div class="flex items-center gap-1">
            <span class="v-logo">V</span>
            <span class="text-lg font-bold">Flow</span>
        </div>
        <div class="flex gap-5 text-xl">
            <i class="fas fa-search"></i>
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <main class="feed" id="mainFeed">
        <div class="card">
            <video loop muted playsinline class="player">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
            <div class="absolute bottom-24 left-4 z-10">
                <p class="font-bold text-lg">@Asheesh_Kumar</p>
                <p class="text-sm opacity-80">Bhopal Pharmacy System! 🍎🔥</p>
            </div>
            <div class="absolute bottom-28 right-4 flex flex-col gap-6 text-center">
                <i class="fas fa-heart text-2xl" onclick="this.classList.toggle('text-red-500')"></i>
                <i class="fas fa-comment-dots text-2xl"></i>
                <i class="fas fa-share text-2xl"></i>
            </div>
        </div>

        <div class="card">
            <video loop muted playsinline class="player">
                <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
            </video>
            <div class="absolute bottom-24 left-4 z-10">
                <p class="font-bold text-lg">@Vactra_Tech</p>
                <p class="text-sm opacity-80">Pharmacy meets AI 🧬</p>
            </div>
            <div class="absolute bottom-28 right-4 flex flex-col gap-6 text-center">
                <i class="fas fa-heart text-2xl" onclick="this.classList.toggle('text-red-500')"></i>
                <i class="fas fa-comment-dots text-2xl"></i>
                <i class="fas fa-share text-2xl"></i>
            </div>
        </div>
    </main>

    <div id="startOverlay" onclick="startApp()" class="fixed inset-0 bg-black/70 flex items-center justify-center z-[100] cursor-pointer">
        <div class="text-center p-8 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20">
            <i class="fas fa-play-circle text-6xl mb-3 text-blue-500"></i>
            <p class="font-bold text-lg">Tap to Start System</p>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black/95 border-t border-white/10 flex justify-around items-center py-4 z-50">
        <div class="flex flex-col items-center text-blue-500"><i class="fas fa-home text-xl"></i><span class="text-[10px] mt-1">Home</span></div>
        <div class="flex flex-col items-center text-gray-400"><i class="fas fa-compass text-xl"></i><span class="text-[10px] mt-1">Shorts</span></div>
        <div class="bg-white text-black px-4 py-1 rounded-lg font-bold text-2xl shadow-lg">+</div>
        <div class="flex flex-col items-center text-gray-400"><i class="fas fa-heart text-xl"></i><span class="text-[10px] mt-1">Inbox</span></div>
        <div class="flex flex-col items-center text-gray-400"><i class="fas fa-user-circle text-xl"></i><span class="text-[10px] mt-1">Profile</span></div>
    </nav>

    <script>
        const videos = document.querySelectorAll('.player');
        const overlay = document.getElementById('startOverlay');

        function startApp() {
            overlay.style.display = 'none';
            videos[0].play();
            videos[0].muted = false; 
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const v = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    v.play().catch(() => {});
                } else {
                    v.pause();
                }
            });
        }, { threshold: 0.7 });

        document.querySelectorAll('.card').forEach(card => observer.observe(card));
    </script>
</body>
</html>
