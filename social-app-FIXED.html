<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #comment-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh; background: #1c1c1c; border-radius: 20px 20px 0 0; z-index: 9999; transition: bottom 0.3s ease-out; display: flex; flex-direction: column; }
        .show-comments { bottom: 0 !important; }
    </style>
</head>
<body>
    <div id="home-screen" class="screen active">
        <div class="feed" id="mainFeed"></div>
    </div>

    <div id="comment-panel">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
            <span class="font-bold">Comments</span>
            <i class="fas fa-times cursor-pointer" onclick="toggleComments()"></i>
        </div>
        <div id="comment-list" class="flex-1 overflow-y-auto p-4"></div>
        <div class="p-4 border-t border-zinc-800">
            <input type="text" id="commentInput" placeholder="Add a comment..." class="w-full bg-zinc-800 p-2 rounded text-white outline-none">
        </div>
    </div>

    <script>
        // Performance Fix: Blob URL instead of Base64
        function renderVideo(file, title, tags) {
            const card = document.createElement('div');
            card.className = 'card';
            // Blob URL banayein - video smooth chalegi
            const url = URL.createObjectURL(file); 
            card.innerHTML = `
                <video loop playsinline src="${url}"></video>
                <div class="bottom-info absolute bottom-20 left-4 z-10">
                    <p class="font-bold">@User</p>
                    <p class="text-sm">${title}</p>
                </div>
            `;
            document.getElementById('mainFeed').prepend(card);
            
            // Auto-play only visible video
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (entry.isIntersecting) v.play(); else v.pause();
                });
            }, { threshold: 0.6 });
            observer.observe(card);
        }

        function toggleComments() { 
            document.getElementById('comment-panel').classList.toggle('show-comments'); 
        }

        // Upload Logic Update
        document.getElementById('fileInput').onchange = e => {
            const file = e.target.files[0];
            // Yahan Base64 ki jagah सीधा file store karein
            // ... (Aapka baki code)
        };
    </script>
</body>
</html>
