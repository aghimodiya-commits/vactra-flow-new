<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Gmail Auth Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        
        /* Feed */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Sidebar & Buttons */
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; }
        .bottom-info { position: absolute; bottom: 120px; left: 15px; z-index: 1000; max-width: 80%; }
        
        /* Navigation */
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #aaa; cursor: pointer; }
        .active-nav { color: white; }

        /* Auth/Profile Screens */
        .input-group { background: #272727; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        
        #comment-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh;
            background: #1c1c1c; border-radius: 20px 20px 0 0; z-index: 7000;
            transition: bottom 0.3s ease-out; display: flex; flex-direction: column;
        }
        .show-comments { bottom: 0 !important; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed" onscroll="handleScroll()"></div>
    </div>

    <div id="comment-panel">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
            <span class="font-bold text-lg text-white">Comments</span>
            <i class="fas fa-times text-xl cursor-pointer text-white" onclick="toggleComments()"></i>
        </div>
        <div id="comment-list" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-3 border-t border-zinc-800 bg-zinc-900 flex items-center gap-3">
            <input type="text" id="comment-input" placeholder="Add a comment..." class="flex-1 bg-zinc-800 rounded-full px-4 py-2 text-sm outline-none text-white">
            <button onclick="postComment()" class="text-blue-500 font-bold px-2">Post</button>
        </div>
    </div>

    <div id="edit-screen" class="screen bg-black">
        <div class="p-4 flex items-center justify-between">
            <i class="fas fa-arrow-left text-xl" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Edit Short</span>
            <button id="publishBtn" onclick="publishVideo()" class="bg-white text-black px-4 py-1.5 rounded-full font-bold text-sm">Next</button>
        </div>
        <div id="preview-box" class="w-full h-[60vh] bg-zinc-900 flex items-center justify-center"></div>
        <div class="p-4">
            <div class="input-group"><input type="text" id="vTitle" placeholder="Create a title..."></div>
            <div class="input-group"><input type="text" id="vTags" placeholder="#Tags"></div>
        </div>
    </div>

    <div id="profile-screen" class="screen bg-zinc-950">
        <div class="p-4 border-b border-zinc-900 flex items-center">
            <i class="fas fa-arrow-left mr-4" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Account</span>
        </div>
        
        <div id="auth-content" class="p-6"></div>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl mb-1"></i><span>Home</span></div>
        <div class="nav-item" onclick="showScreen('home-screen')"><i class="fas fa-play-circle text-xl mb-1"></i><span>Shorts</span></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-4xl font-light cursor-pointer text-white">+</div>
        <div class="nav-item"><i class="fas fa-layer-group text-xl mb-1"></i><span>Subs</span></div>
        <div class="nav-item" onclick="handleProfileClick()"><i class="fas fa-user-circle text-xl mb-1"></i><span>You</span></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let selectedFile = null;
        let userData = JSON.parse(localStorage.getItem('vactra_user')) || null;

        window.onload = function() {
            const saved = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
            saved.forEach(v => renderVideo(v.url, v.title, v.tags));
            handleScroll();
            updateProfileUI();
        };

        function handleProfileClick() {
            updateProfileUI();
            showScreen('profile-screen');
        }

        function updateProfileUI() {
            const content = document.getElementById('auth-content');
            if (!userData) {
                content.innerHTML = `
                    <div class="text-center mt-20">
                        <i class="fab fa-google text-6xl mb-6 text-red-500"></i>
                        <h2 class="text-2xl font-bold mb-2">Bhai, Apna Channel Banao!</h2>
                        <p class="text-gray-400 mb-8 text-sm px-10">Google se login karein aur Vactra Flow par apni videos post karna shuru karein.</p>
                        <button onclick="mockGmailLogin()" class="w-full bg-white text-black font-bold py-3 rounded-lg flex items-center justify-center gap-3">
                            <i class="fab fa-google"></i> Sign in with Gmail
                        </button>
                    </div>`;
            } else {
                content.innerHTML = `
                    <div class="text-center">
                        <div class="w-24 h-24 bg-zinc-800 rounded-full mx-auto border-4 border-red-600 flex items-center justify-center text-3xl font-bold mb-4">
                            ${userData.name.charAt(0)}
                        </div>
                        <h2 class="text-2xl font-bold">${userData.name}</h2>
                        <p class="text-gray-400 text-sm">${userData.email}</p>
                        
                        <div class="flex justify-around mt-8 bg-zinc-900 p-4 rounded-xl">
                            <div><p class="font-bold">0</p><p class="text-[10px] text-gray-500">Subscribers</p></div>
                            <div><p class="font-bold">0</p><p class="text-[10px] text-gray-500">Uploads</p></div>
                        </div>

                        <button onclick="logout()" class="mt-10 text-red-500 font-bold text-sm">Sign Out from Channel</button>
                    </div>`;
            }
        }

        function mockGmailLogin() {
            const name = prompt("Bhai, apna pura naam likhiye:");
            const email = prompt("Apna Gmail address likhiye:");
            if (name && email) {
                userData = { name, email };
                localStorage.setItem('vactra_user', JSON.stringify(userData));
                updateProfileUI();
                alert("Mubarak ho! Aapka channel ban gaya hai. 🍎🚀");
            }
        }

        function logout() {
            if(confirm("Sign out karna hai?")) {
                localStorage.removeItem('vactra_user');
                userData = null;
                updateProfileUI();
            }
        }

        function handleScroll() {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) { v.play().catch(() => {}); } 
                else { v.pause(); }
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'home-screen') document.querySelectorAll('video').forEach(v => v.pause());
            else handleScroll();
        }

        function toggleComments(force = null) {
            const p = document.getElementById('comment-panel');
            if(force === false) p.classList.remove('show-comments');
            else p.classList.toggle('show-comments');
        }

        function postComment() {
            const input = document.getElementById('comment-input');
            if (input.value.trim() !== "") {
                const div = document.createElement('div');
                div.className = "flex gap-3 text-white mb-4";
                div.innerHTML = `<div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-bold">U</div>
                                <div><p class="text-xs font-bold text-gray-400">@User</p><p class="text-sm">${input.value}</p></div>`;
                document.getElementById('comment-list').prepend(div);
                input.value = "";
            }
        }

        document.getElementById('fileInput').onchange = function(e) {
            if(!userData) { alert("Pehle Gmail se login karke apna channel banao, bhai!"); return; }
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const previewUrl = URL.createObjectURL(selectedFile);
                document.getElementById('preview-box').innerHTML = `<video src="${previewUrl}" class="w-full h-full object-cover" muted autoplay loop></video>`;
                showScreen('edit-screen');
            }
        };

        function publishVideo() {
            const t = document.getElementById('vTitle').value || "New Short";
            const tags = document.getElementById('vTags').value || "";
            const btn = document.getElementById('publishBtn');

            if (!selectedFile) return;

            btn.innerText = "Uploading...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(selectedFile);
            reader.onload = function() {
                const base64Video = reader.result;
                
                renderVideo(base64Video, t, tags);
                
                const db = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
                db.unshift({url: base64Video, title: t, tags: tags});
                
                try {
                    localStorage.setItem('vactra_pro_db', JSON.stringify(db));
                    alert("Bhai, Aapka Short Channel par upload ho gaya! 🍎🚀");
                } catch (e) {
                    alert("Bhai, video ka size bada hai! LocalStorage bhar gayi. Choti video try karein.");
                }

                btn.innerText = "Next";
                btn.disabled = false;
                showScreen('home-screen');
            };
        }

        function renderVideo(url, title, tags) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video loop playsinline src="${url}"></video>
                <div class="bottom-info">
                    <p class="font-bold">@${userData ? userData.name.replace(/\s/g, '_') : 'User'}</p>
                    <p class="text-sm mt-1">${title}</p>
                    <p class="text-xs text-blue-400 mt-1">${tags}</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="this.classList.toggle('text-red-500')"><i class="fas fa-heart text-2xl"></i><p class="text-[10px]">1.2M</p></div>
                    <div class="icon-box" onclick="toggleComments()"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px]">45K</p></div>
                    <div class="icon-box" onclick="navigator.share({title: '${title}'})"><i class="fas fa-share text-2xl"></i><p class="text-[10px]">Share</p></div>
                </div>`;
            document.getElementById('mainFeed').prepend(card);
        }
    </script>
</body>
</html>
