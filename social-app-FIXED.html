<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        
        /* Feed & Card */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100vw; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Sidebar & Buttons */
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; }
        .bottom-info { position: absolute; bottom: 120px; left: 15px; z-index: 1000; max-width: 80%; }
        
        /* YouTube Style Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; background: #000; z-index: 2000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #aaa; cursor: pointer; }
        .nav-item.active-nav { color: white; }

        /* Edit/Profile Screens */
        .edit-screen, #profile-screen { background: #070707; z-index: 4000; overflow-y: auto; }
        .input-group { background: #272727; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
        input, textarea { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
    </style>
</head>
<body>

<div id="home-screen" class="screen active">
    <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent">
        <h1 class="font-serif italic tracking-tighter uppercase">VACTRA <span class="text-red-600">FLOW</span></h1>
        <div class="flex gap-5 text-lg"><i class="fas fa-search"></i><i class="fas fa-camera"></i></div>
    </header>
    <div id="main-feed" class="feed"></div>
</div>

<div id="edit-screen" class="screen">
    <div class="p-4 flex items-center justify-between border-b border-zinc-800 sticky top-0 bg-black z-20">
        <i class="fas fa-times text-xl cursor-pointer" onclick="showScreen('home-screen')"></i>
        <span class="font-bold">Short अपलोड करें</span>
        <button onclick="publishVideo()" class="bg-blue-600 px-4 py-1.5 rounded-full font-bold text-sm">Upload</button>
    </div>
    
    <div class="p-4">
        <div id="preview-area" class="aspect-video bg-zinc-900 rounded-lg mb-4 flex items-center justify-center border border-zinc-700">
            <div class="text-center">
                <i class="fas fa-clapperboard text-4xl text-zinc-500 mb-2"></i>
                <p class="text-zinc-400 text-sm">Video का चयन करें</p>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="video-title" placeholder="Video का शीर्षक...">
        </div>
        <div class="input-group">
            <textarea id="video-desc" rows="3" placeholder="Description..."></textarea>
        </div>
        <div class="input-group">
            <input type="text" id="video-tags" placeholder="#Tags (उदा. #pharmacy #vactra)">
        </div>
    </div>
</div>

<div id="profile-screen" class="screen">
    <div class="p-4 flex items-center gap-4 border-b border-zinc-800">
        <i class="fas fa-arrow-left text-xl cursor-pointer" onclick="showScreen('home-screen')"></i>
        <span class="text-xl font-bold">Asheesh Kumar</span>
    </div>
    <div class="p-8 text-center">
        <div class="w-24 h-24 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold">AK</div>
        <h2 class="text-xl font-bold">Asheesh Kumar</h2>
        <p class="text-zinc-500 mb-6">Pharmacy Student | Bhopal</p>
        <div class="flex justify-around mb-8">
            <div class="text-center">
                <div class="font-bold">45.2K</div>
                <div class="text-xs text-zinc-500">Followers</div>
            </div>
            <div class="text-center">
                <div class="font-bold">1.2M</div>
                <div class="text-xs text-zinc-500">Likes</div>
            </div>
        </div>
        <button class="w-full bg-zinc-800 py-2 rounded-md font-bold mb-2">Edit Profile</button>
        <button class="w-full bg-zinc-800 py-2 rounded-md font-bold">Share Profile</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active-nav" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl mb-1"></i><span>Home</span></div>
    <div class="nav-item" onclick="showScreen('home-screen')"><i class="fas fa-play-circle text-xl mb-1"></i><span>Shorts</span></div>
    <div class="nav-item" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-plus-circle text-3xl"></i>
    </div>
    <div class="nav-item" onclick="showScreen('home-screen')"><i class="fas fa-users text-xl mb-1"></i><span>Subscriptions</span></div>
    <div class="nav-item" onclick="showScreen('profile-screen')"><i class="fas fa-user-circle text-xl mb-1"></i><span>You</span></div>
</nav>

<input type="file" id="fileInput" accept="video/*" class="hidden">

<script>
    let currentVideoURL = "";

    // LOCAL STORAGE PERMANENT SAVE
    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('vactra_pro_db') || '[]');
        saved.forEach(v => renderVideo(v.url, v.title, v.desc, v.tags));
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // UPLOAD LOGIC
    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            currentVideoURL = URL.createObjectURL(file);
            document.getElementById('preview-area').innerHTML = `<video class="w-full h-full object-contain" src="${currentVideoURL}" muted autoplay loop></video>`;
            showScreen('edit-screen');
        }
    };

    function publishVideo() {
        const title = document.getElementById('video-title').value || "New Video";
        const desc = document.getElementById('video-desc').value;
        const tags = document.getElementById('video-tags').value;

        if (!currentVideoURL) return;

        // Save to Database
        const db = JSON.parse(localStorage.getItem('vactra_pro_db') || '[]');
        db.unshift({ url: currentVideoURL, title, desc, tags });
        localStorage.setItem('vactra_pro_db', JSON.stringify(db));

        // Render on Feed
        renderVideo(currentVideoURL, title, desc, tags);
        
        showScreen('home-screen');
        alert("Bhai, Aapka Short Channel par upload ho gaya! 🍎");
    }

    function renderVideo(url, title, desc, tags) {
        const feed = document.getElementById('main-feed');
        const card = document.createElement('div');
        card.className = "card";
        card.innerHTML = `
            <video loop src="${url}" onclick="this.paused ? this.play() : this.pause()"></video>
            <div class="sidebar">
                <div class="icon-box"><i class="fas fa-heart text-2xl mb-1"></i><p class="text-xs">1.2M</p></div>
                <div class="icon-box"><i class="fas fa-comment-dots text-2xl mb-1"></i><p class="text-xs">45K</p></div>
                <div class="icon-box"><i class="fas fa-share text-2xl"></i><p class="text-xs">Share</p></div>
            </div>
            <div class="bottom-info">
                <p class="font-bold mb-2">@Asheesh_Kumar</p>
                <p class="text-sm line-clamp-2">${title} ${tags}</p>
            </div>
        `;
        feed.prepend(card);
    }
</script>

</body>
</html>
