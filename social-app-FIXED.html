<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; }
        /* Vertical Swipe Logic */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; bottom: 0; width: 100%; padding: 40px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); pointer-events: none; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-6 flex justify-between items-center z-50">
        <h1 class="text-2xl font-black italic">VACTRA <span class="text-blue-500">FLOW</span></h1>
        <div class="flex gap-5 text-xl"><i class="fas fa-search"></i><i class="fas fa-bars"></i></div>
    </header>

    <main class="feed">
        <div class="card">
            <video loop playsinline autoplay muted>
                <source src="shayari.mp4" type="video/mp4">
            </video>
            <div class="overlay">
                <p class="font-bold text-lg">@Asheesh_Kumar</p>
                <p class="text-sm">"Har tamanna poori nahi hoti..." ✍️🍂</p>
            </div>
            <div class="absolute bottom-32 right-4 flex flex-col gap-6 text-center">
                <i class="fas fa-heart text-3xl text-red-500"></i>
                <i class="fas fa-comment-dots text-3xl"></i>
                <i class="fas fa-share text-3xl"></i>
            </div>
        </div>

        <div class="card">
            <video loop playsinline muted>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
            <div class="overlay">
                <p class="font-bold text-lg">@Vactra_Official</p>
                <p class="text-sm">The System Is Online! 🚀</p>
            </div>
            <div class="absolute bottom-32 right-4 flex flex-col gap-6 text-center">
                <i class="fas fa-heart text-3xl"></i>
                <i class="fas fa-comment-dots text-3xl"></i>
                <i class="fas fa-share text-3xl"></i>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-black/90 border-t border-white/10 flex justify-around items-center py-4 z-50">
        <i class="fas fa-home text-xl text-blue-500"></i>
        <i class="fas fa-bolt text-xl text-gray-500"></i>
        <div class="bg-white text-black px-4 py-1 rounded-lg font-bold text-2xl">+</div>
        <i class="fas fa-envelope text-xl text-gray-500"></i>
        <i class="fas fa-user-circle text-xl text-gray-500"></i>
    </nav>

    <script>
        // Auto-play video on swipe
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const v = entry.target.querySelector('video');
                entry.isIntersecting ? v.play() : v.pause();
            });
        }, { threshold: 0.8 });
        document.querySelectorAll('.card').forEach(c => observer.observe(c));
    </script>
</body>
</html>
