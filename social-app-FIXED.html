<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; font-family: sans-serif; }
        /* Vertical Swipe logic */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .ui-overlay { position: absolute; bottom: 0; width: 100%; padding: 40px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); pointer-events: none; }
        .side-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; align-items: center; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-6 flex justify-between items-center z-50 bg-gradient-to-b from-black/60 to-transparent">
        <h1 class="text-2xl font-black italic tracking-tighter text-white">VACTRA <span class="text-blue-500 font-bold">FLOW</span></h1>
        <div class="flex gap-5 text-xl text-white">
            <i class="fas fa-search"></i>
            <i class="fas fa-camera"></i>
        </div>
    </header>

    <main class="feed" id="mainFeed">
        
        <div class="card">
            <video loop playsinline autoplay muted preload="auto">
                <source src="https://player.vimeo.com/external/370331493.sd.mp4?s=34015694200c0182470ecf6406e30a516e8b4e7a&profile_id=139&oauth2_token_id=57447761" type="video/mp4">
            </video>
            <div class="ui-overlay">
                <p class="font-bold text-lg">@Asheesh_Kumar</p>
                <p class="text-sm opacity-90">Bhopal ka apna platform! 🍎🚀</p>
            </div>
            <div class="side-bar">
                <div class="flex flex-col items-center"><i class="fas fa-heart text-3xl text-red-500"></i><span class="text-xs mt-1">Active</span></div>
                <div class="flex flex-col items-center"><i class="fas fa-comment-dots text-3xl"></i><span class="text-xs mt-1">45</span></div>
                <i class="fas fa-share text-3xl"></i>
            </div>
        </div>

        <div class="card">
            <video loop playsinline muted preload="auto">
                <source src="https://player.vimeo.com/external/434045526.sd.mp4?s=c4033282f6e91f692e1069b2d3082c5f11075677&profile_id=139&oauth2_token_id=57447761" type="video/mp4">
            </video>
            <div class="ui-overlay">
                <p class="font-bold text-lg">@Vactra_Official</p>
                <p class="text-sm opacity-90">New Update: Swipe System Activated! 🔥</p>
            </div>
            <div class="side-bar">
                <div class="flex flex-col items-center"><i class="fas fa-heart text-3xl"></i><span class="text-xs mt-1">12K</span></div>
                <div class="flex flex-col items-center"><i class="fas fa-comment-dots text-3xl"></i><span class="text-xs mt-1">200</span></div>
                <i class="fas fa-share text-3xl"></i>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-black/95 border-t border-white/10 flex justify-around items-center py-4 z-50">
        <div class="flex flex-col items-center text-blue-500"><i class="fas fa-home text-2xl"></i><span class="text-[10px] mt-1">Home</span></div>
        <div class="flex flex-col items-center text-gray-500"><i class="fas fa-bolt text-2xl"></i><span class="text-[10px] mt-1">Shorts</span></div>
        <div class="bg-white text-black px-5 py-1 rounded-xl font-bold text-3xl shadow-lg">+</div>
        <div class="flex flex-col items-center text-gray-500"><i class="fas fa-envelope text-2xl"></i><span class="text-[10px] mt-1">Inbox</span></div>
        <div class="flex flex-col items-center text-gray-500"><i class="fas fa-user-circle text-2xl"></i><span class="text-[10px] mt-1">Profile</span></div>
    </nav>

    <script>
        // Is script se swipe karne par video apne aap play/pause hogi
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play().catch(e => console.log("Play blocked: User interaction needed"));
                } else {
                    video.pause();
                }
            });
        }, { threshold: 0.6 });

        document.querySelectorAll('.card').forEach(card => observer.observe(card));
        
        // Touch to play fix (Mobile browsers require a touch to start video)
        document.body.addEventListener('click', () => {
            const firstVideo = document.querySelector('video');
            if (firstVideo) firstVideo.play();
        }, { once: true });
    </script>

</body>
</html>
