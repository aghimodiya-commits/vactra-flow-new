<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Full App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; font-family: sans-serif; }
        
        /* Full Screen Swipe Setup */
        .video-container {
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }
        .video-container::-webkit-scrollbar { display: none; }
        
        .video-card {
            scroll-snap-align: start;
            height: 100vh;
            width: 100%;
            position: relative;
            background: #000;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Unique V Logo Style */
        .v-logo {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem; font-weight: 900;
        }

        .like-active { color: #ff4b2b !important; transform: scale(1.2); }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-4 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent z-50">
        <div class="flex items-center gap-2">
            <span class="v-logo">V</span>
            <span class="text-xl font-bold tracking-tight">Flow</span>
        </div>
        <div class="flex gap-5 text-xl opacity-80">
            <i class="fas fa-search"></i>
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <main class="video-container" id="mainFeed">
        
        <div class="video-card">
            <video loop muted playsinline class="v-player" onclick="toggleMute(this)">
                <source src="https://v1.nitrocdn.com/dQkrEExoHshFzWpLNoNidLpUqBwJkEAt/assets/static/optimized/rev-5916892/wp-content/uploads/2022/01/hero-video.mp4" type="video/mp4">
            </video>
            
            <div class="absolute bottom-24 left-4 right-16 z-10 pointer-events-none">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center font-bold border-2 border-white/20">A</div>
                    <p class="font-bold text-lg">@Asheesh_Kumar</p>
                    <button class="bg-white text-black px-4 py-1 rounded-full text-xs font-bold ml-2 pointer-events-auto">SUBSCRIBE</button>
                </div>
                <p class="text-sm opacity-90 drop-shadow-md">Bhopal System! Tap for sound 🍎🔥 #VactraFlow</p>
            </div>

            <div class="absolute bottom-28 right-3 flex flex-col gap-6 text-center z-20">
                <div onclick="handleLike(this)" class="cursor-pointer">
                    <i class="fas fa-heart text-2xl"></i>
                    <p class="text-[10px] mt-1">15K</p>
                </div>
                <i class="fas fa-comment-dots text-2xl"></i>
                <i class="fas fa-share text-2xl"></i>
            </div>
        </div>

        <div class="video-card">
            <video loop muted playsinline class="v-player" onclick="toggleMute(this)">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-connection-background-30232-large.mp4" type="video/mp4">
            </video>
            <div class="absolute bottom-24 left-4 z-10">
                <p class="font-bold">@Pharmacy_Expert</p>
                <p class="text-sm">Medicinal Plants Series: Giloy Facts 🌿</p>
            </div>
            <div class="absolute bottom-28 right-3 flex flex-col gap-6 text-center z-20">
                <div onclick="handleLike(this)" class="cursor-pointer">
                    <i class="fas fa-heart text-2xl"></i>
                    <p class="text-[10px] mt-1">8K</p>
                </div>
                <i class="fas fa-comment-dots text-2xl"></i>
                <i class="fas fa-share text-2xl"></i>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-black border-t border-white/10 flex justify-around items-center py-4 z-50">
        <i class="fas fa-home text-xl text-blue-500"></i>
        <i class="fas fa-bolt text-xl text-gray-500"></i>
        <div class="w-12 h-10 bg-white rounded-lg flex items-center justify-center text-black font-bold text-xl">+</div>
        <i class="fas fa-layer-group text-xl text-gray-500"></i>
        <i class="fas fa-user-circle text-xl text-gray-500"></i>
    </nav>

    <script>
        // 1. Sound Logic (Tap to Unmute)
        function toggleMute(video) {
            video.muted = !video.muted;
        }

        // 2. Like Button Logic
        function handleLike(element) {
            const icon = element.querySelector('i');
            icon.classList.toggle('like-active');
            icon.classList.toggle('fas'); 
        }

        // 3. Auto-Play on Scroll Logic
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play().catch(() => {});
                } else {
                    video.pause();
                }
            });
        }, { threshold: 0.6 });

        document.querySelectorAll('.video-card').forEach(card => {
            observer.observe(card);
        });

        // 4. Start first video on first touch
        window.addEventListener('click', () => {
            const firstVideo = document.querySelector('video');
            if(firstVideo) firstVideo.play();
        }, { once: true });
    </script>

</body>
</html>
