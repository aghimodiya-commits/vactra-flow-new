<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Fixed Upload & Icons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        .screen { height: 100vh; width: 100vw; display: none; position: relative; }
        .active { display: block; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar Styling - YouTube Shorts Style */
        .sidebar { position: absolute; right: 10px; bottom: 140px; display: flex; flex-direction: column; gap: 20px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; }
        .liked { color: #ff0050 !important; }

        /* Info Styling */
        .bottom-info { position: absolute; bottom: 100px; left: 15px; z-index: 1000; pointer-events: none; }
        
        /* Navigation */
        nav { z-index: 5000; background: rgba(0,0,0,0.9); border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-4 flex justify-between items-center z-[5000] bg-gradient-to-b from-black/90 to-transparent">
        <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">VACTRA <span class="text-red-600">FLOW</span></h1>
        <div class="flex gap-5 text-lg"><i class="fas fa-search"></i><i class="fas fa-camera"></i></div>
    </header>

    <div id="home-screen" class="screen active">
        <div class="feed" id="mainFeed">
            <div class="card">
                <video loop playsinline autoplay muted src="https://player.vimeo.com/external/370331493.sd.mp4?s=34015694200c0182470ecf6406e30a516e8b4e7a&profile_id=139&oauth2_token_id=57447761"></video>
                <div class="bottom-info">
                    <p class="font-bold text-md">@Asheesh_Kumar</p>
                    <p class="text-sm opacity-90">Pharmacy Student Life! 💊🍎</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="this.children[0].classList.toggle('liked')"><i class="fas fa-thumbs-up text-2xl"></i><p class="text-[10px] mt-1">1.2M</p></div>
                    <div class="icon-box" onclick="alert('Comments opening...')"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px] mt-1">45K</p></div>
                    <div class="icon-box" onclick="shareNow()"><i class="fas fa-share text-2xl"></i><p class="text-[10px] mt-1">Share</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="profile-screen" class="screen pt-20 bg-black">
        <div class="flex flex-col items-center">
            <div class="w-24 h-24 bg-zinc-800 rounded-full border-2 border-red-600 flex items-center justify-center text-3xl font-bold italic">AK</div>
            <h2 class="mt-4 text-xl font-bold">Asheesh Kumar</h2>
            <p class="text-gray-400 text-sm">@Asheesh_Kumar</p>
            <div class="flex gap-8 mt-6">
                <div class="text-center"><p class="font-bold">45.2K</p><p class="text-xs text-gray-500">Followers</p></div>
                <div class="text-center"><p class="font-bold">1.2M</p><p class="text-xs text-gray-500">Likes</p></div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full flex justify-around items-center py-3">
        <div class="nav-item" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl text-white"></i><span>Home</span></div>
        <div class="nav-item" onclick="showScreen('home-screen')"><i class="fas fa-play-circle text-xl text-gray-400"></i><span>Shorts</span></div>
        <div onclick="triggerUpload()" class="text-3xl font-light cursor-pointer">+</div>
        <div class="nav-item"><i class="fas fa-layer-group text-xl text-gray-400"></i><span>Subs</span></div>
        <div class="nav-item" onclick="showScreen('profile-screen')"><i class="fas fa-user-circle text-xl text-gray-400"></i><span>Profile</span></div>
    </nav>

    <input type="file" id="fileUp" accept="video/*" class="hidden">

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function triggerUpload() { document.getElementById('fileUp').click(); }

        function shareNow() {
            if (navigator.share) navigator.share({title: 'Vactra Flow', url: window.location.href});
            else alert("Link Copied!");
        }

        // --- THE FIX: ADDING ICONS TO NEWLY UPLOADED VIDEOS ---
        document.getElementById('fileUp').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const newCard = document.createElement('div');
                newCard.className = 'card';
                newCard.innerHTML = `
                    <video loop playsinline autoplay src="${url}"></video>
                    <div class="bottom-info">
                        <p class="font-bold text-md">@Asheesh_Kumar</p>
                        <p class="text-sm opacity-90">New Upload! 🔥</p>
                    </div>
                    <div class="sidebar">
                        <div class="icon-box" onclick="this.children[0].classList.toggle('liked')">
                            <i class="fas fa-thumbs-up text-2xl"></i>
                            <p class="text-[10px] mt-1">0</p>
                        </div>
                        <div class="icon-box" onclick="alert('Comments opening...')">
                            <i class="fas fa-comment-dots text-2xl"></i>
                            <p class="text-[10px] mt-1">0</p>
                        </div>
                        <div class="icon-box" onclick="shareNow()">
                            <i class="fas fa-share text-2xl"></i>
                            <p class="text-[10px] mt-1">Share</p>
                        </div>
                    </div>
                `;
                document.getElementById('mainFeed').prepend(newCard);
                showScreen('home-screen');
                newCard.scrollIntoView({ behavior: 'smooth' });
            }
        };
    </script>
</body>
</html>
