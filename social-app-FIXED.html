<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Infinite Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; margin: 0; color: white; overflow: hidden; font-family: sans-serif; }
        .feed {
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }
        .feed::-webkit-scrollbar { display: none; }
        .card {
            scroll-snap-align: start;
            height: 100vh;
            width: 100%;
            position: relative;
            background: #111;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .v-logo {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem; font-weight: 900;
        }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-4 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent z-50">
        <div class="flex items-center gap-1">
            <span class="v-logo">V</span>
            <span class="text-lg font-bold tracking-tight">Flow</span>
        </div>
        <div class="flex gap-5 text-xl opacity-80">
            <i class="fas fa-search"></i>
            <i class="fas fa-camera"></i>
        </div>
    </header>

    <main class="feed" id="mainFeed">
        </main>

    <div id="startOverlay" onclick="initApp()" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] cursor-pointer">
        <div class="text-center">
            <i class="fas fa-play-circle text-7xl text-blue-500 mb-4 animate-pulse"></i>
            <p class="font-bold text-xl">Enter Vactra Flow</p>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black/95 border-t border-white/10 flex justify-around items-center py-4 z-50">
        <i class="fas fa-home text-xl text-blue-500"></i>
        <i class="fas fa-bolt text-xl text-gray-400"></i>
        <div class="bg-white text-black px-4 py-1 rounded-lg font-extrabold text-2xl">+</div>
        <i class="fas fa-comment-alt text-xl text-gray-400"></i>
        <i class="fas fa-user-circle text-xl text-gray-400"></i>
    </nav>

    <script>
        const feed = document.getElementById('mainFeed');
        const overlay = document.getElementById('startOverlay');
        
        // Random Video List (Direct MP4 Links)
        const videoSources = [
            "https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-light-dancing-2322-large.mp4",
            "https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-flowers-1173-large.mp4",
            "https://assets.mixkit.co/videos/preview/mixkit-winter-fashion-cold-woman-4426-large.mp4",
            "https://assets.mixkit.co/videos/preview/mixkit-man-dancing-under-neon-lights-2313-large.mp4"
        ];

        function createVideoCard(src, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video loop playsinline class="player" id="v-${index}">
                    <source src="${src}" type="video/mp4">
                </video>
                <div class="absolute bottom-24 left-4 z-10">
                    <p class="font-bold text-lg">@User_${Math.floor(Math.random()*999)}</p>
                    <p class="text-sm opacity-80">Check this out! #Vactra #Trending</p>
                </div>
                <div class="absolute bottom-28 right-4 flex flex-col gap-6 text-center z-20">
                    <i class="fas fa-heart text-2xl" onclick="this.classList.toggle('text-red-500')"></i>
                    <i class="fas fa-comment-dots text-2xl"></i>
                    <i class="fas fa-share text-2xl"></i>
                </div>
            `;
            return card;
        }

        function initApp() {
            overlay.style.display = 'none';
            // Add 10 random videos initially
            for(let i=0; i<10; i++) {
                const randomSrc = videoSources[Math.floor(Math.random() * videoSources.length)];
                feed.appendChild(createVideoCard(randomSrc, i));
            }
            startObserver();
            document.querySelectorAll('.player')[0].play();
        }

        function startObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        v.play().catch(() => {});
                    } else {
                        v.pause();
                    }
                });
            }, { threshold: 0.8 });

            document.querySelectorAll('.card').forEach(card => observer.observe(card));
        }
    </script>
</body>
</html>
