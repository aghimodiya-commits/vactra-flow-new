<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vactra Flow Shorts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        
        /* Shorts Container: Asli swipe logic yahan hai */
        .shorts-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .shorts-container::-webkit-scrollbar { display: none; }

        /* Har video ek poori screen legi */
        .short-card {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Isse video full screen stretch hogi */
        }

        .overlay-content {
            position: absolute;
            bottom: 80px;
            left: 15px;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        .side-bar {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="shorts-container">
        
        <div class="short-card">
            <video loop playsinline autoplay muted src="shayari.mp4"></video>
            
            <div class="side-bar">
                <div class="text-center"><i class="fas fa-heart text-3xl"></i><p class="text-xs">Like</p></div>
                <div class="text-center"><i class="fas fa-comment-dots text-3xl"></i><p class="text-xs">450</p></div>
                <div class="text-center"><i class="fas fa-share text-3xl"></i><p class="text-xs">Share</p></div>
            </div>

            <div class="overlay-content">
                <h2 class="font-bold text-lg">@Asheesh_Kumar</h2>
                <p class="text-sm">Dil se dil ki doori... ✍️🍎</p>
            </div>
        </div>

        <div class="short-card">
            <video loop playsinline muted src="nature.mp4"></video>
            
            <div class="side-bar">
                <div class="text-center"><i class="fas fa-heart text-3xl"></i><p class="text-xs">800</p></div>
                <div class="text-center"><i class="fas fa-comment-dots text-3xl"></i><p class="text-xs">120</p></div>
                <div class="text-center"><i class="fas fa-share text-3xl"></i><p class="text-xs">Share</p></div>
            </div>

            <div class="overlay-content">
                <h2 class="font-bold text-lg">@Vactra_Official</h2>
                <p class="text-sm">Bhopal Nature Vibes 🌿</p>
            </div>
        </div>

    </div>

    <nav class="fixed bottom-0 w-full flex justify-around items-center py-3 bg-gradient-to-t from-black to-transparent z-50">
        <i class="fas fa-home text-xl text-white"></i>
        <i class="fas fa-bolt text-xl text-gray-400"></i>
        <div class="bg-white text-black px-4 rounded-md text-2xl font-bold">+</div>
        <i class="fas fa-envelope text-xl text-gray-400"></i>
        <i class="fas fa-user text-xl text-gray-400"></i>
    </nav>

    <script>
        // Video Auto-Play Logic
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const vid = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    vid.play();
                } else {
                    vid.pause();
                }
            });
        }, { threshold: 0.8 });

        document.querySelectorAll('.short-card').forEach(card => observer.observe(card));
    </script>

</body>
</html>
