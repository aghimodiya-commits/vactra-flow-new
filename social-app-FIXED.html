<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Pro Save</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .bottom-info { position: absolute; bottom: 120px; left: 15px; z-index: 1000; max-width: 80%; }
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #aaa; cursor: pointer; }
        .active-nav { color: white; }
        .input-group { background: #272727; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed" onscroll="handleScroll()"></div>
    </div>

    <div id="edit-screen" class="screen bg-black">
        <div class="p-4 flex items-center justify-between">
            <i class="fas fa-arrow-left text-xl" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Edit Short</span>
            <button id="publishBtn" onclick="publishVideo()" class="bg-white text-black px-4 py-1.5 rounded-full font-bold text-sm">Next</button>
        </div>
        <div id="preview-box" class="w-full h-[60vh] bg-zinc-900 flex items-center justify-center"></div>
        <div class="p-4">
            <div class="input-group"><input type="text" id="vTitle" placeholder="Create a title..."></div>
            <div class="input-group"><input type="text" id="vTags" placeholder="#Tags"></div>
        </div>
    </div>

    <div id="profile-screen" class="screen bg-zinc-950">
        <div id="auth-content" class="p-6"></div>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl mb-1"></i><span>Home</span></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-4xl font-light cursor-pointer text-white">+</div>
        <div class="nav-item" onclick="handleProfileClick()"><i class="fas fa-user-circle text-xl mb-1"></i><span>You</span></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let selectedFile = null;
        let userData = JSON.parse(localStorage.getItem('vactra_user')) || null;
        let db;

        // 1. IndexedDB Setup (Big Storage)
        const request = indexedDB.open("VactraDB", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("videos", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = e => {
            db = e.target.result;
            loadVideosFromDB();
        };

        function loadVideosFromDB() {
            const transaction = db.transaction("videos", "readonly");
            const store = transaction.objectStore("videos");
            store.getAll().onsuccess = e => {
                const videos = e.target.result;
                videos.forEach(v => renderVideo(v.url, v.title, v.tags));
                handleScroll();
            };
        }

        function publishVideo() {
            const t = document.getElementById('vTitle').value || "New Short";
            const tags = document.getElementById('vTags').value || "";
            const btn = document.getElementById('publishBtn');
            if (!selectedFile) return;

            btn.innerText = "Saving...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(selectedFile);
            reader.onload = function() {
                const base64Video = reader.result;
                
                // Save to IndexedDB instead of LocalStorage
                const transaction = db.transaction("videos", "readwrite");
                const store = transaction.objectStore("videos");
                store.add({ url: base64Video, title: t, tags: tags });

                transaction.oncomplete = () => {
                    renderVideo(base64Video, t, tags);
                    btn.innerText = "Next";
                    btn.disabled = false;
                    showScreen('home-screen');
                    alert("Bhai, Video save ho gayi! 🚀");
                };
            };
        }

        // --- Core UI Functions (Same as yours) ---
        function handleScroll() {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) { v.play().catch(() => {}); } 
                else { v.pause(); }
            });
        }

        document.getElementById('fileInput').onchange = function(e) {
            if(!userData) { alert("Pehle login karein!"); return; }
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const previewUrl = URL.createObjectURL(selectedFile);
                document.getElementById('preview-box').innerHTML = `<video src="${previewUrl}" class="w-full h-full object-cover" muted autoplay loop></video>`;
                showScreen('edit-screen');
            }
        };

        function renderVideo(url, title, tags) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video loop playsinline src="${url}"></video>
                <div class="bottom-info">
                    <p class="font-bold">@${userData ? userData.name.replace(/\s/g, '_') : 'User'}</p>
                    <p class="text-sm mt-1">${title}</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box"><i class="fas fa-heart text-2xl"></i></div>
                    <div class="icon-box"><i class="fas fa-comment-dots text-2xl"></i></div>
                </div>`;
            document.getElementById('mainFeed').prepend(card);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function handleProfileClick() { updateProfileUI(); showScreen('profile-screen'); }

        function updateProfileUI() {
            const content = document.getElementById('auth-content');
            if (!userData) {
                content.innerHTML = `<button onclick="mockLogin()" class="bg-white text-black p-4 rounded">Login with Gmail</button>`;
            } else {
                content.innerHTML = `<h2>${userData.name}</h2><p>${userData.email}</p>`;
            }
        }

        function mockLogin() {
            const name = prompt("Naam:");
            const email = prompt("Email:");
            if (name && email) {
                userData = { name, email };
                localStorage.setItem('vactra_user', JSON.stringify(userData));
                updateProfileUI();
            }
        }
    </script>
</body>
</html>
