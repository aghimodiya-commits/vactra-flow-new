<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Smooth Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        
        /* Feed - Optimized snap scrolling */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Sidebar & Buttons */
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; transition: transform 0.2s; }
        .icon-box:active { transform: scale(1.2); }
        .bottom-info { position: absolute; bottom: 120px; left: 15px; z-index: 1000; max-width: 80%; }
        
        /* Nav */
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #aaa; cursor: pointer; }
        .active-nav { color: white; }

        /* Profile Screen Styles */
        #profile-screen { background: #070707; z-index: 4000; overflow-y: auto; }
        .like-active { color: #ff0000 !important; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed" onscroll="handleScroll()"></div>
    </div>

    <div id="profile-screen" class="screen">
        <div class="p-4 border-b border-zinc-800 flex items-center">
            <i class="fas fa-arrow-left mr-4 cursor-pointer" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">My Profile</span>
        </div>
        <div class="p-10 text-center">
            <div class="w-24 h-24 bg-zinc-800 rounded-full mx-auto border-4 border-red-600 flex items-center justify-center text-3xl font-bold">AK</div>
            <h2 class="mt-4 text-2xl font-bold">Asheesh Kumar</h2>
            <p class="text-gray-500">Pharmacy Student | Bhopal</p>
            <div class="flex justify-around mt-8 bg-zinc-900 p-4 rounded-xl">
                <div><p class="font-bold">45K</p><p class="text-[10px] text-gray-500">Followers</p></div>
                <div><p class="font-bold">1.2M</p><p class="text-[10px] text-gray-500">Likes</p></div>
            </div>
            <button class="w-full mt-6 bg-white text-black font-bold py-2 rounded-lg">Channel Settings</button>
        </div>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showScreen('home-screen')"><i class="fas fa-home text-xl mb-1"></i><span>Home</span></div>
        <div class="nav-item" onclick="showScreen('home-screen')"><i class="fas fa-play-circle text-xl mb-1"></i><span>Shorts</span></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-4xl font-light cursor-pointer text-white">+</div>
        <div class="nav-item"><i class="fas fa-layer-group text-xl mb-1"></i><span>Subs</span></div>
        <div class="nav-item" onclick="showScreen('profile-screen')"><i class="fas fa-user-circle text-xl mb-1"></i><span>You</span></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let currentUrl = "";

        window.onload = function() {
            const saved = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
            saved.forEach(v => renderVideo(v.url, v.title, v.tags));
            handleScroll();
        };

        // SMOOTH SCROLL & AUTO PLAY LOGIC (Hanging Fix)
        function handleScroll() {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) {
                    if (v.paused) v.play().catch(() => {});
                } else {
                    v.pause();
                }
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'home-screen') {
                document.querySelectorAll('video').forEach(v => v.pause());
            } else {
                handleScroll();
            }
        }

        // UPLOAD FIX
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                currentUrl = URL.createObjectURL(file);
                // Turant upload screen par bhej raha hai
                const t = prompt("Video Title:");
                if(t) {
                    renderVideo(currentUrl, t, "#NewShort");
                    const db = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
                    db.unshift({url: currentUrl, title: t, tags: "#NewShort"});
                    localStorage.setItem('vactra_pro_db', JSON.stringify(db));
                    alert("Uploaded! 🚀");
                }
            }
        };

        function renderVideo(url, title, tags) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video loop playsinline src="${url}"></video>
                <div class="bottom-info">
                    <p class="font-bold">@Asheesh_Kumar</p>
                    <p class="text-sm mt-1">${title}</p>
                    <p class="text-xs text-blue-400 mt-1">${tags}</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="toggleLike(this)">
                        <i class="fas fa-heart text-2xl"></i>
                        <p class="text-[10px]">1.2M</p>
                    </div>
                    <div class="icon-box"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px]">45K</p></div>
                    <div class="icon-box" onclick="navigator.share({title:'${title}'})"><i class="fas fa-share text-2xl"></i><p class="text-[10px]">Share</p></div>
                </div>`;
            document.getElementById('mainFeed').prepend(card);
        }

        // LIKE FUNCTION
        function toggleLike(element) {
            element.classList.toggle('like-active');
            const icon = element.querySelector('i');
            icon.classList.toggle('text-red-600');
        }
    </script>
</body>
</html>
