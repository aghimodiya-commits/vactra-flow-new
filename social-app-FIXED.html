<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .screen { height: 100vh; width: 100vw; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        
        /* Feed Styling */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Sidebar & Info */
        .sidebar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; align-items: center; }
        .icon-box { text-align: center; cursor: pointer; }
        .bottom-info { position: absolute; bottom: 120px; left: 15px; z-index: 1000; max-width: 80%; }
        
        /* YouTube Bottom Sheet (Comment Panel) */
        #commentPanel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70vh;
            background: #1c1c1c; border-radius: 15px 15px 0 0; z-index: 7000;
            transition: bottom 0.4s cubic-bezier(0, 1, 0.5, 1);
        }
        .show-comments { bottom: 0 !important; }

        /* Edit Details Screen */
        #edit-screen { background: #0f0f0f; z-index: 6000; overflow-y: auto; }
        .input-group { background: #272727; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
        input, textarea { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
        
        nav { z-index: 5000; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <header class="fixed top-0 w-full p-4 z-[5000] flex justify-between items-center bg-gradient-to-b from-black/90 to-transparent">
            <h1 class="text-xl font-black italic tracking-tighter">VACTRA <span class="text-red-600">FLOW</span></h1>
        </header>
        <div class="feed" id="mainFeed"></div>
    </div>

    <div id="edit-screen" class="screen">
        <div class="p-4 flex items-center justify-between border-b border-zinc-800 sticky top-0 bg-black">
            <i class="fas fa-arrow-left text-xl cursor-pointer" onclick="showScreen('home-screen')"></i>
            <span class="font-bold">Add details</span>
            <button onclick="publishVideo()" class="bg-blue-600 px-6 py-1.5 rounded-full font-bold text-sm">Upload</button>
        </div>
        
        <div class="p-4">
            <div id="preview-box" class="w-full aspect-video bg-zinc-900 rounded-xl mb-6 overflow-hidden border border-zinc-800 flex items-center justify-center"></div>
            
            <div class="input-group">
                <label class="text-[10px] text-gray-400 block uppercase font-bold mb-1">Title</label>
                <input type="text" id="vTitle" placeholder="Create a title...">
            </div>

            <div class="input-group">
                <label class="text-[10px] text-gray-400 block uppercase font-bold mb-1">Description</label>
                <textarea id="vDesc" rows="2" placeholder="Add description..."></textarea>
            </div>

            <div class="input-group">
                <label class="text-[10px] text-red-500 block uppercase font-bold mb-1"># Tags</label>
                <input type="text" id="vTags" placeholder="e.g. #pharmacy #shorts #bhopal">
            </div>
        </div>
    </div>

    <div id="commentPanel">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
            <span class="font-bold">Comments</span>
            <i class="fas fa-times text-xl" onclick="toggleComments()"></i>
        </div>
        <div class="p-10 text-center text-gray-500">
            <i class="fas fa-comments text-4xl mb-3"></i>
            <p>Bhai, abhi koi comment nahi hai.<br>Pehle post toh karo!</p>
        </div>
    </div>

    <nav>
        <div onclick="showScreen('home-screen')"><i class="fas fa-home text-xl"></i></div>
        <div onclick="document.getElementById('fileInput').click()" class="text-4xl">+</div>
        <div onclick="alert('Profile Loading...')"><i class="fas fa-user-circle text-xl"></i></div>
    </nav>

    <input type="file" id="fileInput" accept="video/*" class="hidden">

    <script>
        let currentUrl = "";

        // --- PAGE LOAD: LOAD DATA ---
        window.onload = function() {
            const saved = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
            saved.forEach(v => renderVideo(v.url, v.title, v.desc, v.tags));
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleComments() {
            document.getElementById('commentPanel').classList.toggle('show-comments');
        }

        // --- SELECT VIDEO ---
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                currentUrl = URL.createObjectURL(file);
                document.getElementById('preview-box').innerHTML = `<video src="${currentUrl}" class="h-full" muted autoplay loop></video>`;
                showScreen('edit-screen');
            }
        };

        // --- PUBLISH & PERMANENT SAVE ---
        function publishVideo() {
            const t = document.getElementById('vTitle').value || "Untitled";
            const d = document.getElementById('vDesc').value || "";
            const tags = document.getElementById('vTags').value || "";

            renderVideo(currentUrl, t, d, tags);

            // LocalStorage Save
            const db = JSON.parse(localStorage.getItem('vactra_pro_db')) || [];
            db.unshift({url: currentUrl, title: t, desc: d, tags: tags});
            localStorage.setItem('vactra_pro_db', JSON.stringify(db));

            // Reset & Go Home
            document.getElementById('vTitle').value = "";
            document.getElementById('vDesc').value = "";
            document.getElementById('vTags').value = "";
            showScreen('home-screen');
            alert("Bhai, Video Permanently Save ho gayi! 🍎🚀");
        }

        function renderVideo(url, title, desc, tags) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video loop playsinline autoplay src="${url}"></video>
                <div class="bottom-info">
                    <p class="font-bold">@Asheesh_Kumar</p>
                    <p class="text-sm mt-1">${title}</p>
                    <p class="text-xs text-blue-400 mt-1">${tags}</p>
                    <p class="text-[10px] opacity-70 mt-1">${desc}</p>
                </div>
                <div class="sidebar">
                    <div class="icon-box" onclick="this.classList.toggle('text-red-500')"><i class="fas fa-heart text-2xl"></i><p class="text-[10px]">1.2M</p></div>
                    <div class="icon-box" onclick="toggleComments()"><i class="fas fa-comment-dots text-2xl"></i><p class="text-[10px]">45K</p></div>
                    <div class="icon-box" onclick="navigator.share({title: '${title}', url: window.location.href})"><i class="fas fa-share text-2xl"></i><p class="text-[10px]">Share</p></div>
                </div>`;
            document.getElementById('mainFeed').prepend(card);
        }
    </script>
</body>
</html>
