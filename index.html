<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        .screen { display: none; height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory; }
        .active { display: block; }
        .card { height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; z-index: 100; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div id="long-feed"></div>
    </div>

    <div id="shorts" class="screen">
        <div id="short-feed"></div>
    </div>

    <div class="nav">
        <button onclick="showScreen('home')">Home</button>
        <button onclick="document.getElementById('fileInput').click()" class="bg-red-600 px-4 py-1 rounded">Upload</button>
        <button onclick="showScreen('shorts')">Shorts</button>
    </div>

    <input type="file" id="fileInput" class="hidden" accept="video/*">

    <script>
        // Screen Switcher
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Optimized Video Loader
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const isShort = confirm("Shorts mein daalein?");
            
            const v = document.createElement('video');
            v.src = url;
            v.className = "card";
            v.controls = true;
            v.preload = "metadata"; // Sirf metadata load hoga, MB bachega!
            
            if (isShort) document.getElementById('short-feed').appendChild(v);
            else document.getElementById('long-feed').appendChild(v);
            
            showScreen(isShort ? 'shorts' : 'home');
        };
    </script>
</body>
</html>
