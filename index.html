<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Vactra Flow | Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

    <header class="p-4 flex gap-3 items-center sticky top-0 bg-black z-50">
        <input type="text" placeholder="Search Vactra..." class="w-full p-2 rounded-lg bg-gray-800 border border-gray-700">
        <span class="text-2xl font-bold italic text-pink-500">VACTRA</span>
    </header>

    <main id="feed" class="flex flex-col items-center">
        <div class="w-full h-[80vh] bg-gray-900 relative mb-4">
            <video class="w-full h-full object-cover" controls>
                <source src="vactra-video.mp4" type="video/mp4">
            </video>
            <div class="absolute right-2 bottom-20 flex flex-col gap-6 text-2xl">
                <span>❤️</span>
                <span>💬</span>
                <span>↪️</span>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-black border-t border-gray-800 p-4 flex justify-between px-10">
        <button class="text-xl">🏠</button>
        <a href="studio.html" class="text-3xl bg-pink-600 px-6 rounded-full">+</a>
        <button class="text-xl">👤</button>
    </nav>

</body>
</html>
