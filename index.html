<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Instant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; }
        .feed { display: flex; flex-direction: column; gap: 10px; }
        /* Video ko screen se bahar load hone se rokne ke liye */
        video { width: 100%; aspect-ratio: 9/16; background: #111; object-fit: cover; }
    </style>
</head>
<body>

    <div id="feed" class="feed"></div>

    <div class="fixed bottom-0 w-full p-4 bg-black border-t border-zinc-800">
        <button onclick="document.getElementById('fileInput').click()" class="w-full bg-red-600 py-3 rounded-xl font-bold">Upload & Play Instantly</button>
    </div>

    <input type="file" id="fileInput" class="hidden" accept="video/*">

    <script>
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 1. UI ko turant block hone se bachane ke liye requestAnimationFrame use kiya
            requestAnimationFrame(() => {
                const url = URL.createObjectURL(file);
                
                const v = document.createElement('video');
                v.src = url;
                v.muted = true;
                v.playsInline = true;
                v.className = "card";
                
                // 2. Video ko background mein ready karne ke liye
                v.onloadedmetadata = () => {
                    v.play(); // Metadata load hote hi chalayein
                };

                document.getElementById('feed').prepend(v);
            });
        };
    </script>
</body>
</html>
