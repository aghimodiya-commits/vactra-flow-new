<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow - Smooth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .feed { display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .video-box { background: #111; min-height: 200px; width: 100%; }
        video { width: 100%; height: auto; display: block; }
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #333; }
        .screen { display: none; } .active { display: block; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <h2 class="p-4 font-bold">Home (Long)</h2>
        <div id="long-feed" class="feed"></div>
    </div>

    <div id="shorts" class="screen">
        <h2 class="p-4 font-bold">Shorts</h2>
        <div id="short-feed" class="feed"></div>
    </div>

    <nav>
        <button onclick="showScreen('home')">Home</button>
        <button onclick="document.getElementById('fileInput').click()" class="bg-red-600 px-6 py-1 rounded-full">Upload</button>
        <button onclick="showScreen('shorts')">Shorts</button>
    </nav>
    <input type="file" id="fileInput" class="hidden" accept="video/*">

    <script>
        // Smooth Observer: Sirf wahi video play hogi jo screen par hai
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) { video.play(); } 
                else { video.pause(); }
            });
        }, { threshold: 0.5 });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            const isShort = confirm("Shorts mein daalein?");
            
            const videoElem = document.createElement('video');
            videoElem.src = url;
            videoElem.muted = true;
            videoElem.playsInline = true;
            videoElem.preload = "none"; // MB bachane ke liye (sirf play hone par load hogi)
            
            const div = document.createElement('div');
            div.className = 'video-box';
            div.appendChild(videoElem);
            
            if (isShort) document.getElementById('short-feed').appendChild(div);
            else document.getElementById('long-feed').appendChild(div);
            
            observer.observe(videoElem);
        };
    </script>
</body>
</html>
