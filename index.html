<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .card { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 15px; bottom: 150px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 50; }
        #search-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; padding: 20px; }
        .icon-btn { cursor: pointer; transition: 0.2s; }
        .liked { color: #ef4444; }
    </style>
</head>
<body>

    <div class="feed" id="feed-container"></div>

    <div id="search-overlay">
        <div class="mt-10 flex gap-2">
            <input type="text" id="searchInput" placeholder="Search videos..." oninput="searchVideos()" class="w-full bg-zinc-800 p-3 rounded-xl outline-none">
            <button onclick="document.getElementById('search-overlay').style.display='none'" class="text-white px-2">Close</button>
        </div>
        <div id="search-results" class="mt-5"></div>
    </div>

    <nav class="nav">
        <div class="flex flex-col items-center"><i class="fas fa-home"></i><span class="text-[10px]">Home</span></div>
        <div onclick="document.getElementById('search-overlay').style.display='block'" class="flex flex-col items-center"><i class="fas fa-search"></i><span class="text-[10px]">Search</span></div>
        <i class="fas fa-plus-square text-3xl text-red-600" onclick="document.getElementById('fileInput').click()"></i>
        <div class="flex flex-col items-center"><i class="fas fa-layer-group"></i><span class="text-[10px]">Subs</span></div>
        <div class="flex flex-col items-center"><i class="fas fa-user-circle"></i><span class="text-[10px]">You</span></div>
    </nav>

    <input type="file" id="fileInput" class="hidden" accept="video/*">

    <script>
        function searchVideos() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const results = document.getElementById('search-results');
            results.innerHTML = "";
            document.querySelectorAll('.card').forEach(card => {
                if (card.getAttribute('data-title').includes(query)) results.appendChild(card.cloneNode(true));
            });
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const title = prompt("Video title:") || "Video";
            const url = URL.createObjectURL(file);
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-title', title.toLowerCase());
            card.innerHTML = `
                <video src="${url}" loop playsinline autoplay muted></video>
                <div class="sidebar">
                    <i class="fas fa-heart icon-btn text-3xl" onclick="this.classList.toggle('liked')"></i>
                    <i class="fas fa-comment icon-btn text-3xl"></i>
                    <i class="fas fa-share icon-btn text-3xl"></i>
                    <i class="fas fa-trash icon-btn text-3xl text-red-500" onclick="this.parentElement.parentElement.remove()"></i>
                </div>
            `;
            document.getElementById('feed-container').prepend(card);
        };
    </script>
</body>
</html>
