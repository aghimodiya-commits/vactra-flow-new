<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        .screen { display: none; padding-bottom: 70px; }
        .active { display: block; }
        .video-container { width: 100%; margin-bottom: 20px; background: #111; }
        video { width: 100%; display: block; }
        nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #333; display: flex; justify-content: space-around; padding: 15px; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <h1 class="p-4 text-xl font-bold">Home (Long Videos)</h1>
        <div id="long-feed"></div>
    </div>

    <div id="shorts" class="screen">
        <h1 class="p-4 text-xl font-bold">Shorts</h1>
        <div id="short-feed"></div>
    </div>

    <nav>
        <button onclick="showScreen('home')">Home</button>
        <button onclick="document.getElementById('fileInput').click()" class="bg-red-600 px-4 py-1 rounded">Upload</button>
        <button onclick="showScreen('shorts')">Shorts</button>
    </nav>

    <input type="file" id="fileInput" class="hidden" accept="video/*">

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            const isShort = confirm("Kya ye Shorts video hai? (OK = Yes, Cancel = No)");
            
            const videoHTML = `<div class="video-container"><video src="${url}" controls></video></div>`;
            
            if (isShort) {
                document.getElementById('short-feed').innerHTML += videoHTML;
                alert("Shorts mein upload ho gaya!");
            } else {
                document.getElementById('long-feed').innerHTML += videoHTML;
                alert("Home mein upload ho gaya!");
            }
        };
    </script>
</body>
</html>
