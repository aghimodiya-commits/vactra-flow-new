<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Vactra Flow - Dual Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; margin: 0; }
        .screen { display: none; height: 100vh; overflow-y: auto; }
        .active { display: block; }
        .long-video { width: 100%; aspect-ratio: 16/9; background: #222; }
        .short-video { width: 100%; aspect-ratio: 9/16; background: #000; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active p-2">
        <h1 class="text-xl font-bold p-2">Home (Long Videos)</h1>
        <div id="long-feed" class="space-y-4"></div>
    </div>

    <div id="shorts-screen" class="screen">
        <h1 class="text-xl font-bold p-4">Shorts</h1>
        <div id="short-feed"></div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around p-4">
        <button onclick="showScreen('home-screen')">Home</button>
        <button onclick="document.getElementById('uploadInput').click()">Upload</button>
        <button onclick="showScreen('shorts-screen')">Shorts</button>
    </nav>

    <input type="file" id="uploadInput" class="hidden" accept="video/*">

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('uploadInput').onchange = e => {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            const type = prompt("Is this a Short? (yes/no)");

            if (type === 'yes') {
                document.getElementById('short-feed').innerHTML += `<video class="short-video" src="${url}" controls></video>`;
            } else {
                document.getElementById('long-feed').innerHTML += `<video class="long-video" src="${url}" controls></video>`;
            }
        };
    </script>
</body>
</html>
