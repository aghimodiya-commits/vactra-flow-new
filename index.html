<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow Ultra-Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; }
        .feed { display: grid; grid-template-columns: 1fr; gap: 5px; }
        /* GPU Acceleration ke liye */
        video { 
            width: 100%; 
            background: #111; 
            will-change: transform; 
            backface-visibility: hidden;
        }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="long-feed" class="feed active"></div>

    <div class="nav">
        <button onclick="document.getElementById('fileInput').click()" class="bg-red-600 px-8 py-2 rounded-full font-bold">Upload Video</button>
    </div>

    <input type="file" id="fileInput" class="hidden" accept="video/mp4,video/webm">

    <script>
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 1. URL banate hi UI update karein
            const url = URL.createObjectURL(file);
            
            // 2. Video element ko lightweight banayein
            const v = document.createElement('video');
            v.src = url;
            v.controls = true;
            v.autoplay = false; 
            v.muted = true;
            v.setAttribute('playsinline', '');
            
            // 3. Screen par turant show karein
            document.getElementById('long-feed').prepend(v);
            
            // Browser ko hint de rahe hain ki ye video load karni hai
            v.load();
        };
    </script>
</body>
</html>
