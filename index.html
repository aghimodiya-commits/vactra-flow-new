<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100vw; }
        .active { display: block; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .card { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 15px; bottom: 150px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        /* Search Bar Style */
        .search-container { position: fixed; top: 10px; width: 90%; left: 5%; z-index: 100; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; z-index: 100; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search videos..." oninput="searchVideos()" 
                   class="w-full bg-zinc-800/80 p-2 pl-4 rounded-full text-sm outline-none text-white border border-zinc-700">
        </div>
        <div class="feed" id="feed-container"></div>
    </div>

    <nav class="nav">
        <i class="fas fa-home text-xl"></i>
        <i class="fas fa-play-circle text-xl"></i>
        <i class="fas fa-plus-square text-3xl" onclick="document.getElementById('fileInput').click()"></i>
        <i class="fas fa-layer-group text-xl"></i>
        <i class="fas fa-user-circle text-xl"></i>
    </nav>

    <input type="file" id="fileInput" class="hidden" accept="video/*">

    <script>
        function searchVideos() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const title = card.getAttribute('data-title') || "";
                card.style.display = title.includes(query) ? "flex" : "none";
            });
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const title = prompt("Video ka naam:");
            if (!file) return;
            const url = URL.createObjectURL(file);
            
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-title', (title || "").toLowerCase());
            card.innerHTML = `
                <video src="${url}" loop playsinline autoplay muted></video>
                <div class="sidebar">
                    <i class="fas fa-heart text-3xl"></i>
                    <i class="fas fa-comment text-3xl"></i>
                    <i class="fas fa-share text-3xl"></i>
                    <i class="fas fa-trash text-3xl text-red-500" onclick="this.parentElement.parentElement.remove()"></i>
                </div>
            `;
            document.getElementById('feed-container').prepend(card);
        };
    </script>
</body>
</html>
