<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; margin: 0; overflow: hidden; }
        .feed { height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory; }
        .card { height: 100vh; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Fixed UI Buttons */
        .top-ui { position: fixed; top: 10px; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 0 20px; }
        .sidebar { position: absolute; right: 15px; bottom: 80px; z-index: 900; display: flex; flex-direction: column; gap: 20px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #333; z-index: 1000; }
    </style>
</head>
<body>

    <div class="top-ui">
        <input type="text" id="searchInput" placeholder="Search..." oninput="filterFeed()" class="bg-zinc-800 text-white p-2 rounded-lg w-3/4 outline-none">
        <i class="fas fa-search text-white text-xl mt-2"></i>
    </div>

    <div class="feed" id="feed-container"></div>

    <nav class="nav">
        <i class="fas fa-home text-2xl"></i>
        <i class="fas fa-plus-square text-3xl text-red-600" onclick="document.getElementById('fileInput').click()"></i>
        <i class="fas fa-user-circle text-2xl"></i>
    </nav>

    <input type="file" id="fileInput" class="hidden" accept="video/*">

    <script>
        function filterFeed() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.getAttribute('data-title').includes(query) ? "block" : "none";
            });
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const title = prompt("Video Title:") || "Video";
            const url = URL.createObjectURL(file);
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-title', title.toLowerCase());
            card.innerHTML = `
                <video src="${url}" loop playsinline autoplay muted></video>
                <div class="sidebar">
                    <i class="fas fa-heart text-3xl"></i>
                    <i class="fas fa-comment text-3xl"></i>
                    <a href="${url}" download="${title}.mp4"><i class="fas fa-download text-3xl text-blue-400"></i></a>
                    <i class="fas fa-trash text-3xl text-red-500" onclick="this.parentElement.parentElement.remove()"></i>
                </div>
            `;
            document.getElementById('feed-container').prepend(card);
        };
    </script>
</body>
</html>
