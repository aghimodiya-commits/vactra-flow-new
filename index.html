<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100vw; }
        .active { display: block; }
        .feed { height: 90vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .card { height: 90vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 15px; bottom: 150px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 100; }
        #search-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: none; padding: 20px; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div class="feed" id="feed-container"></div>
    </div>

    <div id="search-overlay">
        <div class="mt-10 flex gap-2">
            <input type="text" id="searchInput" placeholder="Search videos..." oninput="searchVideos()" class="w-full bg-zinc-800 p-3 rounded-xl text-white outline-none">
            <button onclick="document.getElementById('search-overlay').style.display='none'" class="text-white">Close</button>
        </div>
        <div id="search-results" class="mt-5"></div>
    </div>

    <nav class="nav">
        <div onclick="showScreen('home')" class="flex flex-col items-center"><i class="fas fa-home"></i><span>Home</span></div>
        <div onclick="document.getElementById('search-overlay').style.display='block'" class="flex flex-col items-center"><i class="fas fa-search"></i><span>Search</span></div>
        <i class="fas fa-plus-square text-3xl" onclick="document.getElementById('fileInput').click()"></i>
        <div class="flex flex-col items-center"><i class="fas fa-layer-group"></i><span>Subs</span></div>
        <div class="flex flex-col items-center"><i class="fas fa-user-circle"></i><span>You</span></div>
    </nav>

    <input type="file" id="fileInput" class="hidden" accept="video/*">

    <script>
        function showScreen(id) {
            document.getElementById('search-overlay').style.display = 'none';
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function searchVideos() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const results = document.getElementById('search-results');
            results.innerHTML = "";
            document.querySelectorAll('.card').forEach(card => {
                if (card.getAttribute('data-title').includes(query)) {
                    results.appendChild(card.cloneNode(true));
                }
            });
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const title = prompt("Enter video title:");
            if (!file) return;
            const url = URL.createObjectURL(file);
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-title', (title || "").toLowerCase());
            card.innerHTML = `<video src="${url}" loop playsinline autoplay muted></video>
                <div class="sidebar">
                    <i class="fas fa-heart text-3xl"></i>
                    <i class="fas fa-comment text-3xl"></i>
                    <i class="fas fa-share text-3xl"></i>
                    <i class="fas fa-trash text-3xl text-red-500" onclick="this.parentElement.parentElement.remove()"></i>
                </div>`;
            document.getElementById('feed-container').prepend(card);
        };
    </script>
</body>
</html>
