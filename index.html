<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vactra Flow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .card { height: 100vh; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        /* Buttons aur Search ke liye styling */
        .sidebar { position: absolute; right: 15px; bottom: 80px; z-index: 10; display: flex; flex-direction: column; gap: 20px; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 50; }
        .search-bar { position: fixed; top: 10px; width: 90%; left: 5%; z-index: 100; background: #222; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search videos..." oninput="filterFeed()" class="w-full bg-transparent outline-none text-white">
    </div>

    <div class="feed" id="feed-container"></div>

    <nav class="nav">
        <i class="fas fa-home text-2xl"></i>
        <i class="fas fa-plus-square text-3xl text-red-600" onclick="document.getElementById('fileInput').click()"></i>
        <i class="fas fa-user-circle text-2xl"></i>
    </nav>

    <input type="file" id="fileInput" class="hidden" accept="video/*">

    <script>
        function filterFeed() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.getAttribute('data-title').includes(query) ? "block" : "none";
            });
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const title = prompt("Video title:") || "Video";
            const url = URL.createObjectURL(file);
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-title', title.toLowerCase());
            card.innerHTML = `
                <video src="${url}" loop playsinline autoplay muted></video>
                <div class="sidebar">
                    <i class="fas fa-heart text-3xl"></i>
                    <i class="fas fa-share text-3xl"></i>
                    <a href="${url}" download="${title}.mp4"><i class="fas fa-download text-3xl text-blue-400"></i></a>
                    <i class="fas fa-trash text-3xl text-red-500" onclick="this.parentElement.parentElement.remove()"></i>
                </div>
            `;
            document.getElementById('feed-container').prepend(card);
        };
    </script>
</body>
</html>
